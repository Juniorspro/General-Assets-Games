<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0c1208" />
<title>Tala · Física (cannon-es)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body { height:100%; overflow:hidden; background:#0c1208; font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; color:#eaf2e0; }
  #app { position:fixed; inset:0; } canvas { display:block; touch-action:none; }
  #loader { position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center; background:#0c1208; transition:opacity .7s; }
  #loader.hide { opacity:0; pointer-events:none; }
  .sp { width:46px;height:46px;border:3px solid rgba(255,255,255,.15);border-top-color:#8fd06a;border-radius:50%;animation:r 1s linear infinite; } @keyframes r{to{transform:rotate(360deg);}}
  #talar { position:fixed; left:50%; bottom:calc(26px + env(safe-area-inset-bottom,0px)); transform:translateX(-50%); z-index:30;
           padding:15px 30px; font-size:15px; font-weight:700; letter-spacing:.06em; border-radius:30px; border:1.5px solid rgba(255,255,255,.2);
           background:rgba(60,120,40,.85); color:#fff; cursor:pointer; box-shadow:0 8px 30px rgba(0,0,0,.5); backdrop-filter:blur(8px); }
  #talar:active { transform:translateX(-50%) scale(.96); }
  #hint { position:fixed; left:50%; top:18px; transform:translateX(-50%); z-index:25; font-size:11.5px; opacity:.5; }
</style>
</head>
<body>
<div id="loader"><div class="sp"></div></div>
<div id="app"></div>
<div id="hint">arrastrá para girar · pellizcá para zoom</div>
<button id="talar">TALAR</button>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
  "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js",
  "postprocessing": "https://cdn.jsdelivr.net/npm/postprocessing@6.39.1/build/index.js"
} }
</script>

<script type="module">
import * as THREE from 'three';
import * as CANNON from 'cannon-es';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Sky } from 'three/addons/objects/Sky.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import { EffectComposer, RenderPass, EffectPass, BloomEffect, ToneMappingEffect, ToneMappingMode, SMAAEffect } from 'postprocessing';

const renderer=new THREE.WebGLRenderer({antialias:false,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2)); renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.NoToneMapping;
document.getElementById('app').appendChild(renderer.domElement);

const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(0xbcd0a0,0.012);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,2000); camera.position.set(11,6,15);
const controls=new OrbitControls(camera,renderer.domElement); controls.enableDamping=true; controls.dampingFactor=0.07; controls.target.set(0,3.2,0); controls.maxPolarAngle=Math.PI*0.49;

// cielo atardecer + IBL
const pmrem=new THREE.PMREMGenerator(renderer);
const sky=new Sky(); sky.scale.setScalar(8000); const su=sky.material.uniforms;
su.turbidity.value=8; su.rayleigh.value=2.4; su.mieCoefficient.value=0.03; su.mieDirectionalG.value=0.85;
const sun=new THREE.Vector3(); sun.setFromSphericalCoords(1,THREE.MathUtils.degToRad(74),THREE.MathUtils.degToRad(120)); su.sunPosition.value.copy(sun);
scene.add(sky);
{ const es=new THREE.Scene(); const s2=new Sky(); s2.scale.setScalar(100); for(const k in su) if(s2.material.uniforms[k]) s2.material.uniforms[k].value=su[k].value; es.add(s2); scene.environment=pmrem.fromScene(es,0.04).texture; }

const hemi=new THREE.HemisphereLight(0xffe2bb,0x44502c,0.6); scene.add(hemi);
const dir=new THREE.DirectionalLight(0xffe0b0,2.6); dir.position.copy(sun).multiplyScalar(30); dir.castShadow=true;
dir.shadow.mapSize.set(2048,2048); dir.shadow.camera.near=1; dir.shadow.camera.far=120;
dir.shadow.camera.left=-22;dir.shadow.camera.right=22;dir.shadow.camera.top=22;dir.shadow.camera.bottom=-22; dir.shadow.bias=-0.0004; dir.shadow.normalBias=0.04;
scene.add(dir); scene.add(dir.target);

// suelo
const groundMatGfx=new THREE.MeshStandardMaterial({color:0x4a6a30,roughness:0.97,metalness:0});
const ground=new THREE.Mesh(new THREE.CircleGeometry(120,72),groundMatGfx); ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);

// materiales del árbol (texturas reales async)
const barkMat=new THREE.MeshStandardMaterial({color:0x5a4530,roughness:0.9,metalness:0});
const leafMat=new THREE.MeshStandardMaterial({color:0x4f7a32,roughness:0.7,metalness:0,side:THREE.DoubleSide,alphaTest:0.4});
const leafPlane=new THREE.PlaneGeometry(0.72,0.82);
{ const tl=new THREE.TextureLoader(); tl.crossOrigin='anonymous'; const P='https://cdn.jsdelivr.net/gh/Juniorspro/General-Assets-Games@d72240f/assets/textures/';
  tl.load(P+'bark_col.jpg',t=>{t.colorSpace=THREE.SRGBColorSpace;t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(1,2);barkMat.map=t;barkMat.color.set(0xffffff);barkMat.needsUpdate=true;});
  tl.load(P+'bark_nrm.jpg',t=>{t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(1,2);barkMat.normalMap=t;barkMat.needsUpdate=true;});
  tl.load(P+'leaf_a.png',t=>{t.colorSpace=THREE.SRGBColorSpace;leafMat.map=t;leafMat.color.set(0xeaf3e0);leafMat.needsUpdate=true;}); }

/* ===================== ÁRBOL (por miembros, para físicas limpias) ===================== */
const TH=6, UPV=new THREE.Vector3(0,1,0);
let tree=null;
function makeClump(){const n=14;const im=new THREE.InstancedMesh(leafPlane,leafMat,n);const d=new THREE.Object3D();
  for(let i=0;i<n;i++){d.position.set((Math.random()-.5)*1.0,(Math.random()-.5)*1.0,(Math.random()-.5)*1.0);d.rotation.set(Math.random()*6,Math.random()*6,Math.random()*6);const s=0.55+Math.random()*0.5;d.scale.set(s,s,s);d.updateMatrix();im.setMatrixAt(i,d.matrix);}
  im.instanceMatrix.needsUpdate=true;return im;}
function buildTree(){
  const root=new THREE.Group();                 // pivote en la base (0,0,0)
  const trunkVis=new THREE.Group(); trunkVis.position.set(0,TH/2,0); root.add(trunkVis);  // origen = CENTRO del tronco
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.42,TH,16),barkMat); trunk.castShadow=trunk.receiveShadow=true; trunkVis.add(trunk);
  const stay=[], brk=[], freeLeaves=[];
  for(let i=0;i<12;i++){
    const attachY=1.6+(i/12)*3.9, ang=i*2.39+Math.random()*0.4;
    const len=1.3+Math.random()*1.4, r=Math.max(0.05,0.14-attachY*0.012);
    const d=new THREE.Vector3(Math.cos(ang),0.55+Math.random()*0.5,Math.sin(ang)).normalize();
    const center=new THREE.Vector3(0,attachY,0).addScaledVector(d,len/2);   // en coords de root
    const lm=new THREE.Mesh(new THREE.CylinderGeometry(r*0.5,r,len,10),barkMat); lm.castShadow=true;
    lm.quaternion.setFromUnitVectors(UPV,d);
    const clump=makeClump(); clump.position.set(0,len/2,0); lm.add(clump);
    const breakable=i>=6;
    if(breakable){ lm.position.copy(center); root.add(lm); brk.push({mesh:lm,len,r,dir:d.clone()}); }
    else { lm.position.set(center.x,center.y-TH/2,center.z); trunkVis.add(lm); stay.push(lm); }
  }
  // hojas sueltas que se esparcen
  for(let i=0;i<18;i++){const m=new THREE.Mesh(leafPlane,leafMat);const a=Math.random()*6.28,rad=0.7+Math.random()*1.7,h=2.6+Math.random()*3;
    m.position.set(Math.cos(a)*rad,h,Math.sin(a)*rad);m.rotation.set(Math.random()*6,Math.random()*6,Math.random()*6);const s=0.6+Math.random()*0.5;m.scale.set(s,s,s);root.add(m);freeLeaves.push(m);}
  scene.add(root);
  return {root,trunkVis,stay,brk,freeLeaves};
}

/* ===================== FÍSICA (cannon-es) ===================== */
let world=null, dyn=[];                 // {body,mesh}
const groundPMat=new CANNON.Material('g'), objPMat=new CANNON.Material('o');
function setupWorld(){
  world=new CANNON.World({gravity:new CANNON.Vec3(0,-17,0)}); world.allowSleep=true;
  world.broadphase=new CANNON.SAPBroadphase(world);
  world.addContactMaterial(new CANNON.ContactMaterial(groundPMat,objPMat,{friction:0.7,restitution:0.06}));
  world.addContactMaterial(new CANNON.ContactMaterial(objPMat,objPMat,{friction:0.5,restitution:0.04}));
  const gb=new CANNON.Body({type:CANNON.Body.STATIC,shape:new CANNON.Plane(),material:groundPMat});
  gb.quaternion.setFromEuler(-Math.PI/2,0,0); world.addBody(gb);
}
function addBody(mass,hx,hy,hz,mesh){
  const b=new CANNON.Body({mass,material:objPMat}); b.angularDamping=0.35; b.linearDamping=0.05;
  b.addShape(new CANNON.Box(new CANNON.Vec3(hx,hy,hz)));
  b.position.set(mesh.position.x,mesh.position.y,mesh.position.z);
  b.quaternion.set(mesh.quaternion.x,mesh.quaternion.y,mesh.quaternion.z,mesh.quaternion.w);
  world.addBody(b); dyn.push({body:b,mesh}); return b;
}
function addLeafBody(mesh){
  const b=new CANNON.Body({mass:0.12,material:objPMat}); b.angularDamping=0.5; b.linearDamping=0.25;
  b.addShape(new CANNON.Sphere(0.18));
  b.position.set(mesh.position.x,mesh.position.y,mesh.position.z);
  world.addBody(b); dyn.push({body:b,mesh}); return b;
}
// v = ω × r  (ω sobre eje X en la base)
function vel(b,omega){ const r=b.position; b.velocity.set(0,-omega*r.z,omega*r.y); b.angularVelocity.set(omega,0,0); }

/* ===================== ESTADO / TALA ===================== */
let state='standing', fallAng=0, fallVel=0;
const talarBtn=document.getElementById('talar');
function reset(){
  if(tree){ scene.remove(tree.root); }
  if(world){ dyn.forEach(o=>scene.remove(o.mesh)); dyn=[]; world=null; }
  tree=buildTree(); state='standing'; fallAng=0; fallVel=0; talarBtn.textContent='TALAR';
}
function startFell(){ if(state==='standing'){ state='falling'; fallVel=0.15; } }
talarBtn.addEventListener('click',()=>{ if(state==='standing') startFell(); else reset(); });

function trigger(){
  state='physics'; talarBtn.textContent='REGENERAR'; setupWorld();
  const omega=fallVel;   // rad/s alrededor de +X en la base
  // tronco (cuerpo único; ramas "stay" y sus hojas viajan como hijos visuales)
  tree.trunkVis.updateWorldMatrix(true,false); scene.attach(tree.trunkVis);
  const tb=addBody(34,0.45,TH/2,0.45,tree.trunkVis); vel(tb,omega);
  // ramas que se rompen (cuerpos sueltos con impulso de quiebre)
  for(const L of tree.brk){ L.mesh.updateWorldMatrix(true,false); scene.attach(L.mesh);
    const m=2.2+L.len; const b=addBody(m,Math.max(0.05,L.r),L.len/2,Math.max(0.05,L.r),L.mesh); vel(b,omega);
    // salto/quiebre: impulso hacia afuera + algo de arriba (no exagerado)
    b.velocity.x+=L.dir.x*2.2; b.velocity.z+=L.dir.z*2.2; b.velocity.y+=1.5+Math.random()*2.2;
    b.angularVelocity.x+=(Math.random()-.5)*6; b.angularVelocity.y+=(Math.random()-.5)*6; b.angularVelocity.z+=(Math.random()-.5)*6; }
  // hojas sueltas (solo algunas terminan en el suelo)
  for(const m of tree.freeLeaves){ m.updateWorldMatrix(true,false); scene.attach(m);
    const b=addLeafBody(m); vel(b,omega); b.velocity.x+=(Math.random()-.5)*3; b.velocity.z+=(Math.random()-.5)*3; b.velocity.y+=Math.random()*1.5;
    b.angularVelocity.set((Math.random()-.5)*8,(Math.random()-.5)*8,(Math.random()-.5)*8); }
}

/* ===================== POST ===================== */
let composer,bloom;
try{ composer=new EffectComposer(renderer,{frameBufferType:THREE.HalfFloatType});
  composer.addPass(new RenderPass(scene,camera));
  bloom=new BloomEffect({intensity:0.3,luminanceThreshold:0.75,luminanceSmoothing:0.2,mipmapBlur:true,radius:0.6});
  composer.addPass(new EffectPass(camera,bloom,new ToneMappingEffect({mode:ToneMappingMode.AGX})));
  composer.addPass(new EffectPass(camera,new SMAAEffect())); composer.setSize(innerWidth,innerHeight);
}catch(e){ console.error(e); composer=null; renderer.toneMapping=THREE.AgXToneMapping; }

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);if(composer)composer.setSize(innerWidth,innerHeight);});

reset();
const clock=new THREE.Clock();
function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); controls.update();
  if(state==='falling'){
    fallVel+=2.4*dt; fallAng+=fallVel*dt; tree.root.rotation.x=fallAng;
    const tipY=TH*Math.cos(fallAng);                 // altura de la punta
    if(tipY<1.3||fallAng>1.45) trigger();
  } else if(state==='physics' && world){
    world.step(1/60,dt,4);
    for(const o of dyn){ o.mesh.position.copy(o.body.position); o.mesh.quaternion.copy(o.body.quaternion); }
  }
  if(composer)composer.render(dt); else renderer.render(scene,camera);
}
requestAnimationFrame(()=>{ try{ if(composer)composer.render(0); else renderer.render(scene,camera);}catch(e){console.error(e);} setTimeout(()=>document.getElementById('loader').classList.add('hide'),300); animate(); });
</script>
</body>
</html>
