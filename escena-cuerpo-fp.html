<!DOCTYPE html>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

<title>Parkour FP</title>

<style>
  :root{ --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px); }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }

  #stage{ position:fixed; inset:0; }
  body.rot #stage{ width:100vh; height:100vw; top:50%; left:50%; transform:translate(-50%,-50%) rotate(90deg); transform-origin:center; }
  #app{ position:absolute; inset:0; }
  #app canvas{ display:block; width:100%!important; height:100%!important; touch-action:none; }
  #cross{ position:fixed; left:50%; top:50%; width:6px; height:6px; margin:-3px; z-index:6; border-radius:50%; background:rgba(255,255,255,.6); box-shadow:0 0 4px rgba(0,0,0,.6); pointer-events:none; }
  #joy{ position:fixed; left:26px; bottom:calc(28px + var(--safe-b)); z-index:20; width:128px; height:128px; border-radius:50%;
        background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.18); backdrop-filter:blur(6px); touch-action:none; }
  #joyKnob{ position:absolute; left:50%; top:50%; width:52px; height:52px; margin:-26px 0 0 -26px; border-radius:50%;
            background:radial-gradient(circle at 38% 34%,#dff0ff,#5aa0ff); box-shadow:0 4px 16px rgba(0,0,0,.45); }
  .actBtn{ position:fixed; z-index:20; width:72px; height:72px; border-radius:50%; background:rgba(22,34,50,.62);
           border:2px solid rgba(255,255,255,.5); color:#fff; font-size:13px; font-weight:800; letter-spacing:.04em; backdrop-filter:blur(6px); cursor:pointer;
           box-shadow:0 4px 14px rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; transition:transform .1s,background .15s; }
  .actBtn:active{ transform:scale(.92); background:rgba(90,160,255,.7); }
  #bJump  { right:26px;  bottom:calc(40px + var(--safe-b)); }
  #bSlide { right:110px; bottom:calc(66px + var(--safe-b)); width:62px; height:62px; }
  #bRoll  { right:40px;  bottom:calc(130px + var(--safe-b)); width:58px; height:58px; font-size:11px; }
  /* HUD moderno: arriba a la izquierda, sin fondo. Nombre del mundo + misión debajo. */
  #hudWrap{ position:fixed; left:calc(18px + var(--safe-t)); top:calc(14px + var(--safe-t)); z-index:10; pointer-events:none;
        font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif; text-shadow:0 1px 6px rgba(0,0,0,.55),0 0 2px rgba(0,0,0,.4); }
  #hud{ color:#fff; font-weight:700; font-size:19px; letter-spacing:.06em; line-height:1.1; }
  #hudMission{ color:rgba(255,255,255,.82); font-weight:500; font-size:12.5px; letter-spacing:.05em; margin-top:3px; }
  #hudMission::before{ content:'◆ '; color:#7fd0ff; font-size:10px; }
  #loader{ position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
           background:#aebfcf; transition:opacity .5s; color:#0a3a63; font-size:13px; letter-spacing:.1em; }
  #loader.hide{ opacity:0; pointer-events:none; }
  /* ===== MENÚ DE INICIO (estética frutiger aero, fondo = mapa frutiger 144p difuminado) ===== */
  #menu{ position:absolute; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
         backdrop-filter:blur(20px) saturate(1.18) brightness(1.05); -webkit-backdrop-filter:blur(20px) saturate(1.18) brightness(1.05);
         background:radial-gradient(120% 90% at 50% 16%, rgba(180,225,255,.26), rgba(16,46,86,.46)); transition:opacity .45s; }
  #menu.hide{ opacity:0; pointer-events:none; }
  #menuPanel{ width:min(88%,430px); padding:26px 24px 22px; border-radius:28px; text-align:center;
    background:linear-gradient(165deg, rgba(255,255,255,.46), rgba(198,228,255,.16));
    border:1.5px solid rgba(255,255,255,.6); box-shadow:0 22px 64px rgba(10,40,80,.5), inset 0 1px 0 rgba(255,255,255,.75); }
  #menuPanel h1{ font-size:23px; font-weight:800; color:#0a3a63; margin-bottom:3px; text-shadow:0 1px 0 rgba(255,255,255,.6); }
  #menuPanel .sub{ font-size:12px; color:#1f5a8c; margin-bottom:8px; opacity:.85; }
  .mLabel{ font-size:11px; font-weight:800; letter-spacing:.14em; color:#15527f; text-align:left; margin:15px 2px 7px; opacity:.82; }
  .mRow{ display:flex; gap:8px; }
  .mOpt{ flex:1; padding:11px 6px; border-radius:14px; font-size:13px; font-weight:700; color:#0c4675; cursor:pointer;
    background:linear-gradient(180deg, rgba(255,255,255,.62), rgba(208,234,255,.22)); border:1.4px solid rgba(255,255,255,.6);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.8); transition:transform .12s, box-shadow .2s, background .2s; }
  .mOpt.sel{ background:linear-gradient(180deg,#7fd0ff,#2f93e8); color:#fff; border-color:rgba(255,255,255,.85); box-shadow:0 6px 18px rgba(40,130,230,.5), inset 0 1px 0 rgba(255,255,255,.7); }
  .mOpt:active{ transform:scale(.95); }
  /* niveles: carrusel horizontal (deslizá para elegir) → ocupa poco espacio */
  #mLevels{ flex-wrap:nowrap; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; gap:10px; padding:2px 2px 8px; }
  #mLevels .mOpt{ flex:0 0 auto; min-width:44%; scroll-snap-align:center; white-space:nowrap; }
  #mLevels::-webkit-scrollbar{ height:4px; } #mLevels::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.35); border-radius:2px; }
  #menuPanel{ max-height:90vh; overflow:auto; }
  #mPlay{ margin-top:22px; width:100%; padding:15px; border-radius:16px; font-size:16px; font-weight:800; letter-spacing:.05em; color:#fff; cursor:pointer;
    background:linear-gradient(180deg,#5ad27a,#2aa64f); border:1.5px solid rgba(255,255,255,.7); box-shadow:0 10px 26px rgba(30,150,70,.5), inset 0 1px 0 rgba(255,255,255,.7); transition:transform .12s; }
  #mPlay:active{ transform:scale(.96); }
  body.menu-open #joy, body.menu-open #bJump, body.menu-open #bSlide, body.menu-open #bRoll, body.menu-open #hudWrap, body.menu-open #cross, body.menu-open #bChat{ display:none; }
  /* ===== MULTIJUGADOR ===== */
  #mpStatus{ position:fixed; right:calc(12px + var(--safe-t)); top:calc(12px + var(--safe-t)); z-index:15; display:flex; align-items:center; gap:6px;
    background:rgba(14,22,30,.62); border:1px solid rgba(255,255,255,.16); border-radius:999px; padding:5px 10px; font-size:11px; font-weight:700; color:#cfe0ee; pointer-events:none; }
  #mpStatus::before{ content:''; width:9px; height:9px; border-radius:50%; background:#888; box-shadow:0 0 6px currentColor; }
  #mpStatus[data-s=online]{ color:#7af0a0; } #mpStatus[data-s=online]::before{ background:#43e07a; }
  #mpStatus[data-s=connecting]{ color:#ffd27a; } #mpStatus[data-s=connecting]::before{ background:#ffbf45; }
  #mpStatus[data-s=off]{ color:#ff9a9a; } #mpStatus[data-s=off]::before{ background:#e05a5a; }
  #mpChatLog{ position:fixed; left:12px; top:calc(50px + var(--safe-t)); z-index:14; width:min(56vw,300px); display:flex; flex-direction:column; gap:4px; pointer-events:none; }
  .mpMsg{ background:rgba(14,22,30,.6); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:5px 9px; font-size:12px; color:#e6f0fa; transition:opacity .6s; max-width:100%; word-wrap:break-word; }
  .mpMsg b{ color:#8fd0ff; }
  #vBoard{ position:fixed; left:calc(12px + var(--safe-t)); top:calc(96px + var(--safe-t)); z-index:14; width:min(50vw,240px); display:none; flex-direction:column; gap:3px;
    background:rgba(10,18,30,.55); border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:8px 10px; backdrop-filter:blur(7px); pointer-events:none; font-family:'Segoe UI',system-ui,sans-serif; }
  #vBoard .vbTitle{ font-size:11.5px; font-weight:800; letter-spacing:.06em; color:#9fe0ff; text-transform:uppercase; margin-bottom:3px; }
  #vBoard .vbRow{ display:flex; justify-content:space-between; gap:8px; font-size:12.5px; color:#dceaf6; }
  #vBoard .vbRow b{ color:#7fe0c0; font-weight:700; }
  #vBoard .vbRow.me span{ color:#ffe9a0; font-weight:700; }
  #vTimer{ position:fixed; left:50%; top:calc(12px + var(--safe-t)); transform:translateX(-50%); z-index:16; display:none; pointer-events:none;
    font-family:'Segoe UI',system-ui,sans-serif; font-weight:800; font-size:15px; letter-spacing:.03em; padding:6px 14px; border-radius:20px;
    background:rgba(10,18,30,.6); border:1px solid rgba(255,255,255,.18); color:#bfe6ff; backdrop-filter:blur(7px); white-space:nowrap; }
  #vTimer[data-s=urgent]{ color:#fff; background:rgba(180,30,30,.7); border-color:#ff6a6a; animation:vpulse .7s infinite; }
  #vTimer[data-s=fail]{ color:#ffd0d0; background:rgba(120,20,20,.7); }
  #vTimer[data-s=got]{ color:#0a2a18; background:linear-gradient(180deg,#9fffd0,#39e0a0); border-color:#bfffe0; }
  @keyframes vpulse{ 0%,100%{ transform:translateX(-50%) scale(1); } 50%{ transform:translateX(-50%) scale(1.07); } }
  #bChat{ position:fixed; right:26px; bottom:calc(210px + var(--safe-b)); z-index:20; width:52px; height:52px; border-radius:50%;
    background:rgba(255,255,255,.07); border:1.5px solid rgba(255,255,255,.22); color:#eef3f8; font-size:20px; backdrop-filter:blur(6px); cursor:pointer;
    display:flex; align-items:center; justify-content:center; }
  #bChat:active{ transform:scale(.92); background:rgba(90,160,255,.32); }
</style>
</head>

      <div class="mRow" id="mLang">
        <button class="mOpt sel" data-lang="es">Español</button>
        <button class="mOpt" data-lang="en">English</button>
        <button class="mOpt" data-lang="pt">Português</button>
      </div>
      <button id="mPlay" data-i18n="play">JUGAR ▶</button>
    </div>
  </div>
</div>

  if(typeof mpStatusEl!=='undefined'&&mpStatusEl&&MP.statusKey) mpStatusEl.textContent=t(MP.statusKey);

const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});

const camera=new THREE.PerspectiveCamera(90,1,0.2,1200);   // far reducido (la cúpula del cielo r=900) → mejor precisión y culling
let baseFov=90;
scene.add(camera);

function mat(color,rough){ const k=color+'_'+(rough||0.9); if(!_matCache[k])_matCache[k]=new THREE.MeshStandardMaterial({color,roughness:rough||0.9,metalness:0}); return _matCache[k]; }
function addBox(x,y,z,w,h,d,color,rough,noWall){   // (x,y,z)=centro
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat(color,rough));
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m);
  const c={minx:x-w/2,maxx:x+w/2,miny:y-h/2,maxy:y+h/2,minz:z-d/2,maxz:z+d/2,mesh:m};
  colliders.push(c); if(!noWall)wallMeshes.push(m); return c;
}

function terrainH(x,z){ const lz=z-GRASS_GZ;
  return Math.sin(x*0.035)*3.2 + Math.cos(lz*0.045)*3.2 + Math.sin((x*0.6+lz)*0.02)*5.0 + Math.cos((x-lz*0.7)*0.028)*2.2; }

  vertexShader:'varying float vh;void main(){vh=normalize(position).y;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
  fragmentShader:'varying float vh;uniform vec3 top;uniform vec3 bot;void main(){gl_FragColor=vec4(mix(bot,top,clamp(vh*0.55+0.45,0.0,1.0)),1.0);}'});

// textura procedural de fachada (concreto claro + grilla de ventanas azules), como un edificio de oficinas
function makeFacadeTex(){ const c=document.createElement('canvas'); c.width=c.height=256; const g=c.getContext('2d');
  g.fillStyle='#b8bcc1'; g.fillRect(0,0,256,256);                       // concreto claro
  const cols=4, rows=4, cw=256/cols, ch=256/rows, pad=7;
  for(let i=0;i<cols;i++)for(let j=0;j<rows;j++){
    const wx=i*cw+pad, wy=j*ch+pad, ww=cw-pad*2, wh=ch-pad*2;
    g.fillStyle='#2b323a'; g.fillRect(wx-2,wy-2,ww+4,wh+4);             // marco
    const t=0.55+Math.random()*0.45, r=(38*t+24)|0, gg=(74*t+40)|0, b=(96*t+58)|0;
    g.fillStyle=`rgb(${r},${gg},${b})`; g.fillRect(wx,wy,ww,wh);        // vidrio azul
    g.fillStyle='rgba(255,255,255,0.07)'; g.beginPath(); g.moveTo(wx,wy+wh*0.45); g.lineTo(wx+ww*0.6,wy); g.lineTo(wx+ww,wy); g.lineTo(wx,wy+wh); g.closePath(); g.fill();   // reflejo
    if(Math.random()<0.14){ g.fillStyle='rgba(255,224,168,0.55)'; g.fillRect(wx+ww*0.55,wy+wh*0.18,ww*0.28,wh*0.45); }     // alguna luz cálida
  }
  const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace; tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.anisotropy=4; return tex; }
const _facadeBase=makeFacadeTex();
const ROOF_MAT=new THREE.MeshStandardMaterial({color:0xeef1f4,roughness:1,metalness:0});   // piso/techo BLANCO
const BBOT_MAT=new THREE.MeshStandardMaterial({color:0x2a2f36,roughness:1,metalness:0});
function bldg(x,top,z,w,d){
  const tex=_facadeBase.clone(); tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  tex.repeat.set(Math.max(1,Math.round(w/3.6)), Math.max(4,Math.round(36/3.4)));            // ventanas de tamaño parejo
  const side=new THREE.MeshStandardMaterial({map:tex,roughness:1,metalness:0});
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,36,d),[side,side,ROOF_MAT,BBOT_MAT,side,side]);   // costados con textura, tope blanco

let quizL=null,quizR=null,quizPanelL=null,quizPanelR=null,quizPanelQ=null,quizWrong=null,quizArmed=false;
function setupQuiz(){ if(!quizPanelQ)return;
  const a=2+((Math.random()*8)|0), b=2+((Math.random()*8)|0), ans=a+b;
  let wrong=ans; while(wrong===ans){ wrong=ans+((Math.random()*7)|0)-3; if(wrong<1)wrong=ans+2; }
  const corrL=Math.random()<0.5;
  quizPanelQ.set(a+'+'+b+'=?','#ffffff');
  quizPanelL.set(String(corrL?ans:wrong)); quizPanelR.set(String(corrL?wrong:ans));
  unlock(quizL); unlock(quizR);              // ambas SÓLIDAS y visibles (no se sabe cuál es el hueco; la pared tapa el otro lado)
  quizWrong = corrL? quizR : quizL;          // la incorrecta es una TRAMPA: se abre el hueco al pisarla
  quizArmed = true;
}
// al pisar la plataforma incorrecta detrás de la pared, se abre el hueco y caés (sin poder agarrarte)
function tickQuiz(){ if(world!=='city'||!quizArmed||!quizWrong)return;
  if(player.pos.z>110){ quizArmed=false; return; }                                   // pasaste bien (a la unión)
  if((player.onGround||player.sliding) && player.pos.z>102.2 && player.pos.z<110){
    const onWrong=(player.pos.x<0 && quizWrong===quizL)||(player.pos.x>0 && quizWrong===quizR);
    if(onWrong){ quizWrong.locked=true; quizWrong.mesh.visible=false; quizArmed=false; player.climbing=false; }   // HUECO → caída sin agarre
  }
}

// --- cielo 360 (equirectangular): fondo del mundo de césped + mapa de entorno (la esfera metálica refleja las nubes reales) ---
const SKY_URL='https://cdn.jsdelivr.net/gh/Juniorspro/General-Assets-Games@36a6e75/assets/fp/sky360.jpg';
// hace que un panorama equirectangular sea SIN COSTURA: promedia los bordes izq/der y los funde hacia adentro (borra la línea/seam del cielo)
function makeSeamlessEquirect(img){
  const w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const g=c.getContext('2d',{willReadFrequently:true}); g.drawImage(img,0,0,w,h);
  try{ const fw=Math.max(8,Math.round(w*0.045)); const im=g.getImageData(0,0,w,h), d=im.data;
    for(let y=0;y<h;y++){ const row=y*w*4;
      for(let k=0;k<3;k++){ const E=(d[row+k]+d[row+(w-1)*4+k])*0.5;   // promedio de la columna 0 y la última
        for(let x=0;x<fw;x++){ const a=x/fw, iL=row+x*4, iR=row+(w-1-x)*4;   // a: 0 en el borde → 1 adentro
          d[iL+k]=Math.round(E*(1-a)+d[iL+k]*a); d[iR+k]=Math.round(E*(1-a)+d[iR+k]*a); } } }
    g.putImageData(im,0,0); }catch(e){}   // si la imagen está "tainted" (CORS) usa la original tal cual
  return c;
}
let skyEnv=null;
const skyTex=new THREE.Texture(); skyTex.colorSpace=THREE.SRGBColorSpace; skyTex.mapping=THREE.EquirectangularReflectionMapping; skyTex.wrapS=THREE.RepeatWrapping;
(function(){ const img=new Image(); img.crossOrigin='anonymous';
  img.onload=()=>{ skyTex.image=makeSeamlessEquirect(img); skyTex.needsUpdate=true; try{ skyEnv=pmrem.fromEquirectangular(skyTex).texture; }catch(e){} if(grassMode||world==='void') scene.environment=skyEnv; };
  img.onerror=()=>{ new THREE.TextureLoader().load(SKY_URL,tx=>{ skyTex.image=tx.image; skyTex.needsUpdate=true; try{ skyEnv=pmrem.fromEquirectangular(tx).texture; }catch(e){} }); };
  img.src=SKY_URL; })();
// --- terreno con elevaciones (sigue al jugador: re-displaza al moverse de celda) ---

// textura de pasto para el SUELO → las zonas lejanas (sin briznas 3D) igual se ven como césped (no peladas)
function makeGroundTex(){ const S=128,c=document.createElement('canvas'); c.width=c.height=S; const g=c.getContext('2d');
  g.fillStyle='#4f9e3a'; g.fillRect(0,0,S,S);
  for(let i=0;i<900;i++){ const x=Math.random()*S,y=Math.random()*S,h=2+Math.random()*5,gr=Math.random();
    g.strokeStyle=gr<0.5?`rgba(${40+gr*40|0},${110+gr*70|0},${40+gr*40|0},0.7)`:`rgba(90,175,70,0.6)`; g.lineWidth=1;
    g.beginPath(); g.moveTo(x,y); g.lineTo(x+(Math.random()-0.5)*2,y-h); g.stroke(); }
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(60,60); t.anisotropy=4; return t; }
const terrainMesh=new THREE.Mesh(terrGeo,new THREE.MeshStandardMaterial({color:0x6fbf4c,map:makeGroundTex(),roughness:1,metalness:0}));

function rebuildTerrain(cx,cz){ terrainMesh.position.set(cx,0,cz);
  const p=terrGeo.attributes.position;
  for(let i=0;i<p.count;i++){ p.setY(i, terrainH(p.getX(i)+cx, p.getZ(i)+cz)); }
  p.needsUpdate=true; terrGeo.computeVertexNormals(); terrGeo.computeBoundingSphere(); }
// --- césped GPU-instanciado, dividido en TILES (grupos) alrededor del jugador ---
// cada tile es una malla propia → three.js le aplica FRUSTUM CULLING (sólo se dibuja el césped que mirás).
// el viento sólo afecta las briznas cercanas (las lejanas quedan INMÓVILES). Densidad alta (~10x).
const TILE=10; let BLADE_SP=0.11, TILES_R=3;            // tile de 10u; densidad/cobertura según GRÁFICOS (def: medio)
const grassMat=new THREE.ShaderMaterial({ side:THREE.DoubleSide,
  uniforms:{ uTime:{value:0}, uPlayer:{value:new THREE.Vector2(0,GRASS_GZ)} },
  vertexShader:`
    uniform float uTime; uniform vec2 uPlayer;
    attribute vec2 aOffset; attribute float aRand;
    varying float vY;
    float terr(vec2 p){ float lz=p.y-2000.0;
      return sin(p.x*0.035)*3.2 + cos(lz*0.045)*3.2 + sin((p.x*0.6+lz)*0.02)*5.0 + cos((p.x-lz*0.7)*0.028)*2.2; }
    void main(){
      vec4 root = modelMatrix * vec4(aOffset.x, 0.0, aOffset.y, 1.0);   // posición mundial de la raíz (traslación del tile)
      vec2 wxz = root.xz;
      float gY = terr(wxz);
      float ang = aRand*6.2831;     float ca=cos(ang), sa=sin(ang);
      float hgt = 0.4 + aRand*0.55;
      float ty = position.y;        // 0..1 a lo largo de la brizna
      vec3 lp = position;  lp.y *= hgt;
      // viento sólo cerca del jugador → las briznas lejanas quedan inmóviles
      float windAmt = 1.0 - smoothstep(16.0, 30.0, distance(wxz, uPlayer));
      float wind = (sin(uTime*1.6 + wxz.x*0.25 + wxz.y*0.18) + 0.5*sin(uTime*2.4 + wxz.x*0.4 + wxz.y*0.3)) * windAmt;
      lp.x += wind*0.20*ty*ty;  lp.z += wind*0.12*ty*ty;
      vec3 rp = vec3(lp.x*ca - lp.z*sa, lp.y, lp.x*sa + lp.z*ca);

// genera UNA fase del obby a partir de (semilla, fase). Bien hecha: distancias saltables, dificultad creciente.
const VDIRS=[{dx:0,dz:1},{dx:1,dz:0},{dx:0,dz:-1},{dx:-1,dz:0}];   // +Z,+X,-Z,-X (todo a 90° → cajas siempre alineadas a ejes = colisión AABB correcta)
function genFase(fase){
  clearVoid();

  const R5=(a,b)=>a+rng()*(b-a), dif=Math.min(1,fase/16);

  const occ=new Set(), Q=2, pend=[];

  // ===== INICIO =====
  { const d=dir(); const px=cx+d.dx*2.5, pz=cz+d.dz*2.5; addVoidBox(px,cy,pz,6,0.5,6,0x8fa6c0); rec(px,pz,6,6); voidStart.set(px,cy+0.3,pz); cx+=d.dx*5; cz+=d.dz*5; }

}

/* ===================== CUERPO FP (UN solo GLB alta-poly + todas las animaciones; cabeza oculta colapsando el hueso Head) ===================== */
const EBASE='https://cdn.jsdelivr.net/gh/Juniorspro/General-Assets-Games@708b854/assets/fp/';
const BODY_FILE='parkour.glb';   // malla alta-poly original + 7 clips (idle/walk/run/jump/slide/wallrun/mantle) → se cambia de ANIMACIÓN, no de malla
let bodyRoot=null, bodyInner=null, bodyScale=1, bodyMixer=null, bodyHead=null, bodyNeck=null, bodyHips=null, bodyHipsBind=null;
const bodyActions={}; let curAnim=null;
const _gltf=new GLTFLoader();
_gltf.load(EBASE+BODY_FILE, gl=>{ const inner=gl.scene;
  let b=new THREE.Box3().setFromObject(inner), sz=b.getSize(new THREE.Vector3()), s=STAND/(sz.y||1); inner.scale.setScalar(s);
  b=new THREE.Box3().setFromObject(inner); const c=b.getCenter(new THREE.Vector3()); inner.position.set(-c.x,-b.min.y,-c.z);   // pies en el origen
  inner.traverse(o=>{
    if(o.isMesh){ o.castShadow=true; o.receiveShadow=true; o.frustumCulled=false;
      const ms=(Array.isArray(o.material)?o.material:[o.material]).map(m=>m?m.clone():m);   // CLONA los materiales del cuerpo local → tintar la skin no afecta a los avatares remotos (que clonan de mpBodySrc)
      o.material=Array.isArray(o.material)?ms:ms[0];
      ms.forEach(m=>{ if(m){ m.side=THREE.FrontSide; } });   // sólo caras frontales (la cabeza la oculta el near plane)
      o.userData._oc=ms.map(m=>(m&&m.color)?m.color.clone():null);   // colores originales (para volver a la skin Clásica)
      bodySkinMeshes.push(o);
    }
    if(o.isBone && /head|cabeza/i.test(o.name) && !/end|front|top/i.test(o.name)) bodyHead=o;
    if(o.isBone && /^neck$|cuello/i.test(o.name)) bodyNeck=o;
    if(o.isBone && /^Hips$|pelvis|cadera/i.test(o.name)) bodyHips=o;
  });
  bodyRoot=new THREE.Group(); bodyRoot.add(inner); scene.add(bodyRoot);
  bodyInner=inner; bodyScale=s;   // para espejar la animación en la pared derecha (wall-run)
  bodyMixer=new THREE.AnimationMixer(inner);
  gl.animations.forEach(cl=>{ const a=bodyMixer.clipAction(cl); a.setLoop(THREE.LoopRepeat); a.clampWhenFinished=false; if(cl.name==='roll') a.timeScale=ROLL_TIMESCALE; bodyActions[cl.name]=a; });
  bodyHipsBind=bodyHips?bodyHips.position.clone():null;
  setAnim('idle');
  try{ applySkin(equippedSkin); }catch(e){}   // re-aplica la skin equipada (guardada)
  mpBodySrc=inner; mpClips=gl.animations;   // fuente para clonar la MISMA skin/animaciones en los otros jugadores
}, undefined, e=>console.warn('parkour.glb',e));
function setAnim(name){ if(!bodyActions[name]||curAnim===name)return;
  const nx=bodyActions[name]; nx.reset(); if(name==='roll') nx.time=ROLL_ANIM_START; nx.enabled=true; nx.setEffectiveWeight(1); nx.play();
  if(curAnim&&bodyActions[curAnim]) nx.crossFadeFrom(bodyActions[curAnim],0.16,true);   // transición suave entre animaciones
  curAnim=name; }
function tickBody(dt,gameState){ if(!bodyRoot)return; setAnim(gameState||'idle');
  bodyRoot.position.set(player.pos.x,player.pos.y,player.pos.z); bodyRoot.rotation.y=player.faceYaw+Math.PI;
  // los clips slide_light / diagonal_wall_run están hechos para un lado (izquierda); se ESPEJAN cuando vas hacia la derecha
  if(bodyInner){ const mir=(curAnim==='wallrun'&&player.wallrun>0)||(curAnim==='slide'&&player.slideRight); bodyInner.scale.x=mir?-bodyScale:bodyScale; }
  bodyMixer.update(dt);
  // anular el root motion: las animaciones trasladan el Hips por el espacio → fijamos X/Z y limitamos Y
  if(bodyHips&&bodyHipsBind){ bodyHips.position.x=bodyHipsBind.x; bodyHips.position.z=bodyHipsBind.z;
    bodyHips.position.y=Math.max(bodyHipsBind.y-0.5,Math.min(bodyHipsBind.y+0.15,bodyHips.position.y)); }   // slide baja, wallrun no dispara la cámara
  bodyRoot.visible = (curAnim!=='roll');   // en la voltereta ocultamos el cuerpo: la inmersión la da la VUELTA DE CÁMARA (si no, el cuerpo tapa la vista)
  // la cabeza se oculta con el near plane (la cámara está EN la cabeza): sin cortes, sin deformación, sin agujero
}

/* ===================== Colisión AABB (capsula≈caja) por eje ===================== */
function aabbHit(){ return null; }
function pAABB(){ return {minx:player.pos.x-R,maxx:player.pos.x+R,miny:player.pos.y,maxy:player.pos.y+player.h,minz:player.pos.z-R,maxz:player.pos.z+R}; }
function overlap(a,c){ return a.minx<c.maxx&&a.maxx>c.minx&&a.miny<c.maxy&&a.maxy>c.miny&&a.minz<c.maxz&&a.maxz>c.minz; }
let lastWall=null;   // collider de la última pared tocada en X/Z (para wallrun/trepar)
function moveX(d){ if(grassMode){ player.pos.x=Math.max(-GBND.x,Math.min(GBND.x,player.pos.x+d)); return; } player.pos.x+=d; const a=pAABB(); for(const c of colliders){ if(c.mesh===ground||c.locked)continue; if(overlap(a,c)){ player.pos.x = d>0? c.minx-R : c.maxx+R; player.vel.x=0; lastWall=c; a.minx=player.pos.x-R; a.maxx=player.pos.x+R; } } }
function moveZ(d){ if(grassMode){ player.pos.z=Math.max(GBND.z0,Math.min(GBND.z1,player.pos.z+d)); return; } player.pos.z+=d; const a=pAABB(); for(const c of colliders){ if(c.mesh===ground||c.locked)continue; if(overlap(a,c)){ player.pos.z = d>0? c.minz-R : c.maxz+R; player.vel.z=0; lastWall=c; a.minz=player.pos.z-R; a.maxz=player.pos.z+R; } } }
function moveY(d){ if(grassMode||dreamMode){ player.pos.y+=d; const g=terrainH(player.pos.x,player.pos.z); player.onGround=false;
    if(player.pos.y<=g){ player.pos.y=g; player.vy=0; player.onGround=true; }                              // suelo o subida
    else if(player.vy<=0 && player.vy>-3.0 && player.pos.y-g<=0.9){ player.pos.y=g; player.vy=0; player.onGround=true; }   // PEGARSE al bajar pendientes suaves (evita el parpadeo de onGround). vy>0 (salto) y caídas rápidas quedan excluidas
    return; } player.pos.y+=d; const a=pAABB(); player.onGround=false;
  // sin piso infinito: si te caés del borde, caés al cielo y reaparecés (ver respawn)
  for(const c of colliders){ if(c.locked)continue; if(overlap(a,c)){
    if(d<=0){ player.pos.y=c.maxy; player.vy=0; player.onGround=true; }   // caer sobre algo
    else { player.pos.y=c.miny-player.h; player.vy=0; }                    // pegar el techo
    a.miny=player.pos.y; a.maxy=player.pos.y+player.h; } } }

const _ray=new THREE.Raycaster(); _ray.far=R+0.35;
function wallSide(side){   // side=+1 derecha, -1 izquierda (respecto al facing)
  const dir=_v2.set(Math.cos(player.yaw)*side, 0, -Math.sin(player.yaw)*side).normalize();
  _ray.set(_v.set(player.pos.x,player.pos.y+1.0,player.pos.z), dir);
  const hit=_ray.intersectObjects(wallMeshes,false)[0];
  if(hit && Math.abs(hit.face.normal.y)<0.3){ return {n:hit.face.normal.clone().applyQuaternion(hit.object.quaternion), d:hit.distance}; }
  return null;
}

    grassMat.uniforms.uPlayer.value.set(player.pos.x,player.pos.z);   // viento centrado en el jugador (lejos = inmóvil)
    relocateTiles(player.pos.x,player.pos.z);                          // los tiles de césped siguen al jugador (frustum culling por tile)
    const sx=Math.round(player.pos.x/12)*12, sz=Math.round(player.pos.z/12)*12;   // re-displazar el terreno al cambiar de celda
    if(sx!==terrSnap.x||sz!==terrSnap.y){ rebuildTerrain(sx,sz); terrSnap.set(sx,sz); }

      if(dreamDoorReady){ const dx=player.pos.x-dreamDoorPos.x, dz=player.pos.z-dreamDoorPos.z;   // PUERTA ABIERTA → backrooms
        if(dx*dx+dz*dz<1.9*1.9 && Math.abs(player.pos.y-dreamDoorPos.y)<3.2) enterBackrooms(); } }
  }

  if(world==='space') tickSpace(dt);   // base espacial: plataformas → el vacío
  if(world==='void') tickVoid(dt);      // EL VACÍO: obby infinito por fases (líneas rojas, caída, meta)
  if(world==='pool'){ tickPoolGoal();   // meta de las poolrooms + caer al agua = reinicio
    if(player.pos.y < POOL_W-1.2){ player.pos.copy(poolStart); player.vel.set(0,0,0); player.vy=0; player.onGround=true; player.noRoll=true; } }
  if(world==='crystal'){ tickMovers(dt); tickCrystalGoal();   // plataformas móviles + meta del obby
    if(player.pos.y < CF-4){   // CAÍSTE al suelo del terrario → reiniciar el obby DESDE EL INICIO (no al mapa)
      player.pos.copy(CSTART); player.vel.set(0,0,0); player.vy=0; player.onGround=true;
      player.sliding=player.rolling=player.climbing=false; player.wallrun=0;
      }
  }
  if(player.onGround){ for(const cp of checkpoints){ if(player.pos.x>cp.minx&&player.pos.x<cp.maxx&&player.pos.z>cp.minz&&player.pos.z<cp.maxz){ lastSafe.copy(cp.pos); break; } } }   // checkpoint al pisar un edificio
  forward.set(-Math.sin(player.yaw),0,-Math.cos(player.yaw)); right.set(Math.cos(player.yaw),0,-Math.sin(player.yaw));
  let ix=joy.x,iz=joy.y; const mag=Math.min(1,Math.hypot(ix,iz)); if(mag>1){ix/=mag;iz/=mag;}
  const wishX=right.x*ix - forward.x*iz, wishZ=right.z*ix - forward.z*iz;   // dirección deseada (mundo)
  const wishLen=Math.hypot(wishX,wishZ);

  let estado='';
  // ---- CLIMB en progreso (agarre de repisa + impulso hacia arriba) ----
  if(player.climbing){
    player.climbT+=dt; const ct=Math.min(1,player.climbT/CLIMB_DUR); const e=ct*ct*(3-2*ct);
    player.pos.lerpVectors(player.climbFrom,player.climbTo,e); estado=t('st_climb');
    if(ct>=1){ player.climbing=false; player.onGround=true; player.vy=0; player.vel.set(0,0,0); }
  } else if(player.autoClimb){
    // ---- ENREDADERAS: subís SOLO por la cara del cubo; saltá para impulsarte al cubo del costado ----
    const cube=player.autoClimb; player.vy=0; player.vel.set(0,0,0); player.pos.y+=CLIMB_UP*dt; estado=t('st_climb');
    if(jumpReq){ jumpReq=false; player.autoClimb=null; player.vy=JUMP_V*1.02; player.vel.set(forward.x*10.5,0,forward.z*10.5); }   // saltar = impulsarse hacia donde mirás
    else if(player.pos.y>=cube.maxy){ player.pos.y=cube.maxy; player.autoClimb=null; player.onGround=true; }   // llegaste arriba
  } else if(player.rolling){
    // ---- VOLTERETA (rodar): avanza en la dirección de la voltereta y sigue colisionando ----
    player.rollT+=dt; const k=Math.max(0,1-player.rollT/ROLL_DUR); const spd=ROLL_SPEED*(0.45+0.55*k);
    player.vel.x=player.rollDir.x*spd; player.vel.z=player.rollDir.z*spd; estado=t('st_roll');
    player.vy-=GRAV*dt; lastWall=null;
    moveX(player.vel.x*dt); moveZ(player.vel.z*dt); moveY(player.vy*dt);
    if(player.rollT>=ROLL_DUR) player.rolling=false;
  } else {
  // ---- SLIDE ----
  if(player.sliding){ player.slideT+=dt; player.h=CROUCH;
    player.vel.multiplyScalar(1-Math.min(1,1.6*dt));    // fricción del deslizamiento (tiempo original)
    if(player.slideT>0.9 || player.vel.length()<2.5 || !player.onGround) { player.sliding=false; }
  }

  // ---- WALL-RUN ---- (en el aire, pared al costado, joystick hacia adelante)
  if(!player.onGround && player.vy<3 && wishLen>0.3){
    let w=wallSide(1)||wallSide(-1);
    if(w){ player.wallrun=Math.sign( (wallSide(1)?1:-1) ); player.wallrunT+=dt; player.wallN.copy(w.n); estado=t('st_wallrun');
      if(player.wallrunT<WALLRUN_MAX){
        player.vy=Math.max(player.vy,-0.5);                          // casi sin caer
        // empuje a lo largo de la pared (tangente) en la dirección del facing
        const tx=forward.x, tz=forward.z; const tl=Math.hypot(tx,tz)||1;
        player.vel.x=tx/tl*RUN; player.vel.z=tz/tl*RUN;
      } else { player.wallrun=0; }
    } else { player.wallrun=0; player.wallrunT=0; }
  } else { player.wallrun=0; if(player.onGround)player.wallrunT=0; }

  // ---- JUMP / WALL-JUMP ----
  if(jumpReq){ jumpReq=false;
    if(player.onGround){ player.vy=world==='space'?JUMP_V*1.35:JUMP_V; player.onGround=false; if(player.sliding)player.sliding=false; }   // espacio: salto más alto (gravedad baja)
    else if(player.wallrun){ player.vy=JUMP_V*0.92; player.vel.addScaledVector(player.wallN,7.5); player.wallrun=0; player.wallrunT=WALLRUN_MAX; }   // saltar de la pared
  }

  // ---- locomoción horizontal ----
  if(!player.sliding && !player.wallrun){
    const sp=RUN*(player.crouch?0.5:1);
    const accel=player.onGround?ACCEL:AIR_ACCEL;
    const desX=wishLen>0.01? (wishX/wishLen)*sp*Math.min(1,wishLen) : 0;
    const desZ=wishLen>0.01? (wishZ/wishLen)*sp*Math.min(1,wishLen) : 0;
    player.vel.x+=(desX-player.vel.x)*Math.min(1,accel*dt);
    player.vel.z+=(desZ-player.vel.z)*Math.min(1,accel*dt);
  }

  // ---- VOLTERETA: botón estando en el piso y en movimiento, o automática al caer de muy alto ----
  prevVy=player.vy;
  if(rollReq && !player.rolling && !player.sliding && !player.climbing){   // RODAR también en el aire / al saltar
    const hsp=Math.hypot(player.vel.x,player.vel.z);
    player.rollDir.copy(hsp>1.5? _v.set(player.vel.x,0,player.vel.z).normalize() : forward);
    player.rolling=true; player.rollT=0;
  }
  rollReq=false;

  // ---- gravedad + integración con colisión por eje ----
  player.vy-=(player.wallrun?WALL_GRAV:(world==='space'?GRAV*0.45:GRAV))*dt;   // gravedad baja en el espacio (saltos largos)
  lastWall=null;
  moveX(player.vel.x*dt); moveZ(player.vel.z*dt);
  moveY(player.vy*dt);

  // aterrizaje fuerte (caída de muy alto) → rodar automáticamente para "amortiguar" (salvo al caer dentro de un mundo: noRoll)
  if(player.onGround && prevVy < -ROLL_FALL && !player.rolling && !player.noRoll){
    const hsp=Math.hypot(player.vel.x,player.vel.z);
    player.rollDir.copy(hsp>1.5? _v.set(player.vel.x,0,player.vel.z).normalize() : forward);
    player.rolling=true; player.rollT=0;
  }
  if(player.onGround) player.noRoll=false;   // la gracia anti-voltereta dura hasta el primer aterrizaje

  // ---- AGARRE DE REPISA: salté a una superficie alta y no llegué → me agarro del BORDE real y subo ----
  if(lastWall && !player.onGround && player.vy<2 && !player.climbing && !player.rolling){
    const top=lastWall.maxy, foot=player.pos.y, rise=top-foot;
    if(rise>=1.4 && rise<=2.4){   // sólo repisas altas (al alcance de las manos); las bajas se suben saltando
      const a={minx:player.pos.x-R,maxx:player.pos.x+R,miny:top+0.02,maxy:top+player.h,minz:player.pos.z-R,maxz:player.pos.z+R};
      let blocked=false; for(const c of colliders){ if(c.mesh===ground||c.locked||c===lastWall)continue; if(overlap(a,c)){blocked=true;break;} }
      if(!blocked){
        // BORDE real: punto del techo de la repisa más cercano al jugador (no un lugar fijo)
        const ex=Math.max(lastWall.minx,Math.min(lastWall.maxx,player.pos.x));
        const ez=Math.max(lastWall.minz,Math.min(lastWall.maxz,player.pos.z));
        const wcx=(lastWall.minx+lastWall.maxx)/2, wcz=(lastWall.minz+lastWall.maxz)/2;   // hacia el centro = adentro de la repisa
        let inx=wcx-ex, inz=wcz-ez; const il=Math.hypot(inx,inz)||1; inx/=il; inz/=il;
        player.climbing=true; player.climbT=0; player.vy=0; player.vel.set(0,0,0);
        player.climbFrom.set(ex, Math.min(foot,Math.max(foot-0.4, top-GRAB_REACH)), ez);   // manos AL borde (altura de agarre)
        player.climbTo.set(ex+inx*0.5, top, ez+inz*0.5);                                    // termina arriba, un poco adentro
        estado=t('st_climb');
      }
    }
  }
  } // fin del else (física normal)
  if(player.sliding)estado=t('st_slide');

  // altura/ojo (de pie / agachado / deslizando)
  if(!player.sliding && !player.crouch) player.h=STAND;
  const targetEye=(player.sliding||player.crouch)?EYE_CR:EYE; player.eye+=(targetEye-player.eye)*Math.min(1,12*dt);

  // ---- animar el cuerpo PRIMERO (así el hueso de la cabeza ya tiene su transform de este frame) ----
  const sp=Math.hypot(player.vel.x,player.vel.z);
  // estado de animación según lo que hace el jugador (parkour)
  const animState = player.climbing ? 'climb'
    : player.rolling ? 'roll'
    : player.sliding ? 'slide'
    : player.wallrun ? 'wallrun'
    : !player.onGround ? 'jump'
    : (sp<0.5 ? 'idle' : ((mag>0.82 || sp>=4.2) ? 'run' : 'walk'));   // joystick a fondo o velocidad alta → CORRER
  // el cuerpo/piernas miran hacia donde MIRÁS, no hacia donde camina el joystick
  player.faceYaw = player.yaw;
  tickBody(dt, animState);
  // roll: inclina al correr por pared
  let targetRoll=0;
  if(player.wallrun) targetRoll += player.wallrun*0.28;
  player.roll+=(targetRoll-player.roll)*Math.min(1,10*dt);
  // FOV kick por velocidad / wallrun / slide
  const targetFov=baseFov + Math.min(5,sp*0.4) + (player.wallrun?4:0) + (player.sliding?6:0);   // base 90: kicks suaves
  player.fov+=(targetFov-player.fov)*Math.min(1,6*dt); if(Math.abs(camera.fov-player.fov)>0.05){camera.fov=player.fov;camera.updateProjectionMatrix();}
  // ---- cámara FP: a la altura de la cabeza (bob vertical real del hueso) pero CENTRADA en el cuerpo ----
  // XZ estable (centro del cuerpo + un poco adelante) → quieto miras AL FRENTE, no al hombro; sólo la ALTURA viene del hueso de la cabeza
  if(bodyHead && !player.rolling){ bodyHead.getWorldPosition(_camAnchor); }     // la cámara va EN la cabeza (sigue su posición; la cabeza queda oculta por el near-plane)
  else { _camAnchor.set(player.pos.x, player.pos.y+EYE, player.pos.z); }         // roll/carga: altura estable → la vuelta de cámara queda limpia (no se traga el cuerpo)
  const fwH=_v.set(-Math.sin(player.yaw),0,-Math.cos(player.yaw));
  // al deslizarse: baja un poquito y queda un poco ADELANTE de la cabeza — suave
  const targetLow = player.sliding ? 0.2 : 0;
  const targetBack = player.sliding ? -0.18 : 0;   // negativo = un poco hacia adelante
  player.camLow += (targetLow - player.camLow)*Math.min(1,12*dt);
  player.camBack += (targetBack - player.camBack)*Math.min(1,12*dt);
  const fwd = CAM_FWD - player.camBack;
  camera.position.set(_camAnchor.x + fwH.x*fwd, _camAnchor.y + CAM_UP - player.camLow, _camAnchor.z + fwH.z*fwd);
  // ---- LEAN: la cámara se inclina hacia adelante al correr/deslizar (se mueve con el cuerpo, no queda dura) ----
  const moveAmt=Math.min(1,sp/RUN);
  const targetLean = -0.17*moveAmt - (player.sliding?0.12:0);        // adelante (mirar un poco abajo) según velocidad
  leanPitch += (targetLean-leanPitch)*Math.min(1,5*dt);
  player.bob += dt*(7*moveAmt+0.001);                               // cadencia de pasos
  const targetRollB = Math.sin(player.bob)*0.03*moveAmt;             // balanceo suave al caminar/correr
  leanRoll += (targetRollB-leanRoll)*Math.min(1,8*dt);
  // VOLTERETA: la cámara da una vuelta completa hacia adelante (inmersión total del giro)
  let rollCam=0;
  if(player.rolling){ const t=Math.min(1,player.rollT/ROLL_DUR); rollCam = -2*Math.PI*(t*t*(3-2*t)); }
  euler.set(player.pitch+leanPitch+rollCam, player.yaw, player.roll+leanRoll); camera.quaternion.setFromEuler(euler);

  sun.position.set(player.pos.x-40,80,player.pos.z-50); sun.target.position.copy(player.pos); sun.target.updateMatrixWorld();
  // ---- EYE ADAPTATION: rayo del jugador hacia el sol; si lo tapa la esfera/árbol → sombra → más exposición ----
  if(grassMode){
    let tgt=1.16;
    if(eyeAdapt && shadowCasters.length){
      const sdir=_v.set(sun.position.x-player.pos.x, sun.position.y-player.pos.y, sun.position.z-player.pos.z).normalize();
      _shadowRay.set(_v2.set(player.pos.x,player.pos.y+1.4,player.pos.z), sdir); _shadowRay.far=260;
      tgt = _shadowRay.intersectObjects(shadowCasters,false).length>0 ? 1.66 : 1.04;   // sombra=pupila abierta / sol=cerrada
    }
    expoCur += (tgt-expoCur)*Math.min(1, (eyeAdapt?1.9:4)*dt);   // lag lento → al salir de la sombra "deslumbra"
    renderer.toneMappingExposure=expoCur;
  }
}
/* ===================== GRÁFICOS (presets de calidad) ===================== */
// densidad/cobertura del césped optimizadas: low≈62k, med≈127k, high≈290k (antes 694k). r=radio de tiles (cobertura), sp=separación de briznas
const QUAL={ low:{pr:1.0,shadow:0,glass:false,adapt:false,sp:0.20,r:2}, med:{pr:1.5,shadow:1024,glass:false,adapt:true,sp:0.14,r:2}, high:{pr:2.0,shadow:2048,glass:true,adapt:true,sp:0.13,r:3} };
let quality='med';
function applyQuality(q){ quality=q; const Q=QUAL[q]||QUAL.med;
  BLADE_SP=Q.sp; TILES_R=Q.r;   // densidad/cobertura del césped según calidad (se aplica antes de construir los tiles)
  renderer.setPixelRatio(Math.min(devicePixelRatio,Q.pr));
  const wantShadow=Q.shadow>0;
  if(renderer.shadowMap.enabled!==wantShadow){ renderer.shadowMap.enabled=wantShadow; renderer.shadowMap.needsUpdate=true; }
  sun.castShadow=wantShadow;
  if(wantShadow){ if(sun.shadow.map){ sun.shadow.map.dispose(); sun.shadow.map=null; } sun.shadow.mapSize.set(Q.shadow,Q.shadow); }
  eyeAdapt=Q.adapt;
  if(orbMeshRef && orbGlass && orbGloss) orbMeshRef.material = Q.glass? orbGlass : orbGloss;
  // PASTO LEJANO estático: off en BAJO (queda pelado como ahora), on en medio/alto para rellenar las zonas lejanas
  FAR.on=(q!=='low'); FAR.sp=(q==='high')?1.6:2.2; FAR.half=(q==='high')?72:55;
  if(FAR.on){ buildFarGrass(); rebuildFarInstances(); farSnap.set(1e12,1e12); }
  layout();
}

  scene.fog.color.set(0xdfeef9); scene.fog.near=130; scene.fog.far=900;

function mpRemote(id,name){ let r=MP.remotes.get(id);

    r={ id,name,color:mpColor(id),world:null,anim:'idle',moving:false,mir:false,yaw:0, pos:new THREE.Vector3(), target:new THREE.Vector3(),
      avatar:av, last:performance.now(), bob:0, init:false, rigged:false }; MP.remotes.set(id,r); mpRig(r);
    mpChatIn('🟢', (name||'?')+' '+t('mp_join')); }   // aviso de que se unió
  return r; }
function mpChatIn(name,text){ if(!text)return; const log=document.getElementById('mpChatLog'); if(!log)return;
  const el=document.createElement('div'); el.className='mpMsg'; el.innerHTML='<b>'+mpEsc(name)+':</b> '+mpEsc(text); log.appendChild(el);
  while(log.children.length>6) log.removeChild(log.firstChild);
  setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),700); }, 8000); }
function mpSendChat(){ if(!MP.on){ mpChatIn('', t('mp_nochat')); return; }
  const msg=prompt(t('mp_chat')); if(msg&&msg.trim()){ const txt=msg.trim().slice(0,120);
    MP.client.publish(MP.room+'/chat',JSON.stringify({id:MP.id,name:MP.name,text:txt}),{qos:0}); mpChatIn(MP.name,txt); } }
function mpConnect(){
  if(typeof mqtt==='undefined'){ mpSetStatus('off','mp_nonet'); return; }
  mpSetStatus('connecting','mp_conn');
  let client; try{ client=mqtt.connect('wss://broker.emqx.io:8084/mqtt',{connectTimeout:8000,reconnectPeriod:5000,clean:true}); }
  catch(e){ mpSetStatus('off','mp_nonet'); return; }
  MP.client=client;
  client.on('connect',()=>{ MP.on=true; mpSetStatus('online','mp_online'); client.subscribe([MP.room+'/state',MP.room+'/chat',MP.room+'/action'],{qos:0}); });
  client.on('reconnect',()=>mpSetStatus('connecting','mp_conn'));
  client.on('close',()=>{ MP.on=false; mpSetStatus('off','mp_off'); });
  client.on('error',()=>{ MP.on=false; mpSetStatus('off','mp_err'); });
  client.on('message',(topic,buf)=>{ let d; try{ d=JSON.parse(buf.toString()); }catch(e){ return; } if(!d||d.id===MP.id)return;
    if(topic.slice(-6)==='/state'){ const r=mpRemote(d.id,d.name||'jugador'); r.name=d.name||r.name; r.world=d.world; r.anim=d.anim||'idle'; r.moving=!!d.isMoving; r.mir=!!d.mir; r.yaw=d.facingAngle||0;
      r.vSeed=d.vSeed||0; r.vFase=d.vFase||0; r.vBest=d.vBest||0; r.vDead=!!d.vDead;   // estado del vacío (semilla compartida + mejor fase)
      r.target.set(d.x||0,d.y||0,d.z||0); if(!r.init){ r.init=true; r.pos.copy(r.target); } r.last=performance.now();
      if(world==='void') updateVoidBoard(); }
    else if(topic.slice(-5)==='/chat'){ mpChatIn(d.name||'?', d.text||''); }
    else if(topic.slice(-7)==='/action'){ /* eventos discretos (emotes/hits): aplicar localmente */ if(d.type==='hit_player' && d.targetId===MP.id){ /* este juego no tiene daño */ } }
  });
}
function mpPublishState(){ if(!MP.on||!MP.client)return; const now=performance.now(); if(now-MP.lastPub<100)return;
  const p=player, moving=Math.hypot(p.vel.x,p.vel.z)>0.6;
  const mir=(curAnim==='wallrun'&&p.wallrun>0)||(curAnim==='slide'&&p.slideRight);   // mismo espejo que el cuerpo local
  const cur={x:+p.pos.x.toFixed(2),y:+p.pos.y.toFixed(2),z:+p.pos.z.toFixed(2),yaw:+p.yaw.toFixed(2),anim:curAnim||'idle',world,moving,mir,
    vSeed:world==='void'?voidSeed:0, vFase:voidFase, vBest:voidBest, vDead:voidDead};
  const l=MP.last, ch=(l.x===undefined)||Math.abs(cur.x-l.x)>0.03||Math.abs(cur.y-l.y)>0.03||Math.abs(cur.z-l.z)>0.03||Math.abs(cur.yaw-l.yaw)>0.05||cur.anim!==l.anim||cur.world!==l.world||cur.moving!==l.moving||cur.mir!==l.mir||cur.vSeed!==l.vSeed||cur.vFase!==l.vFase||cur.vBest!==l.vBest||cur.vDead!==l.vDead;
  if(!ch)return; MP.lastPub=now; MP.last=cur;
  MP.client.publish(MP.room+'/state', JSON.stringify({id:MP.id,name:MP.name,x:cur.x,y:cur.y,z:cur.z,facingAngle:cur.yaw,anim:cur.anim,world:cur.world,isMoving:cur.moving,mir:cur.mir,vSeed:cur.vSeed,vFase:cur.vFase,vBest:cur.vBest,vDead:cur.vDead}),{qos:0}); }
function mpTick(dt){
  const now=performance.now();
  for(const [id,r] of MP.remotes){ if(now-r.last>5000){ scene.remove(r.avatar); MP.remotes.delete(id); continue; }   // limpieza por timeout
    if(!r.rigged && mpBodySrc){ if(r.body)r.avatar.remove(r.body); mpRig(r); }                                       // al cargar el GLB, cambia la cápsula por la skin real
    r.pos.lerp(r.target, Math.min(1,10*dt));                                                                        // interpolación (10Hz → 60fps suave)
    const same=(r.world===world); r.avatar.visible=same;                                                            // solo se ven los del MISMO mundo
    if(!same)continue;
    r.avatar.position.set(r.pos.x, r.pos.y, r.pos.z); r.avatar.rotation.y=r.yaw+Math.PI;
    if(r.rigged && r.mixer){ r.setAnim(r.anim||'idle'); r.mixer.update(dt);                                          // MISMA animación que está haciendo el otro
      if(r.body) r.body.scale.x = r.mir? -r.sx : r.sx;                                                               // espejo (slide/wallrun a la derecha)
      if(r.hips&&r.hipsBind){ r.hips.position.x=r.hipsBind.x; r.hips.position.z=r.hipsBind.z; } }                     // anula solo el root-motion horizontal; Y libre (sin apretar la cintura)
    else if(r.body){ r.bob+=dt*8*(r.moving?1:0); r.avatar.position.y += Math.abs(Math.sin(r.bob))*0.06; } }         // cápsula provisional
  mpPublishState();
}

/* ===================== Init ===================== */
setupQuiz();   // randomiza las sumas del edificio 4
applyLang(lang);   // aplica el idioma guardado a todo el menú/HUD/botones
try{
  enterGrass(false);                  // arma el mundo frutiger (terreno+estructura+cielo) como FONDO del menú, SIN briznas (carga liviana)
  renderer.setPixelRatio(0.32);       // render bajo (~144p) → difuminado por CSS detrás del menú
  document.body.classList.add('menu-open');
  layout(); renderer.render(scene,camera);
  setTimeout(()=>document.getElementById('loader').classList.add('hide'),250);
}
catch(err){ console.error('Init',err); document.getElementById('loader').classList.add('hide'); }
try{ tapBtn('bChat',()=>mpSendChat()); mpConnect(); }catch(e){ console.warn('multijugador no disponible',e); }   // overlay: solo se activa si conecta
animate();
</script>
