<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#aebfcf" />
<title>Parkour FP</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<style>
  :root{ --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px); }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ height:100%; overflow:hidden; background:#aebfcf; font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; color:#eef3f8; overscroll-behavior:none; }
  #stage{ position:fixed; inset:0; }
  body.rot #stage{ width:100vh; height:100vw; top:50%; left:50%; transform:translate(-50%,-50%) rotate(90deg); transform-origin:center; }
  #app{ position:absolute; inset:0; }
  #app canvas{ display:block; width:100%!important; height:100%!important; touch-action:none; }
  #cross{ position:fixed; left:50%; top:50%; width:6px; height:6px; margin:-3px; z-index:6; border-radius:50%; background:rgba(255,255,255,.6); box-shadow:0 0 4px rgba(0,0,0,.6); pointer-events:none; }
  #joy{ position:fixed; left:26px; bottom:calc(28px + var(--safe-b)); z-index:20; width:128px; height:128px; border-radius:50%;
        background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.18); backdrop-filter:blur(6px); touch-action:none; }
  #joyKnob{ position:absolute; left:50%; top:50%; width:52px; height:52px; margin:-26px 0 0 -26px; border-radius:50%;
            background:radial-gradient(circle at 38% 34%,#dff0ff,#5aa0ff); box-shadow:0 4px 16px rgba(0,0,0,.45); }
  .actBtn{ position:fixed; z-index:20; width:72px; height:72px; border-radius:50%; background:rgba(255,255,255,.07);
           border:1.5px solid rgba(255,255,255,.22); color:#eef3f8; font-size:13px; font-weight:800; letter-spacing:.04em; backdrop-filter:blur(6px); cursor:pointer;
           display:flex; align-items:center; justify-content:center; transition:transform .1s,background .15s; }
  .actBtn:active{ transform:scale(.92); background:rgba(90,160,255,.32); }
  #bJump  { right:26px;  bottom:calc(40px + var(--safe-b)); }
  #bSlide { right:110px; bottom:calc(66px + var(--safe-b)); width:62px; height:62px; }
  #bRoll  { right:40px;  bottom:calc(130px + var(--safe-b)); width:58px; height:58px; font-size:11px; }
  #hud{ position:fixed; left:50%; top:calc(14px + var(--safe-t)); transform:translateX(-50%); z-index:10;
        background:rgba(14,22,30,.72); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.16); border-radius:999px;
        padding:7px 16px; color:#ffd27a; font-weight:700; font-size:14px; letter-spacing:.02em; white-space:nowrap;
        box-shadow:0 6px 20px rgba(0,0,0,.45); pointer-events:none; }
  #loader{ position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
           background:#aebfcf; transition:opacity .5s; color:#0a3a63; font-size:13px; letter-spacing:.1em; }
  #loader.hide{ opacity:0; pointer-events:none; }
</style>
</head>
<body>
<div id="loader">cargando parkour…</div>
<div id="stage">
  <div id="app"></div>
  <div id="cross"></div>
  <div id="joy"><div id="joyKnob"></div></div>
  <button id="bJump"  class="actBtn">SALTAR</button>
  <button id="bSlide" class="actBtn">DESLIZAR</button>
  <button id="bRoll"  class="actBtn">RODAR</button>
  <div id="hud">…</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* ===================== Render / escena ===================== */
const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0;
renderer.localClippingEnabled=true;   // para recortar la cabeza del cuerpo (sólo en el material del cuerpo)
app.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x9fc4e8);
scene.fog=new THREE.Fog(0xcfe3f5,150,640);   // niebla suave hacia el horizonte (estamos alto en el cielo)
const pmrem=new THREE.PMREMGenerator(renderer); scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;
// La cámara va EN la cabeza (sigue su inclinación al correr), así la cabeza queda siempre dentro del near plane (0.2)
// y se recorta limpia: sin deformar la malla, sin cortes abiertos, sin agujero.
const camera=new THREE.PerspectiveCamera(90,1,0.2,2000);
let baseFov=90;
scene.add(camera);

const sun=new THREE.DirectionalLight(0xfff2e0,2.3); sun.position.set(-40,80,-50); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=1; sun.shadow.camera.far=240;
sun.shadow.camera.left=-60; sun.shadow.camera.right=60; sun.shadow.camera.top=60; sun.shadow.camera.bottom=-60; sun.shadow.bias=-0.0004; sun.shadow.normalBias=0.04;
scene.add(sun); scene.add(sun.target);
scene.add(new THREE.HemisphereLight(0xdfeeff,0x9aa6b2,0.9));

/* ===================== MUNDO + COLISIÓN (AABB) — pista de pruebas de parkour ===================== */
const colliders=[];      // {minx,maxx,miny,maxy,minz,maxz, mesh}
const wallMeshes=[];     // para raycast de pared (wallrun / trepar)
const ground=null;       // ya no hay piso infinito: el mundo son techos de edificios (te caés al cielo → respawn)
const _matCache={};
function mat(color,rough){ const k=color+'_'+(rough||0.9); if(!_matCache[k])_matCache[k]=new THREE.MeshStandardMaterial({color,roughness:rough||0.9,metalness:0}); return _matCache[k]; }
function addBox(x,y,z,w,h,d,color,rough,noWall){   // (x,y,z)=centro
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat(color,rough));
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m);
  const c={minx:x-w/2,maxx:x+w/2,miny:y-h/2,maxy:y+h/2,minz:z-d/2,maxz:z+d/2,mesh:m};
  colliders.push(c); if(!noWall)wallMeshes.push(m); return c;
}
// ===== CIELO (cúpula con degradé; estamos arriba en el cielo) =====
const skyMat=new THREE.ShaderMaterial({side:THREE.BackSide,depthWrite:false,fog:false,
  uniforms:{top:{value:new THREE.Color(0x3f78c0)},bot:{value:new THREE.Color(0xd9eaf7)}},
  vertexShader:'varying float vh;void main(){vh=normalize(position).y;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
  fragmentShader:'varying float vh;uniform vec3 top;uniform vec3 bot;void main(){gl_FragColor=vec4(mix(bot,top,clamp(vh*0.55+0.45,0.0,1.0)),1.0);}'});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1000,24,14),skyMat));

// ===== helpers =====
function zoneTag(x,z,color){ const m=new THREE.Mesh(new THREE.BoxGeometry(2.2,0.05,2.2),mat(color,0.6)); m.position.set(x,0.04,z); scene.add(m); }
function plat(x,top,z,w,d,col){ return addBox(x,top-0.2,z,w,0.4,d,col||0x76828f); }
// viga baja para deslizarse por debajo, sobre un techo a la altura 'top'
function slideBeam(x,z,top,col){ addBox(x,top+1.25,z,4.5,0.5,1.1,col||0x7a5566);
  addBox(x-1.8,top+0.6,z,0.5,1.6,1.1,col||0x7a5566,0.9,true); addBox(x+1.8,top+0.6,z,0.5,1.6,1.1,col||0x7a5566,0.9,true); }
// edificio: techo caminable a la altura 'top'; baja 36u hacia el cielo
const BCOL=[0x8a96a3,0x7e8a98,0x93a0ad,0x76828f,0x88949f]; let _bi=0;
function bldg(x,top,z,w,d){ addBox(x,top-18,z,w,36,d,BCOL[_bi++%BCOL.length],1,true); }

// ===== EDIFICIO DE SALIDA: chico y VACÍO =====
bldg(0,0,2,14,14);

// ===== SALTAR DE EDIFICIO EN EDIFICIO (cada techo a distinta altura/distancia) =====
bldg(0,0.4,18,11,11);     // salto corto +Z
bldg(-4,1.3,30,10,10);    // sube un poco
bldg(8,1.0,39,11,10);     // a la derecha
bldg(9,-0.8,52,12,11);    // caída suave
bldg(21,0.5,51,10,10);
bldg(33,2.3,42,11,11);    // MÁS ALTO → al saltar no llegás del todo y TREPÁS el borde
bldg(33,0.2,28,11,11);    // caída
bldg(45,1.0,18,14,13);    // techo final (grande)
zoneTag(45,18,0xffd24a); addBox(45,2.0,18,2.4,1.6,2.4,0xffd24a);   // META (pedestal dorado)

// ----- features de parkour entre techos -----
addBox(15.5,2.4,46,0.6,4.4,9,0x5b6b86);   // pared CORTA para correr por pared (cruzar un hueco)
slideBeam(41,18,1.0);                       // DESLIZAR: viga baja en el techo final
// TORRE para tirarte y RODAR (auto-voltereta al aterrizar), al lado del spawn
bldg(-16,6.0,4,8,8);
plat(-9,1.6,4,2.6,2.6); plat(-13,3.4,4,2.6,2.6);   // escaloncitos para subir a la torre

// ===== NUBES (planos suaves debajo y alrededor → sensación de altura) =====
const cloudMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.5,depthWrite:false,fog:false});
function cloud(x,y,z,s){ const m=new THREE.Mesh(new THREE.PlaneGeometry(s,s*0.6),cloudMat); m.rotation.x=-Math.PI/2; m.position.set(x,y,z); scene.add(m); }
for(let i=0;i<18;i++){ const a=i*2.39; cloud(15+Math.cos(a)*(50+i*11), -16-(i%4)*7, 28+Math.sin(a)*(50+i*10), 24+i*4); }

/* ===================== Jugador (1ª persona) ===================== */
const R=0.34, STAND=1.85, CROUCH=1.05, EYE=1.62, EYE_CR=0.9;
const GRAV=26, JUMP_V=8.8, RUN=8.6, ACCEL=12, AIR_ACCEL=5, SLIDE_V=13.5, WALL_GRAV=7, WALLRUN_MAX=1.25;   // tiempos originales
const player={pos:new THREE.Vector3(0,0,4),vel:new THREE.Vector3(),vy:0,yaw:Math.PI,pitch:0,roll:0,eye:EYE,h:STAND,faceYaw:Math.PI,
  onGround:true,crouch:false,sliding:false,slideT:0,wallrun:0,wallrunT:0,wallN:new THREE.Vector3(),mantle:0,bob:0,fov:baseFov,
  climbing:false,climbT:0,climbFrom:new THREE.Vector3(),climbTo:new THREE.Vector3(),
  rolling:false,rollT:0,rollDir:new THREE.Vector3(),slideRight:false,camLow:0,camBack:0};
const CLIMB_DUR=0.85;   // duración del agarre+impulso de la repisa
const GRAB_REACH=2.0;   // a qué altura sobre los pies agarran las manos (la animación de trepada llega ~2m)
// voltereta: el clip Run_Jump_and_Roll dura ~3.47s y la vuelta carnero está a ~1.2s → arrancamos ahí, acelerado
const ROLL_ANIM_START=1.15, ROLL_TIMESCALE=1.7, ROLL_DUR=0.82, ROLL_SPEED=9.5, ROLL_FALL=14;
// estructura entrada→LOOP(medio)→FINAL(outro) para estados sostenidos (tiempos del clip, en segundos)
let prevVy=0, rollReq=false;
const forward=new THREE.Vector3(),right=new THREE.Vector3(),_v=new THREE.Vector3(),_v2=new THREE.Vector3(),_camAnchor=new THREE.Vector3();
let jumpReq=false;
function lerpAngle(a,b,t){ let d=b-a; d=Math.atan2(Math.sin(d),Math.cos(d)); return a+d*t; }   // interpolación de ángulo (camino corto)
const SPAWN=new THREE.Vector3(0,0,4);
function respawn(){ player.pos.copy(SPAWN); player.vel.set(0,0,0); player.vy=0; player.onGround=true;
  player.sliding=player.rolling=player.climbing=false; player.wallrun=0; player.wallrunT=0; }   // si te caés del techo, reaparece
// offsets de la cámara respecto al hueso de la cabeza: un poco ADELANTE (para ver el cuerpo) y a la altura de los ojos
const CAM_FWD=0.06, CAM_UP=0.12;   // cámara 0.1 más arriba
// "lean embodied": la cámara se inclina hacia adelante al correr/deslizar (procedural, según velocidad)
let leanPitch=0, leanRoll=0;

/* ===================== Rotación 90° ===================== */
let forceLandscape=true, rot=false;
function layout(){ rot=forceLandscape&&(innerHeight>innerWidth); document.body.classList.toggle('rot',rot);
  const vw=rot?innerHeight:innerWidth, vh=rot?innerWidth:innerHeight; camera.aspect=vw/vh; camera.updateProjectionMatrix(); renderer.setSize(vw,vh,false); }
addEventListener('resize',layout);

/* ===================== Controles ===================== */
const joyEl=document.getElementById('joy'),knob=document.getElementById('joyKnob'); let joyId=null; const joy={x:0,y:0};
function joyUpd(e){const r=joyEl.clientWidth/2;let dx=e.offsetX-r,dy=e.offsetY-r;const len=Math.hypot(dx,dy);if(len>r){dx*=r/len;dy*=r/len;}knob.style.transform=`translate(${dx}px,${dy}px)`;joy.x=dx/r;joy.y=dy/r;}
joyEl.addEventListener('pointerdown',e=>{joyId=e.pointerId;joyEl.setPointerCapture(e.pointerId);joyUpd(e);e.preventDefault();});
joyEl.addEventListener('pointermove',e=>{if(e.pointerId===joyId)joyUpd(e);});
function joyEnd(e){if(e.pointerId===joyId){joyId=null;joy.x=0;joy.y=0;knob.style.transform='translate(0,0)';}}
joyEl.addEventListener('pointerup',joyEnd);joyEl.addEventListener('pointercancel',joyEnd);

let lookId=null,lastX=0,lastY=0;const LOOK=0.0042;
function isUI(t){return t.closest('.actBtn')||t===joyEl||t===knob;}
addEventListener('pointerdown',e=>{if(isUI(e.target))return;if(lookId===null&&e.pointerId!==joyId){lookId=e.pointerId;lastX=e.clientX;lastY=e.clientY;}});
addEventListener('pointermove',e=>{if(e.pointerId!==lookId)return;let ddx=e.clientX-lastX,ddy=e.clientY-lastY;if(rot){const t=ddx;ddx=ddy;ddy=-t;}player.yaw-=ddx*LOOK;player.pitch=Math.max(-0.9,Math.min(1.3,player.pitch-ddy*LOOK));lastX=e.clientX;lastY=e.clientY;});  // tope abajo: ves el cuerpo, no la vertical fea
function lookEnd(e){if(e.pointerId===lookId)lookId=null;}
addEventListener('pointerup',lookEnd);addEventListener('pointercancel',lookEnd);

function tapBtn(id,fn){ const el=document.getElementById(id); el.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();fn();}); }
tapBtn('bJump',()=>{ jumpReq=true; });
tapBtn('bSlide',()=>{ startSlide(); });
tapBtn('bRoll',()=>{ rollReq=true; });
function startSlide(){ if(player.sliding||!player.onGround)return; if(player.vel.length()<3)return; player.sliding=true; player.slideT=0;
  const d=player.vel.length()>0.5?player.vel.clone().normalize():forward.clone(); player.vel.copy(d).multiplyScalar(SLIDE_V);
  // ¿deslizo hacia mi DERECHA? (respecto a donde miro) → se espeja la animación (por defecto va a la izquierda)
  player.slideRight = (Math.cos(player.yaw)*d.x - Math.sin(player.yaw)*d.z) > 0.15; }

/* ===================== CUERPO FP (UN solo GLB alta-poly + todas las animaciones; cabeza oculta colapsando el hueso Head) ===================== */
const EBASE='https://cdn.jsdelivr.net/gh/Juniorspro/General-Assets-Games@708b854/assets/fp/';
const BODY_FILE='parkour.glb';   // malla alta-poly original + 7 clips (idle/walk/run/jump/slide/wallrun/mantle) → se cambia de ANIMACIÓN, no de malla
let bodyRoot=null, bodyInner=null, bodyScale=1, bodyMixer=null, bodyHead=null, bodyNeck=null, bodyHips=null, bodyHipsBind=null;
const bodyActions={}; let curAnim=null;
const _gltf=new GLTFLoader();
_gltf.load(EBASE+BODY_FILE, gl=>{ const inner=gl.scene;
  let b=new THREE.Box3().setFromObject(inner), sz=b.getSize(new THREE.Vector3()), s=STAND/(sz.y||1); inner.scale.setScalar(s);
  b=new THREE.Box3().setFromObject(inner); const c=b.getCenter(new THREE.Vector3()); inner.position.set(-c.x,-b.min.y,-c.z);   // pies en el origen
  inner.traverse(o=>{
    if(o.isMesh){ o.castShadow=true; o.receiveShadow=true; o.frustumCulled=false;
      const ms=Array.isArray(o.material)?o.material:[o.material];
      ms.forEach(m=>{ if(m){ m.side=THREE.FrontSide; } });   // sólo caras frontales (la cabeza la oculta el near plane)
    }
    if(o.isBone && /head|cabeza/i.test(o.name) && !/end|front|top/i.test(o.name)) bodyHead=o;
    if(o.isBone && /^neck$|cuello/i.test(o.name)) bodyNeck=o;
    if(o.isBone && /^Hips$|pelvis|cadera/i.test(o.name)) bodyHips=o;
  });
  bodyRoot=new THREE.Group(); bodyRoot.add(inner); scene.add(bodyRoot);
  bodyInner=inner; bodyScale=s;   // para espejar la animación en la pared derecha (wall-run)
  bodyMixer=new THREE.AnimationMixer(inner);
  gl.animations.forEach(cl=>{ const a=bodyMixer.clipAction(cl); a.setLoop(THREE.LoopRepeat); a.clampWhenFinished=false; if(cl.name==='roll') a.timeScale=ROLL_TIMESCALE; bodyActions[cl.name]=a; });
  bodyHipsBind=bodyHips?bodyHips.position.clone():null;
  setAnim('idle');
}, undefined, e=>console.warn('parkour.glb',e));
function setAnim(name){ if(!bodyActions[name]||curAnim===name)return;
  const nx=bodyActions[name]; nx.reset(); if(name==='roll') nx.time=ROLL_ANIM_START; nx.enabled=true; nx.setEffectiveWeight(1); nx.play();
  if(curAnim&&bodyActions[curAnim]) nx.crossFadeFrom(bodyActions[curAnim],0.16,true);   // transición suave entre animaciones
  curAnim=name; }
function tickBody(dt,gameState){ if(!bodyRoot)return; setAnim(gameState||'idle');
  bodyRoot.position.set(player.pos.x,player.pos.y,player.pos.z); bodyRoot.rotation.y=player.faceYaw+Math.PI;
  // los clips slide_light / diagonal_wall_run están hechos para un lado (izquierda); se ESPEJAN cuando vas hacia la derecha
  if(bodyInner){ const mir=(curAnim==='wallrun'&&player.wallrun>0)||(curAnim==='slide'&&player.slideRight); bodyInner.scale.x=mir?-bodyScale:bodyScale; }
  bodyMixer.update(dt);
  // anular el root motion: las animaciones trasladan el Hips por el espacio → fijamos X/Z y limitamos Y
  if(bodyHips&&bodyHipsBind){ bodyHips.position.x=bodyHipsBind.x; bodyHips.position.z=bodyHipsBind.z;
    bodyHips.position.y=Math.max(bodyHipsBind.y-0.5,Math.min(bodyHipsBind.y+0.15,bodyHips.position.y)); }   // slide baja, wallrun no dispara la cámara
  bodyRoot.visible = (curAnim!=='roll');   // en la voltereta ocultamos el cuerpo: la inmersión la da la VUELTA DE CÁMARA (si no, el cuerpo tapa la vista)
  // la cabeza se oculta con el near plane (la cámara está EN la cabeza): sin cortes, sin deformación, sin agujero
}

/* ===================== Colisión AABB (capsula≈caja) por eje ===================== */
function aabbHit(){ return null; }
function pAABB(){ return {minx:player.pos.x-R,maxx:player.pos.x+R,miny:player.pos.y,maxy:player.pos.y+player.h,minz:player.pos.z-R,maxz:player.pos.z+R}; }
function overlap(a,c){ return a.minx<c.maxx&&a.maxx>c.minx&&a.miny<c.maxy&&a.maxy>c.miny&&a.minz<c.maxz&&a.maxz>c.minz; }
let lastWall=null;   // collider de la última pared tocada en X/Z (para wallrun/trepar)
function moveX(d){ player.pos.x+=d; const a=pAABB(); for(const c of colliders){ if(c.mesh===ground)continue; if(overlap(a,c)){ player.pos.x = d>0? c.minx-R : c.maxx+R; player.vel.x=0; lastWall=c; a.minx=player.pos.x-R; a.maxx=player.pos.x+R; } } }
function moveZ(d){ player.pos.z+=d; const a=pAABB(); for(const c of colliders){ if(c.mesh===ground)continue; if(overlap(a,c)){ player.pos.z = d>0? c.minz-R : c.maxz+R; player.vel.z=0; lastWall=c; a.minz=player.pos.z-R; a.maxz=player.pos.z+R; } } }
function moveY(d){ player.pos.y+=d; const a=pAABB(); player.onGround=false;
  // sin piso infinito: si te caés del borde, caés al cielo y reaparecés (ver respawn)
  for(const c of colliders){ if(overlap(a,c)){
    if(d<=0){ player.pos.y=c.maxy; player.vy=0; player.onGround=true; }   // caer sobre algo
    else { player.pos.y=c.miny-player.h; player.vy=0; }                    // pegar el techo
    a.miny=player.pos.y; a.maxy=player.pos.y+player.h; } } }

/* ===================== Detección de pared (raycast lateral) para WALL-RUN ===================== */
const _ray=new THREE.Raycaster(); _ray.far=R+0.35;
function wallSide(side){   // side=+1 derecha, -1 izquierda (respecto al facing)
  const dir=_v2.set(Math.cos(player.yaw)*side, 0, -Math.sin(player.yaw)*side).normalize();
  _ray.set(_v.set(player.pos.x,player.pos.y+1.0,player.pos.z), dir);
  const hit=_ray.intersectObjects(wallMeshes,false)[0];
  if(hit && Math.abs(hit.face.normal.y)<0.3){ return {n:hit.face.normal.clone().applyQuaternion(hit.object.quaternion), d:hit.distance}; }
  return null;
}

/* ===================== Loop de juego ===================== */
const clock=new THREE.Clock(); const euler=new THREE.Euler(0,0,0,'YXZ');
const HUD=document.getElementById('hud');
function update(dt){
  if(player.pos.y<-18) respawn();   // caíste del techo al cielo → reaparecer
  forward.set(-Math.sin(player.yaw),0,-Math.cos(player.yaw)); right.set(Math.cos(player.yaw),0,-Math.sin(player.yaw));
  let ix=joy.x,iz=joy.y; const mag=Math.min(1,Math.hypot(ix,iz)); if(mag>1){ix/=mag;iz/=mag;}
  const wishX=right.x*ix - forward.x*iz, wishZ=right.z*ix - forward.z*iz;   // dirección deseada (mundo)
  const wishLen=Math.hypot(wishX,wishZ);

  let estado='';
  // ---- CLIMB en progreso (agarre de repisa + impulso hacia arriba) ----
  if(player.climbing){
    player.climbT+=dt; const t=Math.min(1,player.climbT/CLIMB_DUR); const e=t*t*(3-2*t);
    player.pos.lerpVectors(player.climbFrom,player.climbTo,e); estado='trepar';
    if(t>=1){ player.climbing=false; player.onGround=true; player.vy=0; player.vel.set(0,0,0); }
  } else if(player.rolling){
    // ---- VOLTERETA (rodar): avanza en la dirección de la voltereta y sigue colisionando ----
    player.rollT+=dt; const k=Math.max(0,1-player.rollT/ROLL_DUR); const spd=ROLL_SPEED*(0.45+0.55*k);
    player.vel.x=player.rollDir.x*spd; player.vel.z=player.rollDir.z*spd; estado='voltereta';
    player.vy-=GRAV*dt; lastWall=null;
    moveX(player.vel.x*dt); moveZ(player.vel.z*dt); moveY(player.vy*dt);
    if(player.rollT>=ROLL_DUR) player.rolling=false;
  } else {
  // ---- SLIDE ----
  if(player.sliding){ player.slideT+=dt; player.h=CROUCH;
    player.vel.multiplyScalar(1-Math.min(1,1.6*dt));    // fricción del deslizamiento (tiempo original)
    if(player.slideT>0.9 || player.vel.length()<2.5 || !player.onGround) { player.sliding=false; }
  }

  // ---- WALL-RUN ---- (en el aire, pared al costado, joystick hacia adelante)
  if(!player.onGround && player.vy<3 && wishLen>0.3){
    let w=wallSide(1)||wallSide(-1);
    if(w){ player.wallrun=Math.sign( (wallSide(1)?1:-1) ); player.wallrunT+=dt; player.wallN.copy(w.n); estado='wall-run';
      if(player.wallrunT<WALLRUN_MAX){
        player.vy=Math.max(player.vy,-0.5);                          // casi sin caer
        // empuje a lo largo de la pared (tangente) en la dirección del facing
        const tx=forward.x, tz=forward.z; const tl=Math.hypot(tx,tz)||1;
        player.vel.x=tx/tl*RUN; player.vel.z=tz/tl*RUN;
      } else { player.wallrun=0; }
    } else { player.wallrun=0; player.wallrunT=0; }
  } else { player.wallrun=0; if(player.onGround)player.wallrunT=0; }

  // ---- JUMP / WALL-JUMP ----
  if(jumpReq){ jumpReq=false;
    if(player.onGround){ player.vy=JUMP_V; player.onGround=false; if(player.sliding)player.sliding=false; }
    else if(player.wallrun){ player.vy=JUMP_V*0.92; player.vel.addScaledVector(player.wallN,7.5); player.wallrun=0; player.wallrunT=WALLRUN_MAX; }   // saltar de la pared
  }

  // ---- locomoción horizontal ----
  if(!player.sliding && !player.wallrun){
    const sp=RUN*(player.crouch?0.5:1);
    const accel=player.onGround?ACCEL:AIR_ACCEL;
    const desX=wishLen>0.01? (wishX/wishLen)*sp*Math.min(1,wishLen) : 0;
    const desZ=wishLen>0.01? (wishZ/wishLen)*sp*Math.min(1,wishLen) : 0;
    player.vel.x+=(desX-player.vel.x)*Math.min(1,accel*dt);
    player.vel.z+=(desZ-player.vel.z)*Math.min(1,accel*dt);
  }

  // ---- VOLTERETA: botón estando en el piso y en movimiento, o automática al caer de muy alto ----
  prevVy=player.vy;
  if(rollReq && player.onGround && !player.rolling && !player.sliding){
    const hsp=Math.hypot(player.vel.x,player.vel.z);
    player.rollDir.copy(hsp>1.5? _v.set(player.vel.x,0,player.vel.z).normalize() : forward);
    player.rolling=true; player.rollT=0;
  }
  rollReq=false;

  // ---- gravedad + integración con colisión por eje ----
  player.vy-=(player.wallrun?WALL_GRAV:GRAV)*dt;
  lastWall=null;
  moveX(player.vel.x*dt); moveZ(player.vel.z*dt);
  moveY(player.vy*dt);

  // aterrizaje fuerte (caída de muy alto) → rodar automáticamente para "amortiguar"
  if(player.onGround && prevVy < -ROLL_FALL && !player.rolling){
    const hsp=Math.hypot(player.vel.x,player.vel.z);
    player.rollDir.copy(hsp>1.5? _v.set(player.vel.x,0,player.vel.z).normalize() : forward);
    player.rolling=true; player.rollT=0;
  }

  // ---- AGARRE DE REPISA: salté a una superficie alta y no llegué → me agarro del BORDE real y subo ----
  if(lastWall && !player.onGround && player.vy<2 && !player.climbing && !player.rolling){
    const top=lastWall.maxy, foot=player.pos.y, rise=top-foot;
    if(rise>=1.4 && rise<=2.4){   // sólo repisas altas (al alcance de las manos); las bajas se suben saltando
      const a={minx:player.pos.x-R,maxx:player.pos.x+R,miny:top+0.02,maxy:top+player.h,minz:player.pos.z-R,maxz:player.pos.z+R};
      let blocked=false; for(const c of colliders){ if(c.mesh===ground||c===lastWall)continue; if(overlap(a,c)){blocked=true;break;} }
      if(!blocked){
        // BORDE real: punto del techo de la repisa más cercano al jugador (no un lugar fijo)
        const ex=Math.max(lastWall.minx,Math.min(lastWall.maxx,player.pos.x));
        const ez=Math.max(lastWall.minz,Math.min(lastWall.maxz,player.pos.z));
        const wcx=(lastWall.minx+lastWall.maxx)/2, wcz=(lastWall.minz+lastWall.maxz)/2;   // hacia el centro = adentro de la repisa
        let inx=wcx-ex, inz=wcz-ez; const il=Math.hypot(inx,inz)||1; inx/=il; inz/=il;
        player.climbing=true; player.climbT=0; player.vy=0; player.vel.set(0,0,0);
        player.climbFrom.set(ex, Math.min(foot,Math.max(foot-0.4, top-GRAB_REACH)), ez);   // manos AL borde (altura de agarre)
        player.climbTo.set(ex+inx*0.5, top, ez+inz*0.5);                                    // termina arriba, un poco adentro
        estado='trepar';
      }
    }
  }
  } // fin del else (física normal)
  if(player.sliding)estado='deslizar';

  // altura/ojo (de pie / agachado / deslizando)
  if(!player.sliding && !player.crouch) player.h=STAND;
  const targetEye=(player.sliding||player.crouch)?EYE_CR:EYE; player.eye+=(targetEye-player.eye)*Math.min(1,12*dt);

  // ---- animar el cuerpo PRIMERO (así el hueso de la cabeza ya tiene su transform de este frame) ----
  const sp=Math.hypot(player.vel.x,player.vel.z);
  // estado de animación según lo que hace el jugador (parkour)
  const animState = player.climbing ? 'climb'
    : player.rolling ? 'roll'
    : player.sliding ? 'slide'
    : player.wallrun ? 'wallrun'
    : !player.onGround ? 'jump'
    : (sp<0.5 ? 'idle' : ((mag>0.82 || sp>=4.2) ? 'run' : 'walk'));   // joystick a fondo o velocidad alta → CORRER
  // el cuerpo/piernas miran hacia donde MIRÁS, no hacia donde camina el joystick
  player.faceYaw = player.yaw;
  tickBody(dt, animState);
  // roll: inclina al correr por pared
  let targetRoll=0;
  if(player.wallrun) targetRoll += player.wallrun*0.28;
  player.roll+=(targetRoll-player.roll)*Math.min(1,10*dt);
  // FOV kick por velocidad / wallrun / slide
  const targetFov=baseFov + Math.min(5,sp*0.4) + (player.wallrun?4:0) + (player.sliding?6:0);   // base 90: kicks suaves
  player.fov+=(targetFov-player.fov)*Math.min(1,6*dt); if(Math.abs(camera.fov-player.fov)>0.05){camera.fov=player.fov;camera.updateProjectionMatrix();}
  // ---- cámara FP: a la altura de la cabeza (bob vertical real del hueso) pero CENTRADA en el cuerpo ----
  // XZ estable (centro del cuerpo + un poco adelante) → quieto miras AL FRENTE, no al hombro; sólo la ALTURA viene del hueso de la cabeza
  if(bodyHead && !player.rolling){ bodyHead.getWorldPosition(_camAnchor); }     // la cámara va EN la cabeza (sigue su posición e inclinación)
  else { _camAnchor.set(player.pos.x, player.pos.y+EYE, player.pos.z); }         // roll/carga: altura estable → la vuelta de cámara queda limpia (no se traga el cuerpo)
  const fwH=_v.set(-Math.sin(player.yaw),0,-Math.cos(player.yaw));
  // al deslizarse la cámara baja un poco y se va hacia ATRÁS — suave
  const targetLow = player.sliding ? 0.3 : 0;
  const targetBack = player.sliding ? 0.65 : 0;
  player.camLow += (targetLow - player.camLow)*Math.min(1,12*dt);
  player.camBack += (targetBack - player.camBack)*Math.min(1,12*dt);
  const fwd = CAM_FWD - player.camBack;
  camera.position.set(_camAnchor.x + fwH.x*fwd, _camAnchor.y + CAM_UP - player.camLow, _camAnchor.z + fwH.z*fwd);
  // ---- LEAN: la cámara se inclina hacia adelante al correr/deslizar (se mueve con el cuerpo, no queda dura) ----
  const moveAmt=Math.min(1,sp/RUN);
  const targetLean = -0.17*moveAmt - (player.sliding?0.12:0);        // adelante (mirar un poco abajo) según velocidad
  leanPitch += (targetLean-leanPitch)*Math.min(1,5*dt);
  player.bob += dt*(7*moveAmt+0.001);                               // cadencia de pasos
  const targetRollB = Math.sin(player.bob)*0.03*moveAmt;             // balanceo suave al caminar/correr
  leanRoll += (targetRollB-leanRoll)*Math.min(1,8*dt);
  // VOLTERETA: la cámara da una vuelta completa hacia adelante (inmersión total del giro)
  let rollCam=0;
  if(player.rolling){ const t=Math.min(1,player.rollT/ROLL_DUR); rollCam = -2*Math.PI*(t*t*(3-2*t)); }
  euler.set(player.pitch+leanPitch+rollCam, player.yaw, player.roll+leanRoll); camera.quaternion.setFromEuler(euler);

  sun.position.set(player.pos.x-40,80,player.pos.z-50); sun.target.position.copy(player.pos); sun.target.updateMatrixWorld();
  if(HUD) HUD.textContent = estado||(player.onGround?(sp<0.5?'quieto':(sp<3.6?'caminar':'correr')):'en el aire');
}
function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); update(dt); renderer.render(scene,camera); }

/* ===================== Init ===================== */
try{ layout(); renderer.render(scene,camera); setTimeout(()=>document.getElementById('loader').classList.add('hide'),250); }
catch(err){ console.error('Init',err); document.getElementById('loader').classList.add('hide'); }
animate();
</script>
</body>
</html>
