<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#aebfcf" />
<title>Parkour FP</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<style>
  :root{ --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px); }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ height:100%; overflow:hidden; background:#aebfcf; font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; color:#eef3f8; overscroll-behavior:none; }
  #stage{ position:fixed; inset:0; }
  body.rot #stage{ width:100vh; height:100vw; top:50%; left:50%; transform:translate(-50%,-50%) rotate(90deg); transform-origin:center; }
  #app{ position:absolute; inset:0; }
  #app canvas{ display:block; width:100%!important; height:100%!important; touch-action:none; }
  #cross{ position:fixed; left:50%; top:50%; width:6px; height:6px; margin:-3px; z-index:6; border-radius:50%; background:rgba(255,255,255,.6); box-shadow:0 0 4px rgba(0,0,0,.6); pointer-events:none; }
  #joy{ position:fixed; left:26px; bottom:calc(28px + var(--safe-b)); z-index:20; width:128px; height:128px; border-radius:50%;
        background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.18); backdrop-filter:blur(6px); touch-action:none; }
  #joyKnob{ position:absolute; left:50%; top:50%; width:52px; height:52px; margin:-26px 0 0 -26px; border-radius:50%;
            background:radial-gradient(circle at 38% 34%,#dff0ff,#5aa0ff); box-shadow:0 4px 16px rgba(0,0,0,.45); }
  .actBtn{ position:fixed; z-index:20; width:72px; height:72px; border-radius:50%; background:rgba(22,34,50,.62);
           border:2px solid rgba(255,255,255,.5); color:#fff; font-size:13px; font-weight:800; letter-spacing:.04em; backdrop-filter:blur(6px); cursor:pointer;
           box-shadow:0 4px 14px rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; transition:transform .1s,background .15s; }
  .actBtn:active{ transform:scale(.92); background:rgba(90,160,255,.7); }
  #bJump  { right:26px;  bottom:calc(40px + var(--safe-b)); }
  #bSlide { right:110px; bottom:calc(66px + var(--safe-b)); width:62px; height:62px; }
  #bRoll  { right:40px;  bottom:calc(130px + var(--safe-b)); width:58px; height:58px; font-size:11px; }
  /* HUD moderno: arriba a la izquierda, sin fondo. Nombre del mundo + misión debajo. */
  #hudWrap{ position:fixed; left:calc(18px + var(--safe-t)); top:calc(14px + var(--safe-t)); z-index:10; pointer-events:none;
        font-family:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif; text-shadow:0 1px 6px rgba(0,0,0,.55),0 0 2px rgba(0,0,0,.4); }
  #hud{ color:#fff; font-weight:700; font-size:19px; letter-spacing:.06em; line-height:1.1; }
  #hudMission{ color:rgba(255,255,255,.82); font-weight:500; font-size:12.5px; letter-spacing:.05em; margin-top:3px; }
  #hudMission::before{ content:'◆ '; color:#7fd0ff; font-size:10px; }
  #loader{ position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
           background:#aebfcf; transition:opacity .5s; color:#0a3a63; font-size:13px; letter-spacing:.1em; }
  #loader.hide{ opacity:0; pointer-events:none; }
  /* ===== MENÚ DE INICIO (estética frutiger aero, fondo = mapa frutiger 144p difuminado) ===== */
  /* pantalla de NOMBRE (antes del menú) */
  #namePrompt{ position:absolute; inset:0; z-index:55; display:flex; align-items:center; justify-content:center; overflow:hidden;
    backdrop-filter:blur(18px) saturate(1.12) brightness(1.0); -webkit-backdrop-filter:blur(18px) saturate(1.12) brightness(1.0);
    background:radial-gradient(130% 100% at 50% 25%, rgba(180,225,255,.2), rgba(16,46,86,.6)); transition:opacity .4s; }
  #namePrompt.hide{ opacity:0; pointer-events:none; }
  #npPanel{ width:min(90%,400px); padding:24px 22px; border-radius:26px; text-align:center;
    background:linear-gradient(165deg, rgba(232,246,255,.86), rgba(186,218,250,.7)); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    border:1.5px solid rgba(255,255,255,.72); box-shadow:0 24px 64px rgba(10,40,80,.55), inset 0 1px 0 rgba(255,255,255,.85); }
  #npPanel h1{ font-size:20px; font-weight:800; color:#0a3a63; margin-bottom:3px; }
  #npPanel .sub{ font-size:12px; color:#1f5a8c; opacity:.85; margin-bottom:14px; }
  #npName{ width:100%; box-sizing:border-box; padding:14px; border-radius:13px; font-size:16px; font-weight:700; color:#0a3a63; text-align:center; outline:none;
    background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(214,238,255,.62)); border:1.5px solid rgba(255,255,255,.75); box-shadow:inset 0 1px 3px rgba(40,90,140,.18); }
  #npName::placeholder{ color:#5a86ac; opacity:.7; }
  #npGo{ margin-top:16px; width:100%; padding:14px; border-radius:15px; font-size:16px; font-weight:800; color:#fff; cursor:pointer;
    background:linear-gradient(180deg,#5ad27a,#2aa64f); border:1.5px solid rgba(255,255,255,.7); box-shadow:0 10px 26px rgba(30,150,70,.5), inset 0 1px 0 rgba(255,255,255,.7); }
  #npGo:active{ transform:scale(.97); }
  #menu{ position:absolute; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; overflow:hidden;
         backdrop-filter:blur(16px) saturate(1.15) brightness(1.02); -webkit-backdrop-filter:blur(16px) saturate(1.15) brightness(1.02);
         background:radial-gradient(130% 100% at 50% 20%, rgba(180,225,255,.16), rgba(16,46,86,.52)); transition:opacity .45s; }
  #menu.hide{ opacity:0; pointer-events:none; }
  /* collage de mapas detrás del panel: varias tomas a la vez, en baja calidad y difuminadas */
  #menuBg{ position:absolute; inset:-7%; z-index:1; display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); gap:10px;
    filter:blur(11px) saturate(1.2) brightness(.9); opacity:.4; transform:scale(1.06); pointer-events:none;
    animation:bgDrift 38s ease-in-out infinite alternate; }
  .mShot{ position:relative; border-radius:20px; overflow:hidden; box-shadow:0 10px 34px rgba(0,0,0,.3), inset 0 0 40px rgba(255,255,255,.08); }
  .mShot::after{ content:attr(data-e); position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:46px; opacity:.4; filter:saturate(1.1); }
  @keyframes bgDrift{ from{ transform:scale(1.06) translate(0,0); } to{ transform:scale(1.13) translate(-2%,-1.4%); } }
  /* panel compacto y nítido (vidrio frutiger aero) que agrupa todo en una tarjeta */
  #menuPanel{ position:relative; z-index:2; width:min(94%,480px); max-height:94vh; overflow:auto; padding:16px 18px 16px; border-radius:24px; text-align:center;
    background:linear-gradient(165deg, rgba(232,246,255,.82), rgba(186,218,250,.66)); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
    border:1.5px solid rgba(255,255,255,.7); box-shadow:0 22px 60px rgba(10,40,80,.55), inset 0 1px 0 rgba(255,255,255,.85); }
  #menuPanel h1{ font-size:19px; font-weight:800; color:#0a3a63; margin-bottom:1px; text-shadow:0 1px 0 rgba(255,255,255,.6); }
  #menuPanel .sub{ font-size:11px; color:#1f5a8c; margin-bottom:9px; opacity:.85; }
  .mLabel{ font-size:10px; font-weight:800; letter-spacing:.1em; color:#15527f; text-align:center; margin:0 0 5px; opacity:.82; }
  /* tres grupos (vista/gráficos/idioma) en una sola banda → mucho menos alto */
  #mGroups{ display:flex; gap:8px; margin:11px 0 4px; }
  .mGrp{ flex:1; min-width:0; }
  .mCol{ display:flex; flex-direction:column; gap:6px; }
  .mRow{ display:flex; gap:8px; }
  .mOpt{ flex:1; padding:9px 5px; border-radius:11px; font-size:12px; font-weight:700; color:#0c4675; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    background:linear-gradient(180deg, rgba(255,255,255,.66), rgba(208,234,255,.3)); border:1.3px solid rgba(255,255,255,.62);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.8); transition:transform .12s, box-shadow .2s, background .2s; }
  .mOpt.sel{ background:linear-gradient(180deg,#7fd0ff,#2f93e8); color:#fff; border-color:rgba(255,255,255,.85); box-shadow:0 5px 14px rgba(40,130,230,.5), inset 0 1px 0 rgba(255,255,255,.7); }
  .mOpt:active{ transform:scale(.95); }
  #mName{ width:100%; box-sizing:border-box; padding:11px 13px; border-radius:12px; font-size:14px; font-weight:700; color:#0a3a63; outline:none; text-align:center;
    background:linear-gradient(180deg, rgba(255,255,255,.9), rgba(214,238,255,.62)); border:1.5px solid rgba(255,255,255,.72); box-shadow:inset 0 1px 3px rgba(40,90,140,.18); }
  #mName::placeholder{ color:#5a86ac; opacity:.7; }
  /* fila inferior: clasificación + jugar lado a lado (compacto) */
  #mBottom{ display:flex; gap:9px; align-items:stretch; margin-top:12px; }
  #mBottom #mBoardBtn{ flex:0 0 auto; width:auto; margin-top:0; padding:13px 14px; white-space:nowrap; }
  #mBottom #mPlay{ flex:1; width:auto; margin-top:0; padding:13px; }
  /* niveles: carrusel horizontal (deslizá para elegir) → ocupa poco espacio */
  #mLevels{ flex-wrap:nowrap; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; gap:10px; padding:2px 2px 8px; }
  #mLevels .mOpt{ flex:0 0 auto; min-width:44%; scroll-snap-align:center; white-space:nowrap; }
  #mLevels::-webkit-scrollbar{ height:4px; } #mLevels::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.35); border-radius:2px; }
  #menuPanel{ max-height:90vh; overflow:auto; }
  #mPlay{ margin-top:22px; width:100%; padding:15px; border-radius:16px; font-size:16px; font-weight:800; letter-spacing:.05em; color:#fff; cursor:pointer;
    background:linear-gradient(180deg,#5ad27a,#2aa64f); border:1.5px solid rgba(255,255,255,.7); box-shadow:0 10px 26px rgba(30,150,70,.5), inset 0 1px 0 rgba(255,255,255,.7); transition:transform .12s; }
  #mPlay:active{ transform:scale(.96); }
  body.menu-open #joy, body.menu-open #bJump, body.menu-open #bSlide, body.menu-open #bRoll, body.menu-open #hudWrap, body.menu-open #cross, body.menu-open #bChat, body.menu-open #bPack, body.menu-open #kbd, body.menu-open #bVoice, body.menu-open #btnMenu{ display:none !important; }
  /* ===== MULTIJUGADOR ===== */
  #mpStatus{ position:fixed; right:calc(12px + var(--safe-t)); top:calc(12px + var(--safe-t)); z-index:15; display:flex; align-items:center; gap:6px;
    background:rgba(14,22,30,.62); border:1px solid rgba(255,255,255,.16); border-radius:999px; padding:5px 10px; font-size:11px; font-weight:700; color:#cfe0ee; pointer-events:none; }
  #mpStatus::before{ content:''; width:9px; height:9px; border-radius:50%; background:#888; box-shadow:0 0 6px currentColor; }
  #mpStatus[data-s=online]{ color:#7af0a0; } #mpStatus[data-s=online]::before{ background:#43e07a; }
  #mpStatus[data-s=connecting]{ color:#ffd27a; } #mpStatus[data-s=connecting]::before{ background:#ffbf45; }
  #mpStatus[data-s=off]{ color:#ff9a9a; } #mpStatus[data-s=off]::before{ background:#e05a5a; }
  #mpChatLog{ position:fixed; left:12px; top:calc(50px + var(--safe-t)); z-index:14; width:min(56vw,300px); display:flex; flex-direction:column; gap:4px; pointer-events:none; }
  .mpMsg{ background:rgba(14,22,30,.6); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:5px 9px; font-size:12px; color:#e6f0fa; transition:opacity .6s; max-width:100%; word-wrap:break-word; }
  .mpMsg b{ color:#8fd0ff; }
  #vBoard{ position:fixed; left:calc(12px + var(--safe-t)); top:calc(96px + var(--safe-t)); z-index:14; width:min(50vw,240px); display:none; flex-direction:column; gap:3px;
    background:rgba(10,18,30,.55); border:1px solid rgba(255,255,255,.14); border-radius:14px; padding:8px 10px; backdrop-filter:blur(7px); pointer-events:none; font-family:'Segoe UI',system-ui,sans-serif; }
  #vBoard .vbTitle{ font-size:11.5px; font-weight:800; letter-spacing:.06em; color:#9fe0ff; text-transform:uppercase; margin-bottom:3px; }
  #vBoard .vbRow{ display:flex; justify-content:space-between; gap:8px; font-size:12.5px; color:#dceaf6; }
  #vBoard .vbRow b{ color:#7fe0c0; font-weight:700; }
  #vBoard .vbRow.me span{ color:#ffe9a0; font-weight:700; }
  #vTimer{ position:fixed; left:50%; top:calc(12px + var(--safe-t)); transform:translateX(-50%); z-index:16; display:none; pointer-events:none;
    font-family:'Segoe UI',system-ui,sans-serif; font-weight:800; font-size:15px; letter-spacing:.03em; padding:6px 14px; border-radius:20px;
    background:rgba(10,18,30,.6); border:1px solid rgba(255,255,255,.18); color:#bfe6ff; backdrop-filter:blur(7px); white-space:nowrap; }
  #vTimer[data-s=urgent]{ color:#fff; background:rgba(180,30,30,.7); border-color:#ff6a6a; animation:vpulse .7s infinite; }
  #vTimer[data-s=fail]{ color:#ffd0d0; background:rgba(120,20,20,.7); }
  #vTimer[data-s=got]{ color:#0a2a18; background:linear-gradient(180deg,#9fffd0,#39e0a0); border-color:#bfffe0; }
  @keyframes vpulse{ 0%,100%{ transform:translateX(-50%) scale(1); } 50%{ transform:translateX(-50%) scale(1.07); } }
  #bPack{ position:fixed; right:26px; bottom:calc(272px + var(--safe-b)); z-index:20; width:52px; height:52px; border-radius:50%; display:none;
    background:rgba(18,26,40,.62); border:1px solid rgba(255,255,255,.2); color:#fff; font-size:24px; backdrop-filter:blur(7px); cursor:pointer; }
  #bPack:active{ transform:scale(.93); }
  #bVoice{ position:fixed; left:54px; bottom:calc(176px + var(--safe-b)); z-index:20; width:54px; height:54px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:rgba(22,34,50,.6); border:1px solid rgba(255,255,255,.2); color:#fff; font-size:23px; backdrop-filter:blur(7px); cursor:pointer; touch-action:none; user-select:none; }
  #bVoice.on{ background:linear-gradient(180deg,#8fe6a0,#2fb86a); border-color:#cffadb; box-shadow:0 0 16px rgba(60,220,120,.7); }
  #bVoice:active{ transform:scale(.92); }
  #vPack{ position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); z-index:30; display:none; width:min(86vw,520px); max-height:74vh; overflow-y:auto;
    background:rgba(10,16,26,.9); border:1px solid rgba(255,255,255,.16); border-radius:18px; padding:16px; backdrop-filter:blur(12px); font-family:'Segoe UI',system-ui,sans-serif; }
  #vPack.show{ display:block; }
  #vPack .vpTitle{ color:#cfe6ff; font-weight:800; font-size:15px; letter-spacing:.03em; margin-bottom:12px; }
  #vPack .vpGrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(92px,1fr)); gap:10px; }
  #vPack .vpCard{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:13px; padding:9px 6px; text-align:center; cursor:pointer; transition:transform .1s; }
  #vPack .vpCard:active{ transform:scale(.94); }
  #vPack .vpCard.eq{ border-color:#7fe0c0; box-shadow:0 0 0 2px rgba(127,224,192,.5) inset; }
  #vPack .vpCard.lk{ opacity:.42; cursor:default; }
  #vPack .vpSw{ width:100%; height:38px; border-radius:8px; margin-bottom:6px; box-shadow:inset 0 0 0 1px rgba(255,255,255,.18); }
  #vPack .vpN{ color:#eaf2fb; font-size:12.5px; font-weight:700; }
  #vPack .vpP{ color:#9fb6cc; font-size:11px; margin-top:2px; }
  /* botón para mostrar nombres de jugadores (izquierda, arriba del joystick) */
  #bNames{ position:fixed; left:54px; bottom:calc(176px + var(--safe-b)); z-index:20; width:54px; height:54px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    background:rgba(22,34,50,.6); border:1px solid rgba(255,255,255,.2); color:#fff; font-size:22px; backdrop-filter:blur(6px); cursor:pointer; }
  #bNames.on{ background:linear-gradient(180deg,#7fd0ff,#2f93e8); border-color:#cfeeff; box-shadow:0 0 14px rgba(80,180,255,.6); }
  #bNames:active{ transform:scale(.92); }
  /* TECLADO QWERTY frutiger aero (horizontal) DENTRO del juego (no usa el teclado del teléfono) */
  #kbd{ position:fixed; left:0; right:0; bottom:0; z-index:40; display:none; flex-direction:column; gap:6px; padding:10px 12px calc(14px + var(--safe-b));
    background:linear-gradient(180deg, rgba(180,222,255,.34), rgba(120,180,235,.5)); backdrop-filter:blur(16px); border-top:1.5px solid rgba(255,255,255,.6); box-shadow:0 -10px 40px rgba(10,50,100,.4); }
  #kbd.show{ display:flex; }
  #kbd .kbField{ display:flex; gap:8px; align-items:center; margin-bottom:2px; }
  #kbd .kbText{ flex:1; min-height:34px; padding:7px 12px; border-radius:11px; font-size:16px; font-weight:600; color:#0a3a63; background:rgba(255,255,255,.82); border:1.5px solid rgba(255,255,255,.7); box-shadow:inset 0 1px 3px rgba(40,90,140,.18); white-space:nowrap; overflow:hidden; }
  #kbd .kbText:empty::before{ content:attr(data-ph); color:#5a86ac; opacity:.7; }
  #kbd .kbRow{ display:flex; gap:5px; justify-content:center; }
  #kbd .kbK{ flex:1; max-width:62px; min-width:0; height:42px; border-radius:10px; font-size:16px; font-weight:700; color:#0a3a63; cursor:pointer;
    background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(206,234,255,.66)); border:1.4px solid rgba(255,255,255,.8); box-shadow:0 2px 5px rgba(20,70,130,.22), inset 0 1px 0 rgba(255,255,255,.9); display:flex; align-items:center; justify-content:center; user-select:none; }
  #kbd .kbK:active{ transform:scale(.9); background:linear-gradient(180deg,#7fd0ff,#2f93e8); color:#fff; }
  #kbd .kbK.wide{ flex:1.6; max-width:none; }
  #kbd .kbK.send{ flex:2; max-width:none; background:linear-gradient(180deg,#8fe6a0,#2fb86a); color:#fff; border-color:#cffadb; }
  #kbd .kbK.close{ flex:1; max-width:none; background:linear-gradient(180deg,#ffb3b3,#e0625a); color:#fff; border-color:#ffd9d9; }
  #bChat{ position:fixed; right:26px; bottom:calc(210px + var(--safe-b)); z-index:20; width:52px; height:52px; border-radius:50%;
    background:rgba(255,255,255,.07); border:1.5px solid rgba(255,255,255,.22); color:#eef3f8; font-size:20px; backdrop-filter:blur(6px); cursor:pointer;
    display:flex; align-items:center; justify-content:center; }
  #bChat:active{ transform:scale(.92); background:rgba(90,160,255,.32); }
  /* botón de MENÚ en juego (arriba a la derecha) + pausa */
  #btnMenu{ position:fixed; right:calc(12px + var(--safe-t)); top:calc(50px + var(--safe-t)); z-index:21; width:46px; height:46px; border-radius:13px; display:flex; align-items:center; justify-content:center;
    background:rgba(18,28,42,.6); border:1px solid rgba(255,255,255,.2); color:#fff; font-size:22px; backdrop-filter:blur(7px); cursor:pointer; }
  #btnMenu:active{ transform:scale(.92); }
  /* ===== EDITAR HUD: arrastrar los controles a donde quieras ===== */
  #hudEdit{ position:fixed; left:50%; top:calc(10px + var(--safe-t)); transform:translateX(-50%); z-index:64; display:none; align-items:center; gap:10px;
    background:rgba(10,18,30,.86); border:1px solid rgba(255,255,255,.22); border-radius:16px; padding:8px 12px; color:#eaf2fb; font-family:'Segoe UI',system-ui,sans-serif; font-size:12.5px; font-weight:700; backdrop-filter:blur(8px); box-shadow:0 10px 34px rgba(10,40,80,.5); }
  body.editing-hud #hudEdit{ display:flex; }
  #hudEdit button{ padding:8px 14px; border-radius:12px; border:none; font-weight:800; font-size:13px; color:#fff; background:linear-gradient(180deg,#5fd27a,#2aa64f); cursor:pointer; }
  body.editing-hud #joy, body.editing-hud .actBtn, body.editing-hud #bChat, body.editing-hud #bPack, body.editing-hud #bVoice, body.editing-hud #bNames, body.editing-hud #btnMenu{
    outline:2px dashed rgba(127,208,255,.95); outline-offset:3px; touch-action:none; }
  /* en modo edición se ven TODOS los controles aunque normalmente estén ocultos */
  body.editing-hud #bPack, body.editing-hud #bVoice, body.editing-hud #bNames{ display:flex !important; }
  #pause{ position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center; background:rgba(8,16,28,.62); backdrop-filter:blur(8px); }
  #pause.show{ display:flex; }
  /* menú de pausa COMPACTO (estilo menú principal) */
  #pausePanel{ width:min(82vw,360px); max-height:90vh; overflow-y:auto; padding:16px 16px 12px; border-radius:22px; text-align:center;
    background:linear-gradient(165deg, rgba(232,246,255,.82), rgba(186,218,250,.66)); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); border:1.5px solid rgba(255,255,255,.7); box-shadow:0 22px 60px rgba(10,40,80,.55), inset 0 1px 0 rgba(255,255,255,.85); }
  #pausePanel h2{ color:#0a3a63; font-size:18px; font-weight:800; margin-bottom:10px; }
  .pBtn{ width:100%; padding:11px; margin-bottom:7px; border-radius:13px; font-size:14px; font-weight:800; color:#0c4675; cursor:pointer;
    background:linear-gradient(180deg, rgba(255,255,255,.72), rgba(208,234,255,.32)); border:1.4px solid rgba(255,255,255,.7); box-shadow:inset 0 1px 0 rgba(255,255,255,.8); }

// edificio: techo caminable a la altura 'top'; baja 36u hacia el cielo
// textura procedural de fachada (concreto claro + grilla de ventanas azules), como un edificio de oficinas
function makeFacadeTex(){ const c=document.createElement('canvas'); c.width=c.height=256; const g=c.getContext('2d');
  g.fillStyle='#b8bcc1'; g.fillRect(0,0,256,256);                       // concreto claro
  const cols=4, rows=4, cw=256/cols, ch=256/rows, pad=7;
  for(let i=0;i<cols;i++)for(let j=0;j<rows;j++){
    const wx=i*cw+pad, wy=j*ch+pad, ww=cw-pad*2, wh=ch-pad*2;
    g.fillStyle='#2b323a'; g.fillRect(wx-2,wy-2,ww+4,wh+4);             // marco
    const t=0.55+Math.random()*0.45, r=(38*t+24)|0, gg=(74*t+40)|0, b=(96*t+58)|0;
    g.fillStyle=`rgb(${r},${gg},${b})`; g.fillRect(wx,wy,ww,wh);        // vidrio azul
    g.fillStyle='rgba(255,255,255,0.07)'; g.beginPath(); g.moveTo(wx,wy+wh*0.45); g.lineTo(wx+ww*0.6,wy); g.lineTo(wx+ww,wy); g.lineTo(wx,wy+wh); g.closePath(); g.fill();   // reflejo
    if(Math.random()<0.14){ g.fillStyle='rgba(255,224,168,0.55)'; g.fillRect(wx+ww*0.55,wy+wh*0.18,ww*0.28,wh*0.45); }     // alguna luz cálida
  }
  const tex=new THREE.CanvasTexture(c); tex.colorSpace=THREE.SRGBColorSpace; tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.anisotropy=4; return tex; }
const _facadeBase=makeFacadeTex();

const BBOT_MAT=new THREE.MeshStandardMaterial({color:0x2a2f36,roughness:1,metalness:0});
function bldg(x,top,z,w,d){

// QUIZ de sumas (edificio 4): dos puertas, la respuesta correcta es piso sólido, la otra es un hueco
let quizL=null,quizR=null,quizPanelL=null,quizPanelR=null,quizPanelQ=null,quizWrong=null,quizArmed=false;
function setupQuiz(){ if(!quizPanelQ)return;
  const a=2+((Math.random()*8)|0), b=2+((Math.random()*8)|0), ans=a+b;
  let wrong=ans; while(wrong===ans){ wrong=ans+((Math.random()*7)|0)-3; if(wrong<1)wrong=ans+2; }
  const corrL=Math.random()<0.5;
  quizPanelQ.set(a+'+'+b+'=?','#ffffff');
  quizPanelL.set(String(corrL?ans:wrong)); quizPanelR.set(String(corrL?wrong:ans));
  unlock(quizL); unlock(quizR);              // ambas SÓLIDAS y visibles (no se sabe cuál es el hueco; la pared tapa el otro lado)
  quizWrong = corrL? quizR : quizL;          // la incorrecta es una TRAMPA: se abre el hueco al pisarla
  quizArmed = true;
}
// al pisar la plataforma incorrecta detrás de la pared, se abre el hueco y caés (sin poder agarrarte)
function tickQuiz(){ if(world!=='city'||!quizArmed||!quizWrong)return;
  if(player.pos.z>110){ quizArmed=false; return; }                                   // pasaste bien (a la unión)
  if((player.onGround||player.sliding) && player.pos.z>102.2 && player.pos.z<110){
    const onWrong=(player.pos.x<0 && quizWrong===quizL)||(player.pos.x>0 && quizWrong===quizR);
    if(onWrong){ quizWrong.locked=true; quizWrong.mesh.visible=false; quizArmed=false; player.climbing=false; sfx('wrong'); }   // HUECO → caída sin agarre
  }
}

  const dx=player.pos.x-portalMesh.x, dy=(player.pos.y+1)-portalMesh.y, dz=player.pos.z-portalMesh.z;

// --- cielo 360 (equirectangular): fondo del mundo de césped + mapa de entorno (la esfera metálica refleja las nubes reales) ---
const SKY_URL='https://cdn.jsdelivr.net/gh/Juniorspro/General-Assets-Games@36a6e75/assets/fp/sky360.jpg';
// hace que un panorama equirectangular sea SIN COSTURA: promedia los bordes izq/der y los funde hacia adentro (borra la línea/seam del cielo)
function makeSeamlessEquirect(img){
  const w=img.naturalWidth||img.width, h=img.naturalHeight||img.height;
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const g=c.getContext('2d',{willReadFrequently:true}); g.drawImage(img,0,0,w,h);
  try{ const fw=Math.max(8,Math.round(w*0.045)); const im=g.getImageData(0,0,w,h), d=im.data;
    for(let y=0;y<h;y++){ const row=y*w*4;
      for(let k=0;k<3;k++){ const E=(d[row+k]+d[row+(w-1)*4+k])*0.5;   // promedio de la columna 0 y la última
        for(let x=0;x<fw;x++){ const a=x/fw, iL=row+x*4, iR=row+(w-1-x)*4;   // a: 0 en el borde → 1 adentro
          d[iL+k]=Math.round(E*(1-a)+d[iL+k]*a); d[iR+k]=Math.round(E*(1-a)+d[iR+k]*a); } } }
    g.putImageData(im,0,0); }catch(e){}   // si la imagen está "tainted" (CORS) usa la original tal cual
  return c;
}
let skyEnv=null;
const skyTex=new THREE.Texture(); skyTex.colorSpace=THREE.SRGBColorSpace; skyTex.mapping=THREE.EquirectangularReflectionMapping; skyTex.wrapS=THREE.RepeatWrapping;
(function(){ const img=new Image(); img.crossOrigin='anonymous';
  img.onload=()=>{ skyTex.image=makeSeamlessEquirect(img); skyTex.needsUpdate=true; try{ skyEnv=pmrem.fromEquirectangular(skyTex).texture; }catch(e){} if(grassMode||world==='void') scene.environment=skyEnv; };
  img.onerror=()=>{ new THREE.TextureLoader().load(SKY_URL,tx=>{ skyTex.image=tx.image; skyTex.needsUpdate=true; try{ skyEnv=pmrem.fromEquirectangular(tx).texture; }catch(e){} }); };
  img.src=SKY_URL; })();

function makeGroundTex(){ const S=128,c=document.createElement('canvas'); c.width=c.height=S; const g=c.getContext('2d');

  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(60,60); t.anisotropy=4; return t; }

// --- césped GPU-instanciado, dividido en TILES (grupos) alrededor del jugador ---

// el viento sólo afecta las briznas cercanas (las lejanas quedan INMÓVILES). Densidad alta (~10x).
const TILE=10; let BLADE_SP=0.11, TILES_R=3;            // tile de 10u; densidad/cobertura según GRÁFICOS (def: medio)
const grassMat=new THREE.ShaderMaterial({ side:THREE.DoubleSide,
  uniforms:{ uTime:{value:0}, uPlayer:{value:new THREE.Vector2(0,GRASS_GZ)} },
  vertexShader:`
    uniform float uTime; uniform vec2 uPlayer;
    attribute vec2 aOffset; attribute float aRand;
    varying float vY;
    float terr(vec2 p){ float lz=p.y-2000.0;
      return sin(p.x*0.035)*3.2 + cos(lz*0.045)*3.2 + sin((p.x*0.6+lz)*0.02)*5.0 + cos((p.x-lz*0.7)*0.028)*2.2; }
    void main(){
      vec4 root = modelMatrix * vec4(aOffset.x, 0.0, aOffset.y, 1.0);   // posición mundial de la raíz (traslación del tile)
      vec2 wxz = root.xz;
      float gY = terr(wxz);
      float ang = aRand*6.2831;     float ca=cos(ang), sa=sin(ang);
      float hgt = 0.4 + aRand*0.55;
      float ty = position.y;        // 0..1 a lo largo de la brizna
      vec3 lp = position;  lp.y *= hgt;
      // viento sólo cerca del jugador → las briznas lejanas quedan inmóviles
      float windAmt = 1.0 - smoothstep(16.0, 30.0, distance(wxz, uPlayer));
      float wind = (sin(uTime*1.6 + wxz.x*0.25 + wxz.y*0.18) + 0.5*sin(uTime*2.4 + wxz.x*0.4 + wxz.y*0.3)) * windAmt;
      lp.x += wind*0.20*ty*ty;  lp.z += wind*0.12*ty*ty;
      vec3 rp = vec3(lp.x*ca - lp.z*sa, lp.y, lp.x*sa + lp.z*ca);
      vec3 wp = vec3(wxz.x + rp.x, gY + rp.y, wxz.y + rp.z);
      vY = ty;
      gl_Position = projectionMatrix * viewMatrix * vec4(wp,1.0);   // wp ya es mundial → sólo vista
    }`,
  fragmentShader:`
    varying float vY;
    void main(){
      vec3 base = vec3(0.06,0.26,0.05);
      vec3 tip  = vec3(0.49,0.84,0.31);
      vec3 col = mix(base, tip, vY*vY*0.85 + 0.15);
      gl_FragColor = vec4(col,1.0);
    }`});
// geometría de UN tile: briznas en coords locales [0,TILE]; la traslación a mundo la da mesh.position (modelMatrix)
function makeTileGeo(){
  const g=new THREE.InstancedBufferGeometry(); const bw=0.04;
  g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([-bw,0,0, bw,0,0, -bw*0.7,0.5,0, bw*0.7,0.5,0, 0,1,0]),3));
  g.setIndex([0,1,2, 2,1,3, 2,3,4]);
  const per=Math.round(TILE/BLADE_SP), n=per*per;
  const off=new Float32Array(n*2), rnd=new Float32Array(n); let k=0;
  for(let i=0;i<per;i++)for(let j=0;j<per;j++){
    off[k*2]   = i*BLADE_SP + (Math.random()-0.5)*BLADE_SP;
    off[k*2+1] = j*BLADE_SP + (Math.random()-0.5)*BLADE_SP;
    rnd[k]=Math.random(); k++; }
  g.setAttribute('aOffset',new THREE.InstancedBufferAttribute(off,2));
  g.setAttribute('aRand',new THREE.InstancedBufferAttribute(rnd,1));
  g.instanceCount=n;
  // esfera envolvente AJUSTADA (su centro Y se fija al relieve del tile en relocateTiles) → culling efectivo
  g.boundingSphere=new THREE.Sphere(new THREE.Vector3(TILE/2,0,TILE/2), Math.hypot(TILE/2,TILE/2)+6);
  return g;
}
const grassTiles=[];
function buildGrassTiles(){ if(grassTiles.length)return;
  const side=TILES_R*2+1;
  for(let i=0;i<side*side;i++){ const m=new THREE.Mesh(makeTileGeo(),grassMat); m.frustumCulled=true; grassGroup.add(m); grassTiles.push({mesh:m,gx:1e9,gz:1e9}); }
}
let grassTileSnap=new THREE.Vector2(1e12,1e12);
function relocateTiles(px,pz){   // recicla los tiles para que siempre rodeen al jugador (5x5)
  const pcx=Math.floor(px/TILE), pcz=Math.floor(pz/TILE);
  if(pcx===grassTileSnap.x && pcz===grassTileSnap.y) return; grassTileSnap.set(pcx,pcz);
  const need=new Set();
  for(let dx=-TILES_R;dx<=TILES_R;dx++)for(let dz=-TILES_R;dz<=TILES_R;dz++) need.add((pcx+dx)+','+(pcz+dz));
  const have=new Set(grassTiles.map(t=>t.gx+','+t.gz));
  const free=grassTiles.filter(t=>!need.has(t.gx+','+t.gz));
  for(let dx=-TILES_R;dx<=TILES_R;dx++)for(let dz=-TILES_R;dz<=TILES_R;dz++){
    const gx=pcx+dx, gz=pcz+dz; if(have.has(gx+','+gz)) continue;
    const t=free.pop(); if(!t) continue; t.gx=gx; t.gz=gz; t.mesh.position.set(gx*TILE,0,gz*TILE);
    t.mesh.geometry.boundingSphere.center.y = terrainH(gx*TILE+TILE/2, gz*TILE+TILE/2);   // centra la esfera al relieve del tile → culling preciso
  }
}
// --- PASTO LEJANO: billboards (cards que miran a la cámara) ESTÁTICOS que cubren las zonas lejanas → no se ve pelado (medio/alto) ---
function makeTuftTex(){ const S=64,c=document.createElement('canvas'); c.width=c.height=S; const g=c.getContext('2d'); g.clearRect(0,0,S,S);
  for(let i=0;i<9;i++){ const x=6+Math.random()*(S-12), bh=20+Math.random()*30, w=2+Math.random()*2.5, gr=Math.random();
    g.fillStyle=`rgb(${40+gr*50|0},${120+gr*80|0},${45+gr*45|0})`; g.beginPath(); g.moveTo(x-w,S); g.lineTo(x+w,S); g.lineTo(x+(Math.random()-0.5)*4,S-bh); g.closePath(); g.fill(); }
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t; }
const FAR={on:false, sp:2.2, half:55};
let farMesh=null;
const farMat=new THREE.ShaderMaterial({ transparent:true, alphaTest:0.45, depthWrite:true,
  uniforms:{ uCenter:{value:new THREE.Vector2(0,GRASS_GZ)}, uMap:{value:makeTuftTex()} },
  vertexShader:`uniform vec2 uCenter; attribute vec2 aOffset; attribute float aRand; varying vec2 vUv;
    float terr(vec2 p){ float lz=p.y-2000.0; return sin(p.x*0.035)*3.2+cos(lz*0.045)*3.2+sin((p.x*0.6+lz)*0.02)*5.0+cos((p.x-lz*0.7)*0.028)*2.2; }
    void main(){ vec2 wxz=uCenter+aOffset; float gY=terr(wxz); float h=1.1+aRand*1.4, w=0.9+aRand*0.6;
      vec3 base=vec3(wxz.x,gY,wxz.y); vec3 toCam=cameraPosition-base; vec2 r=normalize(vec2(-toCam.z,toCam.x));   // billboard CILÍNDRICO (parado, gira en Y) → se ve también cerca al mirar abajo
      vec3 wp=base + vec3(r.x,0.0,r.y)*(position.x*w) + vec3(0.0,1.0,0.0)*(position.y*h);
      vUv=uv; gl_Position=projectionMatrix*viewMatrix*vec4(wp,1.0); }`,
  fragmentShader:`uniform sampler2D uMap; varying vec2 vUv; void main(){ vec4 t=texture2D(uMap,vUv); if(t.a<0.45)discard; gl_FragColor=vec4(t.rgb,1.0); }`});
function buildFarGrass(){ if(farMesh)return;
  const g=new THREE.InstancedBufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(new Float32Array([-0.5,0,0, 0.5,0,0, 0.5,1,0, -0.5,1,0]),3));
  g.setAttribute('uv',new THREE.BufferAttribute(new Float32Array([0,0, 1,0, 1,1, 0,1]),2));

let farSnap=new THREE.Vector2(1e12,1e12);
function rebuildFarInstances(){ if(!farMesh)return; const per=Math.floor(FAR.half*2/FAR.sp), n=per*per;
  const off=new Float32Array(n*2), rnd=new Float32Array(n); let k=0;
  for(let i=0;i<per;i++)for(let j=0;j<per;j++){ off[k*2]=-FAR.half+i*FAR.sp+(Math.random()-0.5)*FAR.sp; off[k*2+1]=-FAR.half+j*FAR.sp+(Math.random()-0.5)*FAR.sp; rnd[k]=Math.random(); k++; }
  farMesh.geometry.setAttribute('aOffset',new THREE.InstancedBufferAttribute(off,2));

// --- ESTRUCTURA GIGANTE: esfera metálica de celdas (tipo Frutiger Aero) con un ÁRBOL gigante adentro ---
function makeLatticeTex(){ const W=1024,H=512,c=document.createElement('canvas'); c.width=W;c.height=H; const g=c.getContext('2d');
  g.fillStyle='#d6dee8'; g.fillRect(0,0,W,H);                                  // lámina metálica clara
  // sombrear un poco la chapa con un degradé vertical (da volumen)
  const sh=g.createLinearGradient(0,0,0,H); sh.addColorStop(0,'rgba(255,255,255,0.25)'); sh.addColorStop(0.5,'rgba(170,185,205,0)'); sh.addColorStop(1,'rgba(120,135,160,0.35)'); g.fillStyle=sh; g.fillRect(0,0,W,H);
  g.globalCompositeOperation='destination-out'; g.fillStyle='#000';           // opaco → borra el alpha por completo (perfora celdas)
  const CELL=52;                                                              // celdas en grilla jitteada → nervios finos y parejos (tipo burbuja)
  for(let gy=-1;gy<=H/CELL+1;gy++)for(let gx=-1;gx<=W/CELL+1;gx++){
    const jx=(Math.random()-0.5)*CELL*0.32, jy=(Math.random()-0.5)*CELL*0.32;
    const x=gx*CELL+CELL/2+jx, y=gy*CELL+CELL/2+jy, r=CELL*(0.40+Math.random()*0.07);
    g.beginPath(); g.arc(x,y,r,0,7); g.fill();
    g.beginPath(); g.arc(x-W,y,r,0,7); g.fill(); g.beginPath(); g.arc(x+W,y,r,0,7); g.fill(); }   // envolver la costura
  g.globalCompositeOperation='source-over';
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.NoColorSpace; t.anisotropy=4; return t; }   // se usa como alphaMap (canal verde)
// === texturas PBR procedurales del ÁRBOL ===
function makeBarkTex(){ const c=document.createElement('canvas'); c.width=64;c.height=256; const g=c.getContext('2d');
  g.fillStyle='#5b3d23'; g.fillRect(0,0,64,256);
  for(let i=0;i<70;i++){ const x=Math.random()*64, w=1+Math.random()*3, v=Math.random();
    g.fillStyle=v<0.5?`rgba(40,26,15,${0.3+Math.random()*0.4})`:`rgba(120,86,52,${0.2+Math.random()*0.3})`;
    g.fillRect(x,0,w,256); }
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(3,1); return t; }
function makeLeafTex(){ const S=256,c=document.createElement('canvas'); c.width=c.height=S; const g=c.getContext('2d');
  g.clearRect(0,0,S,S);
  const greens=['#2f7d22','#3c9a2c','#56b53a','#268a3a','#1f6e2a'];
  for(let i=0;i<150;i++){ const x=20+Math.random()*(S-40), y=20+Math.random()*(S-40);
    const d=Math.hypot(x-S/2,y-S/2)/(S/2); if(Math.random()<d*0.7)continue;       // más denso al centro (forma de mata)
    const r=8+Math.random()*16, ang=Math.random()*7;
    g.save(); g.translate(x,y); g.rotate(ang); g.fillStyle=greens[(Math.random()*greens.length)|0];
    g.beginPath(); g.ellipse(0,0,r*0.5,r,0,0,7); g.fill();                          // hojita (elipse)
    g.fillStyle='rgba(255,255,255,0.12)'; g.beginPath(); g.ellipse(-r*0.12,-r*0.3,r*0.18,r*0.4,0,0,7); g.fill();   // brillo
    g.restore(); }
  const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t; }
let orbMeshRef=null, orbGlass=null, orbGloss=null;   // refs para cambiar material según gráficos
const shadowCasters=[];                              // ocluyen el sol → usado por la adaptación visual (eye adaptation)
const crystalDoorPos=new THREE.Vector3(); let crystalDoorReady=false;   // puerta azul del árbol → obby de cristal
// ÁRBOL PBR: tronco texturizado + ramas + copa de tarjetas de hojas con alpha (look frondoso real)
function buildTree(grp,groundY){
  const TH=15;                                       // alto del tronco
  const trunkMat=new THREE.MeshStandardMaterial({ map:makeBarkTex(), color:0x8a6038, roughness:0.92, metalness:0 });
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.55,1.15,TH,14), trunkMat);
  trunk.position.set(0,groundY+TH/2,0); trunk.castShadow=true; trunk.receiveShadow=true; grp.add(trunk); shadowCasters.push(trunk);
  // PUERTA AZUL en el tronco → entra al obby de cristal (mira hacia -Z, por donde llega el jugador)
  const doorFrame=new THREE.Mesh(new THREE.BoxGeometry(2.0,3.3,0.3), new THREE.MeshStandardMaterial({color:0x12387a,emissive:0x123f9c,emissiveIntensity:0.7,roughness:0.4,metalness:0.3}));
  doorFrame.position.set(0,groundY+1.55,-1.05); grp.add(doorFrame);
  const doorGlow=new THREE.Mesh(new THREE.PlaneGeometry(1.5,2.7), new THREE.MeshBasicMaterial({color:0x6fb6ff,transparent:true,opacity:0.92,fog:false,side:THREE.DoubleSide}));
  doorGlow.position.set(0,groundY+1.55,-1.22); grp.add(doorGlow);
  // ramas
  for(let i=0;i<4;i++){ const a=i*1.7+0.4, br=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.4,6,8),trunkMat);
    br.position.set(Math.cos(a)*1.6, groundY+TH-2+i*0.4, Math.sin(a)*1.6);
    br.rotation.set(Math.cos(a)*0.5, 0, -Math.sin(a)*0.5-0.5*Math.cos(a)); br.castShadow=true; grp.add(br); }
  // masa interna oscura (evita ver a través de la copa)
  const massMat=new THREE.MeshStandardMaterial({color:0x1f6325,roughness:0.9});
  const cy=groundY+TH+3.5;
  for(const [mx,my,mz,r] of [[0,0,0,5],[ -2.5,-1.5,1,3.6],[2.5,-1,-1,3.6],[0,3,0,3.4]]){
    const m=new THREE.Mesh(new THREE.IcosahedronGeometry(r,1),massMat); m.position.set(mx,cy+my,mz); m.castShadow=true; grp.add(m); shadowCasters.push(m); }
  // tarjetas de hojas (alpha) repartidas sobre la copa → silueta frondosa
  const leafMat=new THREE.MeshStandardMaterial({ map:makeLeafTex(), alphaTest:0.42, side:THREE.DoubleSide, roughness:0.72, metalness:0, transparent:false });
  const cardGeo=new THREE.PlaneGeometry(7.5,7.5);
  for(let i=0;i<34;i++){ const u=Math.random(), v=Math.random(), th=u*6.2831, ph=Math.acos(2*v-1), rr=4.4+Math.random()*2.4;
    const px=rr*Math.sin(ph)*Math.cos(th), py=rr*Math.cos(ph)*0.95, pz=rr*Math.sin(ph)*Math.sin(th);
    const card=new THREE.Mesh(cardGeo,leafMat); card.position.set(px, cy+py, pz);
    card.lookAt(px*3, cy+py*3, pz*3); card.rotateZ(Math.random()*6.28); card.scale.setScalar(0.7+Math.random()*0.7);
    card.castShadow=true; grp.add(card); }
}
function buildOrb(x,groundY,z){

  rollReq=false;

  // ---- gravedad + integración con colisión por eje ----
  player.vy-=(player.wallrun?WALL_GRAV:(world==='space'?GRAV*0.45:GRAV))*dt;   // gravedad baja en el espacio (saltos largos)
  lastWall=null;
  moveX(player.vel.x*dt); moveZ(player.vel.z*dt);
  moveY(player.vy*dt);

  // aterrizaje fuerte (caída de muy alto) → rodar automáticamente para "amortiguar" (salvo al caer dentro de un mundo: noRoll)
  if(player.onGround && prevVy < -ROLL_FALL && !player.rolling && !player.noRoll){
    const hsp=Math.hypot(player.vel.x,player.vel.z);
    player.rollDir.copy(hsp>1.5? _v.set(player.vel.x,0,player.vel.z).normalize() : forward);
    player.rolling=true; player.rollT=0;
  }
  if(player.onGround) player.noRoll=false;   // la gracia anti-voltereta dura hasta el primer aterrizaje

  // ---- AGARRE DE REPISA: salté a una superficie alta y no llegué → me agarro del BORDE real y subo ----
  if(lastWall && !player.onGround && player.vy<2 && !player.climbing && !player.rolling){
    const top=lastWall.maxy, foot=player.pos.y, rise=top-foot;
    if(rise>=1.4 && rise<=2.4){   // sólo repisas altas (al alcance de las manos); las bajas se suben saltando
      const a={minx:player.pos.x-R,maxx:player.pos.x+R,miny:top+0.02,maxy:top+player.h,minz:player.pos.z-R,maxz:player.pos.z+R};
      let blocked=false; for(const c of colliders){ if(c.mesh===ground||c.locked||c===lastWall)continue; if(overlap(a,c)){blocked=true;break;} }
      if(!blocked){
        // BORDE real: punto del techo de la repisa más cercano al jugador (no un lugar fijo)
        const ex=Math.max(lastWall.minx,Math.min(lastWall.maxx,player.pos.x));
        const ez=Math.max(lastWall.minz,Math.min(lastWall.maxz,player.pos.z));
        const wcx=(lastWall.minx+lastWall.maxx)/2, wcz=(lastWall.minz+lastWall.maxz)/2;   // hacia el centro = adentro de la repisa
        let inx=wcx-ex, inz=wcz-ez; const il=Math.hypot(inx,inz)||1; inx/=il; inz/=il;
        player.climbing=true; player.climbT=0; player.vy=0; player.vel.set(0,0,0);
        player.climbFrom.set(ex, Math.min(foot,Math.max(foot-0.4, top-GRAB_REACH)), ez);   // manos AL borde (altura de agarre)
        player.climbTo.set(ex+inx*0.5, top, ez+inz*0.5);                                    // termina arriba, un poco adentro
        estado=t('st_climb');
      }
    }
  }
  } // fin del else (física normal)
  if(player.sliding)estado=t('st_slide');

  // altura/ojo (de pie / agachado / deslizando)
  if(!player.sliding && !player.crouch) player.h=STAND;
  const targetEye=(player.sliding||player.crouch)?EYE_CR:EYE; player.eye+=(targetEye-player.eye)*Math.min(1,12*dt);

  // ---- animar el cuerpo PRIMERO (así el hueso de la cabeza ya tiene su transform de este frame) ----
  const sp=Math.hypot(player.vel.x,player.vel.z);
  // estado de animación según lo que hace el jugador (parkour)
  const animState = player.climbing ? 'climb'
    : player.rolling ? 'roll'
    : player.sliding ? 'slide'
    : player.wallrun ? 'wallrun'
    : !player.onGround ? 'idle'   // EN EL AIRE: SIEMPRE pose erguida y quieta (idle). Ni el clavado 'jump' ni la zancada 'run' — esos se ven torcidos/acostados en 3ª persona
    : (sp<0.5 ? 'idle' : ((mag>0.82 || sp>=4.2) ? 'run' : 'walk'));   // joystick a fondo o velocidad alta → CORRER
  runLoop((player.onGround && (animState==='run'||animState==='walk')) || animState==='wallrun', grassMode);   // pasos sólo en el piso (o wall-run); nunca en el aire
  // el cuerpo/piernas miran hacia donde MIRÁS, no hacia donde camina el joystick
  player.faceYaw = player.yaw;
  tickBody(dt, animState);
  // roll: inclina al correr por pared
  let targetRoll=0;
  if(player.wallrun) targetRoll += player.wallrun*0.28;
  player.roll+=(targetRoll-player.roll)*Math.min(1,10*dt);
  // FOV kick por velocidad / wallrun / slide
  const targetFov=baseFov + Math.min(5,sp*0.4) + (player.wallrun?4:0) + (player.sliding?6:0);   // base 90: kicks suaves
  player.fov+=(targetFov-player.fov)*Math.min(1,6*dt); if(Math.abs(camera.fov-player.fov)>0.05){camera.fov=player.fov;camera.updateProjectionMatrix();}
  // ---- cámara FP: a la altura de la cabeza (bob vertical real del hueso) pero CENTRADA en el cuerpo ----
  // XZ estable (centro del cuerpo + un poco adelante) → quieto miras AL FRENTE, no al hombro; sólo la ALTURA viene del hueso de la cabeza
  if(bodyHead && !player.rolling){ bodyHead.getWorldPosition(_camAnchor); }     // la cámara va EN la cabeza (sigue su posición; la cabeza queda oculta por el near-plane)
  else { _camAnchor.set(player.pos.x, player.pos.y+EYE, player.pos.z); }         // roll/carga: altura estable → la vuelta de cámara queda limpia (no se traga el cuerpo)
  const fwH=_v.set(-Math.sin(player.yaw),0,-Math.cos(player.yaw));
  // al deslizarse: baja un poquito y queda un poco ADELANTE de la cabeza — suave
  const targetLow = player.sliding ? 0.2 : 0;
  const targetBack = player.sliding ? -0.18 : 0;   // negativo = un poco hacia adelante
  player.camLow += (targetLow - player.camLow)*Math.min(1,12*dt);
  player.camBack += (targetBack - player.camBack)*Math.min(1,12*dt);
  const fwd = CAM_FWD - player.camBack;
  camera.position.set(_camAnchor.x + fwH.x*fwd, _camAnchor.y + CAM_UP - player.camLow, _camAnchor.z + fwH.z*fwd);
  // ---- LEAN: la cámara se inclina hacia adelante al correr/deslizar (se mueve con el cuerpo, no queda dura) ----
  const moveAmt=Math.min(1,sp/RUN);
  const targetLean = -0.17*moveAmt - (player.sliding?0.12:0);        // adelante (mirar un poco abajo) según velocidad
  leanPitch += (targetLean-leanPitch)*Math.min(1,5*dt);
  player.bob += dt*(7*moveAmt+0.001);                               // cadencia de pasos
  const targetRollB = Math.sin(player.bob)*0.03*moveAmt;             // balanceo suave al caminar/correr
  leanRoll += (targetRollB-leanRoll)*Math.min(1,8*dt);
  // VOLTERETA: la cámara da una vuelta completa hacia adelante (inmersión total del giro)
  let rollCam=0;
  // la VUELTA DE CÁMARA (giro completo) sólo en 1ª persona; en 3ª persona NO se cambia de vista: se ve el cuerpo dando la voltereta
  if(player.rolling && camView!=='tp'){ const t=Math.min(1,player.rollT/ROLL_DUR); rollCam = -2*Math.PI*(t*t*(3-2*t)); }
  // en 3ª persona NO inclinamos la cámara (nada de balanceo/lean/roll): si no, el mundo y el cuerpo se ven CHUECOS
  const _lp=(camView==='tp')?0:leanPitch, _lr=(camView==='tp')?0:(player.roll+leanRoll);
  euler.set(player.pitch+_lp+rollCam, player.yaw, _lr); camera.quaternion.setFromEuler(euler);
  // ---- TERCERA PERSONA: cámara DETRÁS a la altura de los hombros; mirás arriba/abajo APUNTANDO (nunca se mete bajo el cuerpo → nada de cintura deformada) ----
  const tpTarget=(camView==='tp')?1:0;
  player.camTP += (tpTarget-player.camTP)*Math.min(1,9*dt);
  if(player.camTP>0.02){
    const cx=player.pos.x, cy=player.pos.y+1.55, cz=player.pos.z;        // pivote a la altura de los hombros
    const bx=-Math.sin(player.yaw), bz=-Math.cos(player.yaw);            // adelante horizontal (la cámara va detrás)
    const want=TP_DIST*player.camTP;
    const maxB=camClipDist(cx,cy,cz,-bx,0,-bz,want+0.3);                 // anti-clip horizontal contra paredes
    const back=Math.min(want,Math.max(0.4,maxB-0.3));
    camera.position.set(cx-bx*back, cy, cz-bz*back);                     // SIEMPRE a la altura de los hombros (nunca por debajo)
    euler.set(player.pitch+rollCam, player.yaw, 0); camera.quaternion.setFromEuler(euler);   // la mirada sube/baja con el pitch (cielo o piso), el cuerpo nunca se deforma
  }

  sun.position.set(player.pos.x-40,80,player.pos.z-50); sun.target.position.copy(player.pos); sun.target.updateMatrixWorld();
  // ---- EYE ADAPTATION: rayo del jugador hacia el sol; si lo tapa la esfera/árbol → sombra → más exposición ----
  if(grassMode){
    let tgt=1.16;
    if(eyeAdapt && shadowCasters.length){
      const sdir=_v.set(sun.position.x-player.pos.x, sun.position.y-player.pos.y, sun.position.z-player.pos.z).normalize();
      _shadowRay.set(_v2.set(player.pos.x,player.pos.y+1.4,player.pos.z), sdir); _shadowRay.far=260;
      tgt = _shadowRay.intersectObjects(shadowCasters,false).length>0 ? 1.66 : 1.04;   // sombra=pupila abierta / sol=cerrada
    }
    expoCur += (tgt-expoCur)*Math.min(1, (eyeAdapt?1.9:4)*dt);   // lag lento → al salir de la sombra "deslumbra"
    renderer.toneMappingExposure=expoCur;
  }
}
/* ===================== GRÁFICOS (presets de calidad) ===================== */
// densidad/cobertura del césped optimizadas: low≈62k, med≈127k, high≈290k (antes 694k). r=radio de tiles (cobertura), sp=separación de briznas
const QUAL={ low:{pr:1.0,shadow:0,glass:false,adapt:false,sp:0.20,r:2}, med:{pr:1.5,shadow:1024,glass:false,adapt:true,sp:0.14,r:2}, high:{pr:2.0,shadow:2048,glass:true,adapt:true,sp:0.13,r:3} };
let quality='med';
function applyQuality(q){ quality=q; const Q=QUAL[q]||QUAL.med;
  BLADE_SP=Q.sp; TILES_R=Q.r;   // densidad/cobertura del césped según calidad (se aplica antes de construir los tiles)
  renderer.setPixelRatio(Math.min(devicePixelRatio,Q.pr));
  const wantShadow=Q.shadow>0;
  if(renderer.shadowMap.enabled!==wantShadow){ renderer.shadowMap.enabled=wantShadow; renderer.shadowMap.needsUpdate=true; }
  sun.castShadow=wantShadow;
  if(wantShadow){ if(sun.shadow.map){ sun.shadow.map.dispose(); sun.shadow.map=null; } sun.shadow.mapSize.set(Q.shadow,Q.shadow); }
  eyeAdapt=Q.adapt;
  if(orbMeshRef && orbGlass && orbGloss) orbMeshRef.material = Q.glass? orbGlass : orbGloss;
  // PASTO LEJANO estático: off en BAJO (queda pelado como ahora), on en medio/alto para rellenar las zonas lejanas
  FAR.on=(q!=='low'); FAR.sp=(q==='high')?1.6:2.2; FAR.half=(q==='high')?72:55;
  if(FAR.on){ buildFarGrass(); rebuildFarInstances(); farSnap.set(1e12,1e12); }
  layout();
}

/* ===================== AUDIO (SFX + música ambiente por nivel) ===================== */
const SFX_BASE='https://cdn.jsdelivr.net/gh/Juniorspro/General-Assets-Games@eabd0b0/assets/fp/sfx/';
const SND={ jump:'sfx_jump.mp3', jump_grass:'sfx_jump_grass.mp3', slide:'sfx_slide.mp3', slide_grass:'sfx_slide_grass.mp3', run:'sfx_run.mp3', run_grass:'sfx_run_grass.mp3', btn:'sfx_btn.mp3', wrong:'sfx_wrong.mp3', spawn:'sfx_spawn.mp3', menu:'sfx_menu.mp3', play:'sfx_play.mp3', amb1:'amb1.mp3', amb2:'amb2.mp3', amb3:'amb3.mp3', amb4:'amb4.mp3', amb5:'amb5.mp3' };
const AUD={ on:false, el:{}, amb:null, ambKey:null, run:null, runKey:null };
function aGet(k){ let a=AUD.el[k]; if(!a){ a=new Audio(SFX_BASE+SND[k]); a.preload='auto'; AUD.el[k]=a; } return a; }
function sfx(k,vol){ if(!AUD.on||!SND[k])return; try{ const a=aGet(k); a.volume=(vol==null?0.9:vol); a.currentTime=0; const p=a.play(); if(p&&p.catch)p.catch(()=>{}); }catch(e){} }   // efecto puntual
function ambient(k){ if(!AUD.on||!SND[k]||AUD.ambKey===k)return; AUD.ambKey=k; try{ if(!AUD.amb){ AUD.amb=new Audio(); AUD.amb.loop=true; } AUD.amb.volume=0.3; AUD.amb.src=SFX_BASE+SND[k]; const p=AUD.amb.play(); if(p&&p.catch)p.catch(()=>{}); }catch(e){} }   // música del nivel (loop, cambia al cambiar de mundo)
function runLoop(on,grass){ if(!AUD.on)return; if(on){ const k=grass?'run_grass':'run'; if(AUD.runKey!==k){ if(AUD.run)AUD.run.pause(); AUD.run=aGet(k); AUD.run.loop=true; AUD.run.volume=0.22; AUD.runKey=k; const p=AUD.run.play(); if(p&&p.catch)p.catch(()=>{}); } } else if(AUD.run){ AUD.run.pause(); AUD.run=null; AUD.runKey=null; } }   // pasos en bucle mientras corrés (pasto / fuera del pasto)
function audioStart(){ AUD.on=true; }   // se habilita con el primer gesto del usuario (móvil)
const VOID_TRACKS=['amb3','amb4','amb5'];   // varias músicas para el VACÍO (rotan para dar variedad)
function voidMusic(){ let k; do{ k=VOID_TRACKS[Math.floor(Math.random()*VOID_TRACKS.length)]; }while(VOID_TRACKS.length>1 && k===AUD.ambKey); ambient(k); }

/* ===================== CHAT DE VOZ (WebRTC P2P, señalización por MQTT, push-to-talk) ===================== */
const VOICE={ ok:!!(typeof RTCPeerConnection!=='undefined' && navigator.mediaDevices && navigator.mediaDevices.getUserMedia), stream:null, peers:new Map(), inited:false };
const RTC_CFG={ iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}] };
function voiceSend(to,type,data){ if(MP.on&&MP.client) MP.client.publish(MP.room+'/rtc', JSON.stringify({id:MP.id,to:to||null,type,data:data||null}),{qos:0}); }
async function voiceInit(){ if(VOICE.inited||!VOICE.ok) return VOICE.inited; VOICE.inited=true;
  try{ VOICE.stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true},video:false});
    VOICE.stream.getAudioTracks().forEach(tk=>tk.enabled=false);   // arranca MUTE (push-to-talk)
    voiceSend(null,'ready'); return true;
  }catch(e){ VOICE.inited=false; mpChatIn('🎤','(sin permiso de micrófono)'); return false; }
}
function voicePeer(id){ let pr=VOICE.peers.get(id); if(pr)return pr; if(!VOICE.stream)return null;
  const pc=new RTCPeerConnection(RTC_CFG); VOICE.stream.getTracks().forEach(tk=>pc.addTrack(tk,VOICE.stream));
  const au=document.createElement('audio'); au.autoplay=true; au.playsInline=true; document.body.appendChild(au);
  pc.ontrack=e=>{ au.srcObject=e.streams[0]; const p=au.play(); if(p&&p.catch)p.catch(()=>{}); };   // se escucha al otro
  pc.onicecandidate=e=>{ if(e.candidate) voiceSend(id,'ice',e.candidate); };
  pc.onconnectionstatechange=()=>{ const s=pc.connectionState; if(s==='connected'){ const r=MP.remotes.get(id); mpChatIn('🔊','voz conectada'+(r?(' con '+(r.name||'')):'')); } else if(s==='failed'||s==='closed'){ voiceClose(id); } };
  pr={pc,au,pending:[]}; VOICE.peers.set(id,pr); return pr;
}
function voiceFlush(pr){ const q=pr.pending.splice(0); for(const c of q){ try{ pr.pc.addIceCandidate(c); }catch(e){} } }
async function voiceOffer(id){ const pr=voicePeer(id); if(!pr)return; if(pr.pc.signalingState!=='stable')return;   // ya hay una negociación en curso → no dupliques
  try{ const o=await pr.pc.createOffer(); await pr.pc.setLocalDescription(o); voiceSend(id,'offer',pr.pc.localDescription); }catch(e){} }
function voiceClose(id){ const pr=VOICE.peers.get(id); if(pr){ try{pr.pc.close();}catch(e){} if(pr.au){ pr.au.srcObject=null; pr.au.remove(); } VOICE.peers.delete(id); } }
async function voiceSignal(d){ if(!VOICE.ok)return;
  if(d.type==='ready'){ if(!VOICE.stream)return; if(MP.id<d.id) voiceOffer(d.id); else voiceSend(d.id,'ready'); }   // el de id MENOR inicia; el mayor le devuelve 'ready' para que el menor ofrezca (sin importar quién entró primero)
  else if(d.type==='offer'){ if(!VOICE.stream)return; const pr=voicePeer(d.id); if(!pr)return; try{ await pr.pc.setRemoteDescription(d.data); voiceFlush(pr); const a=await pr.pc.createAnswer(); await pr.pc.setLocalDescription(a); voiceSend(d.id,'answer',pr.pc.localDescription); }catch(e){} }
  else if(d.type==='answer'){ const pr=VOICE.peers.get(d.id); if(pr) try{ await pr.pc.setRemoteDescription(d.data); voiceFlush(pr); }catch(e){} }
  else if(d.type==='ice'){ const pr=VOICE.peers.get(d.id); if(pr){ if(pr.pc.remoteDescription&&pr.pc.remoteDescription.type){ try{ await pr.pc.addIceCandidate(d.data); }catch(e){} } else pr.pending.push(d.data); } }
}
function voiceTalk(on){ voiceTalking=on; if(VOICE.stream) VOICE.stream.getAudioTracks().forEach(tk=>tk.enabled=on); }   // voiceTalking se transmite en el estado → ícono verde en los demás
let voiceActive=false;
async function voiceToggle(){ audioStart(); const bv=document.getElementById('bVoice');

  } else {
    voiceActive=false; voiceTalk(false); if(bv)bv.classList.remove('on'); mpChatIn('🎤','micrófono apagado');

const BOARD=new Map();   // id → {name,best}  (online + guardado en este dispositivo)
function boardLoad(){ try{ const j=JSON.parse(localStorage.getItem('pf_board')||'[]'); for(const e of j) if(e&&e.id) BOARD.set(e.id,{name:e.name||'jugador',best:e.best||0}); }catch(e){} }

function boardUpdate(id,name,best){ best=+best||0; if(best<1)return; const cur=BOARD.get(id), nb=Math.max(best,cur?cur.best:0); if(!cur||nb!==cur.best||name!==cur.name){ BOARD.set(id,{name:name||'jugador',best:nb}); boardSave(); refreshBoards(); } }

function renderBoard(el){ if(!el)return; const rows=[{name:(MP.name||'vos')+' (vos)',best:voidUnlockedMax||0,me:true}];
  for(const [id,v] of BOARD){ if(id===MP.id)continue; rows.push({name:v.name,best:v.best,me:false}); }
  rows.sort((a,b)=>b.best-a.best);
  el.innerHTML = rows.slice(0,12).map((r,i)=>'<div class="bRow'+(r.me?' me':'')+'"><span>'+(i+1)+'. '+mpEsc(r.name)+'</span><b>'+t('fase')+' '+(r.best||0)+'</b></div>').join('') || '<div class="bRow"><span>—</span></div>'; }
// --- pestañas (cada una se abre aparte, no inline) ---
const pauseEl=document.getElementById('pause'), settingsPanelEl=document.getElementById('settingsPanel'), boardPanelEl=document.getElementById('boardPanel');
function refreshBoards(){ if(boardPanelEl&&boardPanelEl.classList.contains('show')) renderBoard(bigBoardEl); }
function openPause(){ if(!pauseEl||menuMode)return; paused=true; pauseEl.classList.add('show'); }
function closePause(){ if(pauseEl)pauseEl.classList.remove('show'); paused=false; }
function openSettings(){ if(settingsPanelEl)settingsPanelEl.classList.add('show'); }
function closeSettings(){ if(settingsPanelEl)settingsPanelEl.classList.remove('show'); }
function openBoard(){ renderBoard(bigBoardEl); if(boardPanelEl)boardPanelEl.classList.add('show'); }
function closeBoard(){ if(boardPanelEl)boardPanelEl.classList.remove('show'); }
function exitToMenu(){ closePause(); closeSettings(); closeBoard(); menuMode=true; try{ enterGrass(false,false); }catch(e){} renderer.setPixelRatio(0.32); document.body.classList.add('menu-open'); menuEl.classList.remove('hide'); }

/* ===================== Init ===================== */
boardLoad();
setupQuiz();   // randomiza las sumas del edificio 4
applyLang(lang);   // aplica el idioma guardado a todo el menú/HUD/botones
const loaderEl=document.getElementById('loader');
// PRECARGA de TODOS los assets (texturas, modelos, sonidos y música) antes de jugar
function preloadAll(onp){
  const urls=[ SKY_URL, SPACE_SKY_URL, EBASE+BODY_FILE, METAL_BASE+'metal_col.jpg', METAL_BASE+'metal_nrm.jpg', METAL_BASE+'metal_rough.jpg', METAL_BASE+'metal_met.jpg' ];
  for(const k in SND) urls.push(SFX_BASE+SND[k]);   // todos los sonidos y la música
  const total=urls.length+3; let done=0; const step=()=>{ done++; if(onp)onp(done,total); };
  const tasks=urls.map(u=> fetch(u).then(r=>r.blob()).then(step).catch(step) );   // baja TODOS los bytes (texturas, modelo, sonidos, música)
  // …y además ESPERA a que estén realmente listos para jugar (no solo descargados)
  const whenReady=chk=>new Promise(res=>{ const t0=performance.now(); const iv=setInterval(()=>{ if(chk()||performance.now()-t0>14000){ clearInterval(iv); step(); res(); } },150); });
  tasks.push(whenReady(()=>!!bodyRoot));                       // modelo del personaje cargado + parseado
  tasks.push(whenReady(()=>!!(skyTex&&skyTex.image)&&!!skyEnv));   // cielo + entorno listos
  tasks.push(whenReady(()=>!!spaceEnv));                       // entorno del espacio listo
  return Promise.all(tasks);
}
try{
  enterGrass(false,false);            // arma el mundo frutiger (terreno+estructura+cielo) como FONDO del menú, SIN briznas (carga liviana) y SIN mover al jugador
  renderer.setPixelRatio(0.32);       // render bajo (~144p) → difuminado por CSS detrás del menú
  document.body.classList.add('menu-open');
  layout(); renderer.render(scene,camera);
  if(loaderEl) loaderEl.textContent='cargando… 0%';
  preloadAll((d,t)=>{ if(loaderEl) loaderEl.textContent='cargando… '+Math.round(d/t*100)+'%'; })
    .then(()=>{ if(loaderEl) loaderEl.classList.add('hide'); })
    .catch(()=>{ if(loaderEl) loaderEl.classList.add('hide'); });
  setTimeout(()=>{ if(loaderEl && !loaderEl.classList.contains('hide')) loaderEl.classList.add('hide'); }, 15000);   // tope de seguridad por si la red es lenta
}
catch(err){ console.error('Init',err); if(loaderEl) loaderEl.classList.add('hide'); }
// música del nivel 1 en el MENÚ: arranca con el primer toque (los móviles bloquean el autoplay)
window.addEventListener('pointerdown',()=>{ audioStart(); if(menuMode) ambient('amb1'); }, {once:true});
try{ tapBtn('bChat',()=>mpSendChat()); tapBtn('bPack',()=>togglePack());
  tapBtn('bVoice',()=>voiceToggle());   // CHAT DE VOZ: un toque ACTIVA el micrófono (queda prendido); otro toque lo apaga
  tapBtn('btnMenu',()=>openPause());   // botón de menú en juego (Resumen / Ajustes / Salir)
  mpConnect(); }catch(e){ console.warn('multijugador no disponible',e); }   // overlay: solo se activa si conecta
animate();
</script>
