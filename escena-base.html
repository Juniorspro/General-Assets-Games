<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#bcd6ef" />
<title>Escena · Crafteo</title>
<style>
  :root{ --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px); }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ height:100%; overflow:hidden; background:#bcd6ef; font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; color:#eef3f8; overscroll-behavior:none; }
  #stage{ position:fixed; inset:0; }
  body.rot #stage{ width:100vh; height:100vw; top:50%; left:50%; transform:translate(-50%,-50%) rotate(90deg); transform-origin:center; }
  #app{ position:absolute; inset:0; }
  #app canvas{ display:block; width:100%!important; height:100%!important; touch-action:none; }
  #cross{ position:fixed; left:50%; top:50%; width:6px; height:6px; margin:-3px; z-index:6; border-radius:50%; background:rgba(255,255,255,.6); box-shadow:0 0 4px rgba(0,0,0,.6); pointer-events:none; }

  /* Joystick */
  #joy{ position:fixed; left:26px; bottom:calc(28px + var(--safe-b)); z-index:20; width:128px; height:128px; border-radius:50%;
        background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.18); backdrop-filter:blur(6px); touch-action:none; }
  #joyKnob{ position:absolute; left:50%; top:50%; width:52px; height:52px; margin:-26px 0 0 -26px; border-radius:50%;
            background:radial-gradient(circle at 38% 34%,#dff0ff,#5aa0ff); box-shadow:0 4px 16px rgba(0,0,0,.45); }

  /* Botones de acción */
  .actBtn{ position:fixed; z-index:20; width:66px; height:66px; border-radius:50%; background:rgba(255,255,255,.06);
           border:1.5px solid rgba(255,255,255,.2); color:#eef3f8; font-size:24px; backdrop-filter:blur(6px); cursor:pointer;
           display:flex; align-items:center; justify-content:center; transition:transform .1s,background .15s; }
  .actBtn:active{ transform:scale(.92); }
  .actBtn.on{ background:rgba(90,160,255,.3); border-color:#8fe3ff; }
  .actBtn.hidden{ display:none; }
  #bAxe   { right:26px; bottom:calc(30px + var(--safe-b)); }
  #bJump  { right:104px; bottom:calc(58px + var(--safe-b)); }
  #bCrouch{ right:34px; bottom:calc(112px + var(--safe-b)); width:58px; height:58px; font-size:20px; }
  #bPlace { right:104px; bottom:calc(136px + var(--safe-b)); width:58px; height:58px; font-size:20px; }
  #bRot   { right:170px; bottom:calc(136px + var(--safe-b)); width:58px; height:58px; font-size:20px; }

  /* Botones superiores */
  .topBtn{ position:fixed; top:calc(14px + var(--safe-t)); z-index:21; width:46px; height:46px; border-radius:12px;
           background:rgba(18,22,30,.62); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.14); color:#eef3f8;
           font-size:19px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  #bSet{ right:14px; } #bBag{ right:68px; } #bCraft{ right:122px; }

  #hint{ position:fixed; left:50%; top:calc(12px + var(--safe-t)); transform:translateX(-50%); z-index:6; font-size:11px; opacity:.5;
         pointer-events:none; text-shadow:0 1px 3px rgba(0,0,0,.6); }

  /* Cartel 2D sobre la mesa */
  #tableSign{ position:fixed; z-index:18; transform:translate(-50%,-100%); display:none; cursor:pointer; }
  .signBody{ background:rgba(18,22,30,.82); border:1px solid rgba(150,200,255,.35); border-radius:10px; padding:8px 12px; font-size:12px;
             backdrop-filter:blur(8px); white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,.5); position:relative; }
  .signBar{ height:3px; margin-top:6px; border-radius:3px; background:rgba(255,255,255,.18); overflow:hidden; }
  .signBar i{ display:block; height:100%; width:0; background:linear-gradient(90deg,#7fd0ff,#b98bff); }

  /* Overlays */
  .scrim{ position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center;
          background:radial-gradient(120% 120% at 60% 40%,rgba(12,16,22,.4),rgba(6,8,12,.7)); backdrop-filter:blur(12px);
          opacity:0; pointer-events:none; transition:opacity .25s; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .card{ width:min(460px,calc(100vw - 32px)); max-height:calc(100vh - 36px); overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:pan-y; overscroll-behavior:contain;
         background:linear-gradient(165deg,rgba(26,30,38,.95),rgba(12,14,19,.97)); border:1px solid rgba(150,180,220,.16);
         border-radius:20px; padding:20px; box-shadow:0 30px 90px rgba(0,0,0,.75); position:relative; }
  body.rot .card{ max-height:calc(100vw - 36px); width:min(460px,calc(100vh - 36px)); }
  .card h2{ font-size:22px; font-weight:700; text-align:center; margin-bottom:6px; }
  .xClose{ position:absolute; top:12px; right:12px; width:30px; height:30px; border-radius:9px; cursor:pointer;
           background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16); color:#eef3f8; font-size:15px;
           display:flex; align-items:center; justify-content:center; }
  .xClose:hover{ background:rgba(255,90,90,.22); border-color:#ff7b7b; }

  /* Etiquetas de papel (pestañas de crafteo) */
  .tabs{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:14px 0 16px; }
  .paper{ font-family:"Georgia","Times New Roman",serif; background:linear-gradient(180deg,#efe6cf,#ddd0ad); color:#3a2c14;
          padding:9px 14px; border-radius:3px 10px 4px 9px; font-size:13px; cursor:pointer; position:relative;
          box-shadow:0 3px 8px rgba(0,0,0,.4); transform:rotate(-1.5deg); border:1px solid #c9b88c; transition:transform .12s,filter .12s; }
  .paper:nth-child(2n){ transform:rotate(1.6deg); } .paper:nth-child(3n){ transform:rotate(-.8deg); }
  .paper::before{ content:""; position:absolute; left:9px; top:-5px; width:10px; height:10px; border-radius:50%; background:#8a7038; box-shadow:0 0 0 2px rgba(0,0,0,.15); }
  .paper.active{ filter:brightness(1.12) saturate(1.1); transform:scale(1.06) rotate(0deg); box-shadow:0 6px 16px rgba(0,0,0,.5),0 0 0 2px #c98b3a inset; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; }
  .item{ background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.015)); border:1px solid rgba(160,190,225,.14);
         border-radius:12px; padding:12px; text-align:center; cursor:pointer; transition:all .14s; }
  .item:hover{ border-color:#7fd0ff; background:rgba(120,170,255,.12); }
  .item.locked{ opacity:.45; cursor:not-allowed; }
  .item.selected{ border-color:#8fe3ff; box-shadow:0 0 0 2px rgba(120,200,255,.5) inset; }
  .item .ic{ width:64px; height:64px; margin:0 auto 8px; display:flex; align-items:center; justify-content:center; }
  .item .ic img{ width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 3px 6px rgba(0,0,0,.5)); }
  .item .nm{ font-size:13px; font-weight:600; }
  .item .sub{ font-size:10.5px; opacity:.6; margin-top:3px; }
  .emptyMsg{ text-align:center; opacity:.5; font-size:13px; padding:24px 0; }
  .seg{ display:flex; gap:6px; } .seg button{ flex:1; padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,.14);
        background:rgba(255,255,255,.05); color:#eef3f8; cursor:pointer; font-size:12px; } .seg button.active{ background:#2f6dd0; border-color:#8fe3ff; }
  .lbl{ font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; opacity:.5; margin:14px 0 8px; }

  #loader{ position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
           background:#bcd6ef; transition:opacity .5s; color:#08365f; font-size:13px; letter-spacing:.1em; }
  #loader.hide{ opacity:0; pointer-events:none; }
</style>
</head>
<body>
<div id="loader">…</div>
<div id="stage">
  <div id="app"></div>
  <div id="cross"></div>
  <div id="joy"><div id="joyKnob"></div></div>

  <button id="bSet"   class="topBtn">⚙</button>
  <button id="bBag"   class="topBtn">🎒</button>
  <button id="bCraft" class="topBtn">🛠️</button>

  <button id="bAxe"    class="actBtn">🪓</button>
  <button id="bJump"   class="actBtn">⤴️</button>
  <button id="bCrouch" class="actBtn">🔽</button>
  <button id="bPlace"  class="actBtn">✏️</button>
  <button id="bRot"    class="actBtn hidden">🔁</button>

  <div id="hint"></div>

  <!-- Crafteo -->
  <div id="craft" class="scrim">
    <div class="card">
      <div class="xClose" data-close="craft">✕</div>
      <h2 id="craftTitle">Fabricación</h2>
      <div class="tabs" id="craftTabs"></div>
      <div class="grid" id="craftGrid"></div>
    </div>
  </div>

  <!-- Mochila -->
  <div id="bag" class="scrim">
    <div class="card">
      <div class="xClose" data-close="bag">✕</div>
      <h2 data-i18n="inventory">Mochila</h2>
      <div class="grid" id="bagGrid"></div>
      <div class="emptyMsg" id="bagEmpty" data-i18n="bagEmpty">Vacía. Fabricá algo en 🛠️.</div>
    </div>
  </div>

  <!-- Menú de colocación (muebles crafteados) -->
  <div id="placeMenu" class="scrim">
    <div class="card">
      <div class="xClose" data-close="placeMenu">✕</div>
      <h2 data-i18n="placeTitle">Colocar</h2>
      <div class="grid" id="placeGrid"></div>
      <div class="emptyMsg" id="placeEmpty" data-i18n="placeEmpty">No tenés muebles. Fabricá una mesa.</div>
    </div>
  </div>

  <!-- Ajustes -->
  <div id="settings" class="scrim">
    <div class="card">
      <div class="xClose" data-close="settings">✕</div>
      <h2 data-i18n="settings">Ajustes</h2>
      <div class="lbl" data-i18n="language">Idioma</div>
      <div class="seg" id="langSeg">
        <button data-lang="es">Español</button><button data-lang="en">English</button><button data-lang="pt">Português</button>
      </div>
      <div class="lbl" data-i18n="rotate90">Girar 90° en vertical</div>
      <div class="seg" id="rotSeg"><button data-r="on">On</button><button data-r="off">Off</button></div>
    </div>
  </div>

  <!-- Cartel sobre la mesa -->
  <div id="tableSign"><div class="signBody"><span id="signTxt"></span><div class="signBar"><i id="signFill"></i></div></div></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

/* ===================== i18n ===================== */
const I18N={
  es:{jump:'Saltar',crouch:'Agacharse',axe:'Hacha',build:'Construir',craft:'Fabricación',inventory:'Mochila',settings:'Ajustes',language:'Idioma',rotate90:'Girar 90° en vertical',
      weapons:'Armas',furniture:'Muebles',tools:'Herramientas',construction:'Construcción',table:'Mesa',hammer:'Martillo',spear:'Lanza de madera',knife:'Cuchillo de metal',
      machete:'Machete',botella:'Botella incendiaria',guadana:'Guadaña',hacha:'Hacha tomahawk',picomad:'Pico de madera',arco:'Arco',lanzapiedra:'Lanza de piedra',cuchipiedra:'Cuchillo de piedra',picopiedra:'Pico de piedra',flechamad:'Flechas de madera',flechapiedra:'Flechas de piedra',flechaafil:'Flechas afiladas',lanzaafil:'Lanza afilada',picoafil:'Pico afilado',cuchiafil:'Cuchillo afilado',antorcha:'Antorcha',azadamad:'Azada de madera',azadapiedra:'Azada de piedra',baldemad:'Balde de madera',baldechapa:'Balde de chapa',addWater:'Cargar agua',waterFull:'Balde lleno',
      cama:'Cama',horno:'Horno',silla:'Silla',recagua:'Recolector de agua',bidon:'Bidón',perchero:'Perchero',fogata:'Fogata',conserv:'Conservador de carne',pmad:'Pared de madera',smad:'Suelo de madera',tmad:'Techo de madera',vmad:'Pared con ventana',dmad:'Pared con puerta',pcha:'Pared de chapa',scha:'Suelo de chapa',vcha:'Pared de chapa c/ventana',dcha:'Pared de chapa c/puerta',free:'Gratis',craftBtn:'Fabricar',crafted:'¡Fabricado!',
      placeTitle:'Colocar',placeEmpty:'No tenés muebles. Fabricá una mesa.',bagEmpty:'Vacía. Fabricá algo en 🛠️.',needTable:'Requiere mesa',locked:'Bloqueado',

      useTable:'Mantené para usar la mesa',hintNormal:'Joystick: caminar/correr · arrastrá: mirar',hintPlace:'Mirá dónde colocar · 🔁 girar · 🪓 construir',empty:'— vacío —'},
  en:{jump:'Jump',crouch:'Crouch',axe:'Axe',build:'Build',craft:'Crafting',inventory:'Backpack',settings:'Settings',language:'Language',rotate90:'Rotate 90° in portrait',
      weapons:'Weapons',furniture:'Furniture',tools:'Tools',construction:'Construction',table:'Table',hammer:'Hammer',spear:'Wooden spear',knife:'Metal knife',
      machete:'Machete',botella:'Molotov',guadana:'Scythe',hacha:'Tomahawk axe',picomad:'Wood pickaxe',arco:'Bow',lanzapiedra:'Stone spear',cuchipiedra:'Stone knife',picopiedra:'Stone pickaxe',flechamad:'Wood arrows',flechapiedra:'Stone arrows',flechaafil:'Sharp arrows',lanzaafil:'Sharp spear',picoafil:'Sharp pickaxe',cuchiafil:'Sharp knife',antorcha:'Torch',azadamad:'Wood hoe',azadapiedra:'Stone hoe',baldemad:'Wood bucket',baldechapa:'Metal bucket',addWater:'Collect water',waterFull:'Bucket full',
      cama:'Bed',horno:'Oven',silla:'Chair',recagua:'Water collector',bidon:'Barrel',perchero:'Coat stand',fogata:'Campfire',conserv:'Meat curer',pmad:'Wood wall',smad:'Wood floor',tmad:'Wood roof',vmad:'Wall + window',dmad:'Wall + door',pcha:'Metal wall',scha:'Metal floor',vcha:'Metal wall + window',dcha:'Metal wall + door',free:'Free',craftBtn:'Craft',crafted:'Crafted!',
      placeTitle:'Place',placeEmpty:'No furniture yet. Craft a table.',bagEmpty:'Empty. Craft something in 🛠️.',needTable:'Needs a table',locked:'Locked',
      equip:'Equip',equipped:'Equipped',selectHammer:'Equip the hammer in 🎒 to place furniture.',rotate:'Rotate',building:'Building…',
      useTable:'Hold to use the table',hintNormal:'Joystick: walk/run · drag: look',hintPlace:'Aim where to place · 🔁 rotate · 🪓 build',empty:'— empty —'},
  pt:{jump:'Pular',crouch:'Agachar',axe:'Machado',build:'Construir',craft:'Fabricação',inventory:'Mochila',settings:'Ajustes',language:'Idioma',rotate90:'Girar 90° na vertical',
      weapons:'Armas',furniture:'Móveis',tools:'Ferramentas',construction:'Construção',table:'Mesa',hammer:'Martelo',spear:'Lança de madeira',knife:'Faca de metal',
      machete:'Facão',botella:'Coquetel molotov',guadana:'Foice',hacha:'Machado tomahawk',picomad:'Picareta de madeira',arco:'Arco',lanzapiedra:'Lança de pedra',cuchipiedra:'Faca de pedra',picopiedra:'Picareta de pedra',flechamad:'Flechas de madeira',flechapiedra:'Flechas de pedra',flechaafil:'Flechas afiadas',lanzaafil:'Lança afiada',picoafil:'Picareta afiada',cuchiafil:'Faca afiada',antorcha:'Tocha',azadamad:'Enxada de madeira',azadapiedra:'Enxada de pedra',baldemad:'Balde de madeira',baldechapa:'Balde de chapa',addWater:'Coletar água',waterFull:'Balde cheio',
      cama:'Cama',horno:'Forno',silla:'Cadeira',recagua:'Coletor de água',bidon:'Bidão',perchero:'Cabideiro',fogata:'Fogueira',conserv:'Conservador',pmad:'Parede de madeira',smad:'Piso de madeira',tmad:'Telhado de madeira',vmad:'Parede + janela',dmad:'Parede + porta',pcha:'Parede de chapa',scha:'Piso de chapa',vcha:'Parede de chapa + janela',dcha:'Parede de chapa + porta',free:'Grátis',craftBtn:'Fabricar',crafted:'Fabricado!',
      placeTitle:'Colocar',placeEmpty:'Sem móveis. Fabrique uma mesa.',bagEmpty:'Vazia. Fabrique algo em 🛠️.',needTable:'Precisa de mesa',locked:'Bloqueado',
      equip:'Equipar',equipped:'Equipado',selectHammer:'Equipe o martelo em 🎒 para colocar móveis.',rotate:'Girar',building:'Construindo…',
      useTable:'Segure para usar a mesa',hintNormal:'Joystick: andar/correr · arraste: olhar',hintPlace:'Mire onde colocar · 🔁 girar · 🪓 construir',empty:'— vazio —'}
};
let lang='es'; const T=k=>(I18N[lang]||I18N.es)[k]||k;
const $=id=>document.getElementById(id);
function applyLang(){ document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n'); if(I18N[lang][k]!=null)el.textContent=I18N[lang][k];});
  $('craftTitle').textContent=T('craft'); refreshHints(); rebuildTabs(); if($('craft').classList.contains('show'))renderCraft(); }

/* ===================== Render / escena ===================== */
const app=$('app');
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.18;
app.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xcfe0ee);          // cielo de desierto (claro, algo de calina)
scene.fog=new THREE.Fog(0xe7d6b0,90,340);            // bruma cálida arenosa a lo lejos
// entorno PMREM → reflejos en metales/PBR (look RTX, no apagado)
const pmrem=new THREE.PMREMGenerator(renderer); scene.environment=pmrem.fromScene(new RoomEnvironment(),0.04).texture;
const camera=new THREE.PerspectiveCamera(64,1,0.1,2000);

// suelo de ARENA (textura v2)
const ground=new THREE.Mesh(new THREE.PlaneGeometry(600,600),new THREE.MeshStandardMaterial({color:0xd8c39a,roughness:1,metalness:0}));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; ground.matrixAutoUpdate=false; ground.updateMatrix(); scene.add(ground);
const GROUND_LIMIT=120;

const sun=new THREE.Mesh(new THREE.SphereGeometry(8,28,20),new THREE.MeshBasicMaterial({color:0xfff3c8,fog:false}));
sun.position.set(-60,90,-110); scene.add(sun);
const sunLight=new THREE.DirectionalLight(0xfff2d8,2.6); sunLight.position.copy(sun.position); sunLight.castShadow=true;
sunLight.shadow.mapSize.set(2048,2048); sunLight.shadow.camera.near=1; sunLight.shadow.camera.far=200;
sunLight.shadow.camera.left=-40; sunLight.shadow.camera.right=40; sunLight.shadow.camera.top=40; sunLight.shadow.camera.bottom=-40; sunLight.shadow.bias=-0.0004; sunLight.shadow.normalBias=0.04;
scene.add(sunLight); scene.add(sunLight.target);
scene.add(new THREE.HemisphereLight(0xdfeeff,0xcfd6dc,0.85));

/* ===================== Materiales PBR (del repo) ===================== */
const TEXP='https://cdn.jsdelivr.net/gh/Juniorspro/General-Assets-Games@601965c/assets/textures/axe/';
const TL=new THREE.TextureLoader(); TL.crossOrigin='anonymous';
function loadPBR(mat,base,rep,maps){ // maps: {col,nrm,rgh,met}
  for(const k in maps){ TL.load(TEXP+maps[k],t=>{ t.colorSpace=(k==='col')?THREE.SRGBColorSpace:THREE.NoColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(rep,rep); t.anisotropy=8;
    if(k==='col'){mat.map=t;mat.color.set(0xffffff);} else if(k==='nrm')mat.normalMap=t; else if(k==='rgh'){mat.roughnessMap=t;mat.roughness=1;} else if(k==='met'){mat.metalnessMap=t;mat.metalness=1;}
    mat.needsUpdate=true; },undefined,()=>{}); }
}
const woodMat=new THREE.MeshStandardMaterial({color:0xb4905a,roughness:0.7,metalness:0.05});
const woodDark=new THREE.MeshStandardMaterial({color:0x7d5a33,roughness:0.66,metalness:0.05});
loadPBR(woodMat,TEXP,1.4,{col:'wood_col.jpg',nrm:'wood_nrm.jpg',rgh:'wood_rgh.jpg'});
loadPBR(woodDark,TEXP,1.0,{col:'wood_col.jpg',nrm:'wood_nrm.jpg',rgh:'wood_rgh.jpg'});
const metalMat=new THREE.MeshStandardMaterial({color:0xcfd4da,roughness:0.42,metalness:0.95,envMapIntensity:1.2});
loadPBR(metalMat,TEXP,1.0,{col:'metal_col.jpg',nrm:'metal_nrm.jpg',rgh:'metal_rgh.jpg',met:'metal_met.jpg'});
// plástico: textura PBR pendiente de confirmar nombre en el repo → material liso provisional
const plasticMat=new THREE.MeshStandardMaterial({color:0x232a30,roughness:0.38,metalness:0.0});

/* ===================== Texturas v2 + DESIERTO de prueba ===================== */
const V2='https://cdn.jsdelivr.net/gh/Juniorspro/General-Assets-Games@bf015fa/assets/textures/v2/';
function tx(file,srgb,rep){const t=TL.load(V2+file,undefined,undefined,()=>{});t.colorSpace=srgb?THREE.SRGBColorSpace:THREE.NoColorSpace;t.wrapS=t.wrapT=THREE.RepeatWrapping;if(rep)t.repeat.set(rep,rep);t.anisotropy=8;return t;}
// ARENA SECA: textura aclarada + rugosidad alta + normal suave
ground.material.map=tx('sand2_col.jpg',true,70); ground.material.normalMap=tx('sand2_nrm.jpg',false,70); ground.material.normalScale.set(0.4,0.4);
ground.material.roughnessMap=tx('sand2_rgh.jpg',false,70); ground.material.color.set(0xeadbb8); ground.material.roughness=1; ground.material.metalness=0; ground.material.needsUpdate=true;
// MATERIALES PBR agrupados

function consPiece(type,mat){const g=new THREE.Group();const W=4,H=3.2,Tk=0.2;
  if(type==='wall') g.add(boxM(W,H,Tk,mat,0,H/2,0));
  else if(type==='floor') g.add(boxM(W,0.18,W,mat,0,0.09,0));
  else if(type==='roof'){ const s=boxM(W+0.4,0.18,W+0.4,mat,0,H*0.55,0); s.rotation.x=-0.4; g.add(s); g.add(boxM(0.2,H*0.55,0.2,mat,-W/2+0.2,H*0.27,0)); g.add(boxM(0.2,H*0.55,0.2,mat,W/2-0.2,H*0.27,0)); }
  else if(type==='window'){ g.add(boxM(W,0.9,Tk,mat,0,H-0.45,0)); g.add(boxM(W,0.7,Tk,mat,0,0.35,0)); g.add(boxM(0.9,H,Tk,mat,-W/2+0.45,H/2,0)); g.add(boxM(0.9,H,Tk,mat,W/2-0.45,H/2,0)); }
  else if(type==='door'){ g.add(boxM(W,0.9,Tk,mat,0,H-0.45,0));                                  // dintel
    const jl=boxM(1.1,H-0.9,Tk,mat,-W/2+0.55,(H-0.9)/2,0); g.add(jl);                              // jamba izquierda
    const jr=boxM(1.1,H-0.9,Tk,mat,W/2-0.55,(H-0.9)/2,0);  g.add(jr);                              // jamba derecha
    // HOJA con BISAGRA en el borde izquierdo del hueco (gira sobre ese eje)
    const dw=1.5,dh=H-1.0; const hinge=new THREE.Group(); hinge.position.set(-dw/2,0,0.04);
    const leaf=boxM(dw,dh,0.08,mat,dw/2,dh/2,0); hinge.add(leaf);
    const knob=new THREE.Mesh(new THREE.SphereGeometry(0.06,10,8),blackMetalMat); knob.position.set(dw-0.18,dh/2,0.07); hinge.add(knob);
    g.add(hinge); g.userData.hinge=hinge; g.userData.jambs=[jl,jr]; }
  return g;
}

  for(let i=0;i<10;i++){ const a=Math.random()*6.28,r=12+Math.random()*30,s=1+Math.random()*0.8; const q=new THREE.Group();

const PLACE_MIN=1.6, PLACE_MAX=5.5;
function ghostMat(){return new THREE.MeshStandardMaterial({color:0x2ad24a,transparent:true,opacity:0.55,emissive:0x0d5a1c,emissiveIntensity:0.5});}
function startPlacing(id){

  $('bRot').classList.add('hidden'); $('bPlace').classList.remove('on'); refreshHints(); }
const _fwd=new THREE.Vector3(),_gp=new THREE.Vector3();
function updateGhost(){
  if(!ghost) return;
  _fwd.set(-Math.sin(player.yaw)*Math.cos(player.pitch),Math.sin(player.pitch),-Math.cos(player.yaw)*Math.cos(player.pitch));
  const camY=player.pos.y+player.eye; let dist=PLACE_MAX;
  if(_fwd.y<-0.05){ const t=camY/(-_fwd.y); dist=THREE.MathUtils.clamp(t,PLACE_MIN,PLACE_MAX); }
  _gp.set(player.pos.x-Math.sin(player.yaw)*dist, 0, player.pos.z-Math.cos(player.yaw)*dist);
  if(CONSTR.has(placing)){ _gp.x=Math.round(_gp.x); _gp.z=Math.round(_gp.z); }   // snapping: se alinea solo al piso/grilla
  _gp.x=THREE.MathUtils.clamp(_gp.x,-GROUND_LIMIT,GROUND_LIMIT); _gp.z=THREE.MathUtils.clamp(_gp.z,-GROUND_LIMIT,GROUND_LIMIT);
  ghost.position.copy(_gp); ghost.rotation.y=placeYaw; ghost.updateMatrixWorld();
  let valid=Math.abs(_gp.x)<GROUND_LIMIT-1&&Math.abs(_gp.z)<GROUND_LIMIT-1;
  if(!CONSTR.has(placing)) for(const p of placedTables){ if(p.position.distanceTo(_gp)<1.0){valid=false;break;} }
  ghost.userData.valid=valid;
  const col=valid?0x2ad24a:0xff3b3b, em=valid?0x0d5a1c:0x5a0d0d;
  ghost.traverse(o=>{if(o.isMesh){o.material.color.setHex(col);o.material.emissive.setHex(em);}});
}
function tryBuild(){ if(!placing||building||!ghost||!ghost.userData.valid) return; building=true; buildT=0; emitDirt(ghost.position); }
function finishBuild(){
  const id=placing; const m=(MODELS[id]||buildTable)(); m.position.copy(ghost.position); m.rotation.y=placeYaw; m.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}});
  scene.add(m); placedTables.push(m); m.userData.kind=id; inv[id]=Math.max(0,(inv[id]||0)-1);
  m.updateMatrixWorld(true);
  if(DOORS.has(id)){
    // puerta: bisagra animada + colisión sólo en las jambas (el hueco queda transitable)
    if(m.userData.hinge) doors.push({hinge:m.userData.hinge,group:m});
    for(const j of (m.userData.jambs||[])){ const bb=new THREE.Box3().setFromObject(j);
      solids.push({minx:bb.min.x-0.18,maxx:bb.max.x+0.18,minz:bb.min.z-0.18,maxz:bb.max.z+0.18}); }
  } else if(id!=='smad'&&id!=='scha'&&id!=='tmad'){
    const bb=new THREE.Box3().setFromObject(m);
    solids.push({minx:bb.min.x-0.35,maxx:bb.max.x+0.35,minz:bb.min.z-0.35,maxz:bb.max.z+0.35});
  }
  if(id==='recagua') recaguas.push(m);
  stopPlacing();
}
function resolveCollisions(){ const px=player.pos.x,pz=player.pos.z;
  for(const s of solids){ if(px>s.minx&&px<s.maxx&&pz>s.minz&&pz<s.maxz){
    const dl=px-s.minx,dr=s.maxx-px,db=pz-s.minz,dtp=s.maxz-pz,mn=Math.min(dl,dr,db,dtp);
    if(mn===dl)player.pos.x=s.minx; else if(mn===dr)player.pos.x=s.maxx; else if(mn===db)player.pos.z=s.minz; else player.pos.z=s.maxz; } }
}

/* ===================== Partículas de tierra ===================== */
const dirtGeo=new THREE.BoxGeometry(0.08,0.08,0.08); const dirtMat=new THREE.MeshStandardMaterial({color:0x6b4a2c,roughness:1});
const DIRT=80; const dirt=new THREE.InstancedMesh(dirtGeo,dirtMat,DIRT); dirt.frustumCulled=false; scene.add(dirt);
const dst=[]; for(let i=0;i<DIRT;i++)dst.push({life:0,p:new THREE.Vector3(),v:new THREE.Vector3()}); let dHead=0; const _do=new THREE.Object3D();
function emitDirt(at){ for(let i=0;i<28;i++){const s=dst[dHead];s.life=0.4+Math.random()*0.35;s.p.set(at.x+(Math.random()-.5)*1.2,0.05,at.z+(Math.random()-.5)*0.9);s.v.set((Math.random()-.5)*2,1.5+Math.random()*2.5,(Math.random()-.5)*2);dHead=(dHead+1)%DIRT;} }
function tickDirt(dt){ for(let i=0;i<DIRT;i++){const s=dst[i]; if(s.life>0){s.life-=dt;s.v.y-=9*dt;s.p.addScaledVector(s.v,dt);if(s.p.y<0.04){s.p.y=0.04;s.v.y*=-0.3;}_do.position.copy(s.p);_do.scale.setScalar(1);}else{_do.position.set(0,-999,0);_do.scale.setScalar(0.001);}_do.updateMatrix();dirt.setMatrixAt(i,_do.matrix);} dirt.instanceMatrix.needsUpdate=true; }

/* ===================== Cartel sobre mesa + crafteo en mesa ===================== */
let nearTable=null, nearRecagua=null, holdT=0, holding=false, signMode='table';
const signEl=$('tableSign'),signFill=$('signFill'),_proj=new THREE.Vector3();
function fillWater(){ const r=nearRecagua; if(!r) return; const lv=Math.min(1,(r.userData.level||0)+0.12); r.userData.level=lv;
  const w=r.userData.water; if(w){ w.visible=lv>0.01; w.scale.y=Math.max(0.001,lv); w.position.y=0.05+0.17*lv; } signFill.style.width=(lv*100)+'%'; }
signEl.addEventListener('pointerdown',e=>{ e.preventDefault(); if(signMode==='water'){ fillWater(); } else { holding=true; holdT=0; } });
signEl.addEventListener('pointerup',()=>{holding=false;holdT=0;if(signMode==='table')signFill.style.width='0%';});
signEl.addEventListener('pointercancel',()=>{holding=false;holdT=0;if(signMode==='table')signFill.style.width='0%';});
function updateSign(dt){
  nearTable=null; nearRecagua=null; let bt=9, br=9;
  for(const m of placedTables){ const d=m.position.distanceTo(player.pos);
    if(m.userData.kind==='table'){ if(d<3&&d<bt){bt=d;nearTable=m;} }
    else if(m.userData.kind==='recagua'){ if(d<2.6&&d<br){br=d;nearRecagua=m;} } }
  const target = nearTable || nearRecagua;
  if(!target||placing){ signEl.style.display='none'; holding=false; if(signMode==='table')signFill.style.width='0%'; return; }
  signMode = nearTable? 'table':'water';
  _proj.copy(target.position); _proj.y+=signMode==='table'?1.15:1.65; _proj.project(camera);
  if(_proj.z>1){ signEl.style.display='none'; return; }
  const vw=rot?innerHeight:innerWidth, vh=rot?innerWidth:innerHeight;
  const sx=(_proj.x*0.5+0.5)*vw, sy=(-_proj.y*0.5+0.5)*vh;
  signEl.style.display='block'; signEl.style.left=sx+'px'; signEl.style.top=sy+'px';
  if(signMode==='water'){
    const lv=target.userData.level||0; $('signTxt').textContent=lv>=1?T('waterFull'):T('addWater');
    signFill.style.width=(lv*100)+'%';
  } else {
    $('signTxt').textContent=T('useTable');
    if(holding){ holdT+=dt; signFill.style.width=Math.min(100,holdT/0.5*100)+'%'; if(holdT>=0.5){ holding=false; signFill.style.width='0%'; craftAtTable=true; renderCraft(); showScrim('craft'); } }
  }
}

/* ===================== Toast / hints ===================== */
let toastT=0;
function toast(msg){ const h=$('hint'); h.textContent=msg; h.style.opacity='0.95'; toastT=2.2; }
function refreshHints(){ if(toastT>0)return; $('hint').textContent=placing?T('hintPlace'):T('hintNormal'); $('hint').style.opacity='0.5'; }

/* ===================== Loop ===================== */
const clock=new THREE.Clock(); const euler=new THREE.Euler(0,0,0,'YXZ');
function update(dt){
  let ix=joy.x,iz=joy.y;
  const mag=Math.min(1,Math.hypot(ix,iz)); if(mag>0.001){ix/=Math.max(mag,1);iz/=Math.max(mag,1);}
  forward.set(-Math.sin(player.yaw),0,-Math.cos(player.yaw)); right.set(Math.cos(player.yaw),0,-Math.sin(player.yaw));
  const sp=mag*SPEED_MAX*(player.crouch?0.5:1);
  const des=_v.set(0,0,0); des.addScaledVector(forward,-iz*sp); des.addScaledVector(right,ix*sp);
  player.vel.lerp(des,Math.min(1,ACCEL*dt)); player.pos.addScaledVector(player.vel,dt);
  player.pos.x=THREE.MathUtils.clamp(player.pos.x,-GROUND_LIMIT,GROUND_LIMIT); player.pos.z=THREE.MathUtils.clamp(player.pos.z,-GROUND_LIMIT,GROUND_LIMIT);
  resolveCollisions();   // colisión con muebles/construcción
  player.vy-=GRAV*dt; player.pos.y+=player.vy*dt; if(player.pos.y<=0){player.pos.y=0;player.vy=0;player.onGround=true;}
  const targetEye=player.crouch?EYE_CROUCH:EYE; player.eye+=(targetEye-player.eye)*Math.min(1,10*dt);
  const speed=player.vel.length(); player.bobPhase+=dt*(speed*1.9+0.0001); const moveAmt=Math.min(1,speed/SPEED_MAX)*bobScale;
  const bobY=Math.sin(player.bobPhase*2)*0.05*moveAmt, bobX=Math.cos(player.bobPhase)*0.035*moveAmt;
  const strafe=right.dot(player.vel)/SPEED_MAX; player.strafeSm+=(strafe-player.strafeSm)*Math.min(1,8*dt);
  player.roll+=((-player.strafeSm*0.08+Math.sin(player.bobPhase)*0.018*moveAmt)-player.roll)*Math.min(1,10*dt);
  const tt=clock.elapsedTime, mf=(0.5+moveAmt)*camShake;
  const shx=(Math.sin(tt*2.3)+0.5*Math.sin(tt*5.7))*0.0016*mf, shy=(Math.cos(tt*1.9)+0.5*Math.sin(tt*4.3))*0.0016*mf, shr=Math.sin(tt*1.6)*0.004*mf, br=Math.sin(tt*1.15)*0.012*camShake;
  camera.position.set(player.pos.x+right.x*bobX, player.pos.y+player.eye+bobY+br, player.pos.z+right.z*bobX);
  euler.set(player.pitch+shy,player.yaw+shx,player.roll+shr); camera.quaternion.setFromEuler(euler);
  sunLight.position.set(player.pos.x+sun.position.x*0.4,sun.position.y,player.pos.z+sun.position.z*0.4); sunLight.target.position.copy(player.pos); sunLight.target.updateMatrixWorld();
  if(swing.active){ swing.t+=dt/0.42; const a=Math.sin(Math.min(swing.t,1)*Math.PI);
    if(THRUST.has(equipped)){ fpRig.rotation.x=fpBaseRot.x+a*0.5; fpRig.position.z=fpBasePos.z-a*0.6; }   // inclina ~90° y hinca al frente
    else { fpRig.rotation.x=fpBaseRot.x-a*1.2; }
    if(swing.t>=1){ swing.active=false; fpRig.position.copy(fpBasePos); fpRig.rotation.copy(fpBaseRot); } }
  for(const d of doors){ const dp=d.group.position, dist=Math.hypot(player.pos.x-dp.x,player.pos.z-dp.z), tgt=dist<2.6?-Math.PI*0.55:0; d.hinge.rotation.y+=(tgt-d.hinge.rotation.y)*Math.min(1,6*dt); }
  if(placing&&!building) updateGhost();
  if(building){ buildT+=dt; const k=Math.min(1,buildT/0.5); if(ghost){ghost.scale.setScalar(0.2+0.8*k);} if(buildT>=0.5) finishBuild(); }
  tickDirt(dt);
  updateSign(dt);
  if(toastT>0){toastT-=dt;if(toastT<=0)refreshHints();}
}
function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); update(dt); renderer.render(scene,camera); }

/* ===================== Iconos PNG (capturados del modelo real) ===================== */
function captureIcon(obj,rot3){
  try{
    const S=192,rt=new THREE.WebGLRenderTarget(S,S); const ts=new THREE.Scene();
    obj.rotation.set(rot3[0],rot3[1],rot3[2]); ts.add(obj);
    ts.add(new THREE.HemisphereLight(0xf2f6ff,0x40444c,1.5)); const d=new THREE.DirectionalLight(0xffffff,3.2); d.position.set(2,3,2.5); ts.add(d); const d2=new THREE.DirectionalLight(0xcfe0ff,1.1); d2.position.set(-2,1,-1); ts.add(d2);
    const box=new THREE.Box3().setFromObject(obj),ctr=box.getCenter(new THREE.Vector3()),sz=box.getSize(new THREE.Vector3()),rad=Math.max(sz.x,sz.y,sz.z)||1;
    const cam=new THREE.PerspectiveCamera(32,1,0.01,100); cam.position.set(ctr.x+rad*1.1,ctr.y+rad*0.8,ctr.z+rad*1.7); cam.lookAt(ctr);
    const pRT=renderer.getRenderTarget(),pC=renderer.getClearColor(new THREE.Color()),pA=renderer.getClearAlpha();
    renderer.setRenderTarget(rt); renderer.setClearColor(0x000000,0); renderer.clear(); renderer.render(ts,cam);
    const buf=new Uint8Array(S*S*4); renderer.readRenderTargetPixels(rt,0,0,S,S,buf);
    renderer.setRenderTarget(pRT); renderer.setClearColor(pC,pA);
    const cv=document.createElement('canvas');cv.width=cv.height=S;const x=cv.getContext('2d'),im=x.createImageData(S,S);
    for(let y=0;y<S;y++){const sy=S-1-y;for(let xx=0;xx<S;xx++){const di=(y*S+xx)*4,si=(sy*S+xx)*4;im.data[di]=buf[si];im.data[di+1]=buf[si+1];im.data[di+2]=buf[si+2];im.data[di+3]=buf[si+3];}}
    x.putImageData(im,0,0); const url=cv.toDataURL('image/png'); rt.dispose(); obj.traverse(o=>{if(o.geometry)o.geometry.dispose();}); return url;
  }catch(e){ return null; }
}
