<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#bcd6ef" />
<title>Escena · Crafteo</title>
<style>
  :root{ --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px); }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ height:100%; overflow:hidden; background:#bcd6ef; font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; color:#eef3f8; overscroll-behavior:none; }
  #stage{ position:fixed; inset:0; }
  body.rot #stage{ width:100vh; height:100vw; top:50%; left:50%; transform:translate(-50%,-50%) rotate(90deg); transform-origin:center; }
  #app{ position:absolute; inset:0; }
  #app canvas{ display:block; width:100%!important; height:100%!important; touch-action:none; }
  #cross{ position:fixed; left:50%; top:50%; width:6px; height:6px; margin:-3px; z-index:6; border-radius:50%; background:rgba(255,255,255,.6); box-shadow:0 0 4px rgba(0,0,0,.6); pointer-events:none; }

  /* Joystick */
  #joy{ position:fixed; left:26px; bottom:calc(28px + var(--safe-b)); z-index:20; width:128px; height:128px; border-radius:50%;
        background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.18); backdrop-filter:blur(6px); touch-action:none; }
  #joyKnob{ position:absolute; left:50%; top:50%; width:52px; height:52px; margin:-26px 0 0 -26px; border-radius:50%;
            background:radial-gradient(circle at 38% 34%,#dff0ff,#5aa0ff); box-shadow:0 4px 16px rgba(0,0,0,.45); }

  /* Botones de acción */
  .actBtn{ position:fixed; z-index:20; width:66px; height:66px; border-radius:50%; background:rgba(255,255,255,.06);
           border:1.5px solid rgba(255,255,255,.2); color:#eef3f8; font-size:24px; backdrop-filter:blur(6px); cursor:pointer;
           display:flex; align-items:center; justify-content:center; transition:transform .1s,background .15s; }
  .actBtn:active{ transform:scale(.92); }
  .actBtn.on{ background:rgba(90,160,255,.3); border-color:#8fe3ff; }
  .actBtn.hidden{ display:none; }
  #bAxe   { right:26px; bottom:calc(30px + var(--safe-b)); }
  #bJump  { right:104px; bottom:calc(58px + var(--safe-b)); }
  #bCrouch{ right:34px; bottom:calc(112px + var(--safe-b)); width:58px; height:58px; font-size:20px; }
  #bPlace { right:104px; bottom:calc(136px + var(--safe-b)); width:58px; height:58px; font-size:20px; }
  #bRot   { right:170px; bottom:calc(136px + var(--safe-b)); width:58px; height:58px; font-size:20px; }

  /* Botones superiores */
  .topBtn{ position:fixed; top:calc(14px + var(--safe-t)); z-index:21; width:46px; height:46px; border-radius:12px;
           background:rgba(18,22,30,.62); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,.14); color:#eef3f8;
           font-size:19px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  #bSet{ right:14px; } #bBag{ right:68px; } #bCraft{ right:122px; }

  #hint{ position:fixed; left:50%; top:calc(12px + var(--safe-t)); transform:translateX(-50%); z-index:6; font-size:11px; opacity:.5;
         pointer-events:none; text-shadow:0 1px 3px rgba(0,0,0,.6); }

  /* Cartel 2D sobre la mesa */
  #tableSign{ position:fixed; z-index:18; transform:translate(-50%,-100%); display:none; cursor:pointer; }
  .signBody{ background:rgba(18,22,30,.82); border:1px solid rgba(150,200,255,.35); border-radius:10px; padding:8px 12px; font-size:12px;
             backdrop-filter:blur(8px); white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,.5); position:relative; }
  .signBar{ height:3px; margin-top:6px; border-radius:3px; background:rgba(255,255,255,.18); overflow:hidden; }
  .signBar i{ display:block; height:100%; width:0; background:linear-gradient(90deg,#7fd0ff,#b98bff); }

  /* Overlays */
  .scrim{ position:fixed; inset:0; z-index:40; display:flex; align-items:center; justify-content:center;
          background:radial-gradient(120% 120% at 60% 40%,rgba(12,16,22,.4),rgba(6,8,12,.7)); backdrop-filter:blur(12px);
          opacity:0; pointer-events:none; transition:opacity .25s; }
  .scrim.show{ opacity:1; pointer-events:auto; }
  .card{ width:min(460px,calc(100vw - 32px)); max-height:calc(100vh - 36px); overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:none; overscroll-behavior:contain;
         background:linear-gradient(165deg,rgba(26,30,38,.95),rgba(12,14,19,.97)); border:1px solid rgba(150,180,220,.16);
         border-radius:20px; padding:20px; box-shadow:0 30px 90px rgba(0,0,0,.75); position:relative; }
  body.rot .card{ max-height:calc(100vw - 36px); width:min(460px,calc(100vh - 36px)); }
  .card h2{ font-size:22px; font-weight:700; text-align:center; margin-bottom:6px; }
  .xClose{ position:absolute; top:12px; right:12px; width:30px; height:30px; border-radius:9px; cursor:pointer;
           background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.16); color:#eef3f8; font-size:15px;
           display:flex; align-items:center; justify-content:center; }
  .xClose:hover{ background:rgba(255,90,90,.22); border-color:#ff7b7b; }

  .seg{ display:flex; gap:6px; } .seg button{ flex:1; padding:8px; border-radius:6px; border:1px solid rgba(150,180,210,.18);
        background:rgba(255,255,255,.04); color:#eef3f8; cursor:pointer; font-size:12px; } .seg button.active{ background:rgba(240,162,60,.16); border-color:#f0a23c; }
  .lbl{ font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; opacity:.5; margin:14px 0 8px; }

  /* ===================== UI sci-fi (HUD militar) ===================== */
  #menu{ background:radial-gradient(140% 120% at 70% 10%,rgba(20,28,40,.5),rgba(4,7,11,.86)); backdrop-filter:blur(14px); }
  .sciPanel{ position:absolute; inset:12px; display:flex; flex-direction:column; overflow:hidden;
    background:linear-gradient(160deg,rgba(14,19,27,.92),rgba(8,11,16,.96)); border:1px solid rgba(120,160,200,.18); border-radius:6px; box-shadow:0 30px 90px rgba(0,0,0,.7); }
  /* girado 90° (igual que el juego) en modo vertical → se ve apaisado y lado a lado */
  body.rot .sciPanel{ inset:auto; left:50%; top:50%; width:calc(100vh - 16px); height:calc(100vw - 16px); transform:translate(-50%,-50%) rotate(90deg); transform-origin:center; }
  .sciPanel::before{ content:""; position:absolute; left:18px; right:18px; top:0; height:2px; background:linear-gradient(90deg,#f0a23c,transparent 70%); opacity:.7; }
  .sciTop{ padding:12px 18px 8px; flex:0 0 auto; }
  .sciCrumb{ font-size:10px; letter-spacing:.22em; opacity:.5; text-transform:uppercase; }
  .sciCrumb b{ color:#f0a23c; font-weight:700; }
  .sciTitleRow{ display:flex; align-items:center; gap:14px; margin-top:2px; }
  .sciTitleRow h2{ font-size:22px; font-weight:800; letter-spacing:.08em; }
  .sciRule{ flex:1; height:1px; background:repeating-linear-gradient(90deg,rgba(150,180,210,.45) 0 6px,transparent 6px 12px); }
  .sciTitleRow .xClose{ position:static; }

  .sciBody{ flex:1; display:flex; gap:16px; padding:4px 18px 10px; min-height:0; }
  .sciCol{ flex:1.05; display:flex; flex-direction:column; min-height:0; }   /* IZQUIERDA */
  .sciTabs{ display:flex; gap:7px; flex-wrap:wrap; margin-bottom:10px; flex:0 0 auto; }
  .stab{ font-size:11px; letter-spacing:.06em; text-transform:uppercase; padding:6px 11px; cursor:pointer; color:#cdd6e0;
         border:1px solid rgba(150,180,210,.18); border-bottom:2px solid transparent; background:rgba(255,255,255,.02); border-radius:4px 4px 0 0; }
  .stab.on{ color:#fff; border-bottom-color:#f0a23c; background:rgba(240,162,60,.1); }
  .sciGridWrap{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; touch-action:none; overscroll-behavior:contain; min-height:60px; }
  .sciGrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(52px,1fr)); gap:7px; align-content:start; }
  .slot{ position:relative; aspect-ratio:1; border:1px solid rgba(150,180,210,.18); background:rgba(255,255,255,.03); border-radius:3px;
         display:flex; align-items:center; justify-content:center; cursor:pointer; transition:border-color .12s,box-shadow .12s,background .12s; }
  .slot:active{ background:rgba(150,200,255,.08); }
  .slot.sel{ border-color:#f0a23c; box-shadow:0 0 0 1px #f0a23c inset,0 0 14px rgba(240,162,60,.25); background:rgba(240,162,60,.08); }
  .slot.locked{ opacity:.4; }
  .slot img{ width:80%; height:80%; object-fit:contain; filter:drop-shadow(0 2px 4px rgba(0,0,0,.5)); }
  .slot .ph{ width:42%; height:42%; border:1px dashed rgba(150,180,210,.3); border-radius:3px; }
  .slot .rar{ position:absolute; right:0; top:0; width:0; height:0; border-style:solid; border-width:0 9px 9px 0; border-color:transparent #888 transparent transparent; }
  .slot .qty{ position:absolute; left:3px; bottom:2px; font-size:10px; font-weight:700; color:#eaf0f6; text-shadow:0 1px 2px #000; }

  .sciDetail{ flex:1; display:flex; flex-direction:column; gap:6px; min-height:0; border-left:1px solid rgba(150,180,210,.12); padding-left:16px; }  /* DERECHA */
  .sciRight{ flex:0 0 38%; position:relative; min-height:96px; display:flex; align-items:center; justify-content:center; }
  .sciPlat{ position:absolute; left:50%; top:58%; width:74%; padding-bottom:74%; transform:translate(-50%,-50%); border-radius:50%;
            border:1px solid rgba(91,200,245,.4); background:radial-gradient(circle,rgba(91,200,245,.14),transparent 62%); box-shadow:0 0 36px rgba(91,200,245,.16) inset; }
  .sciPlat::after{ content:""; position:absolute; inset:20%; border-radius:50%; border:1px dashed rgba(240,162,60,.45); }
  #pvCanvas{ position:relative; z-index:2; width:92%; height:92%; }
  .sciMid{ flex:1; display:flex; flex-direction:column; min-height:0; }
  .sciName{ font-size:18px; font-weight:800; letter-spacing:.03em; }
  .sciType{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; margin:2px 0 8px; color:#f0a23c; }
  .sciSecHd{ font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; opacity:.55; margin:6px 0 7px; padding-bottom:5px; border-bottom:1px solid rgba(150,180,210,.14); }
  .sciChips{ display:flex; flex-wrap:wrap; gap:6px; align-content:flex-start; flex:1; overflow-y:auto; touch-action:none; }   /* TODOS los materiales a la vista, sin bajar */
  .chip{ display:flex; align-items:center; gap:5px; font-size:12px; padding:6px 9px; border-radius:5px; background:rgba(255,255,255,.05); border:1px solid rgba(150,180,210,.16); height:fit-content; }
  .chip b{ color:#9fe8a6; font-weight:700; }
  .sciBtn{ width:100%; margin-top:12px; padding:12px; border-radius:4px; border:1px solid #f0a23c; background:rgba(240,162,60,.15);
           color:#ffd9a0; font-size:13px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; cursor:pointer; }
  .sciBtn:active{ background:rgba(240,162,60,.3); }
  .sciBtn:disabled{ opacity:.4; border-color:rgba(150,180,210,.2); background:rgba(255,255,255,.04); color:#cdd6e0; cursor:not-allowed; }
  .sciFoot{ flex:0 0 auto; padding:8px 18px; border-top:1px solid rgba(150,180,210,.12); font-size:10.5px; letter-spacing:.05em; opacity:.5; display:flex; justify-content:space-between; }
  .sciEmpty{ display:none; opacity:.5; font-size:13px; padding:18px 4px; }

  #loader{ position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
           background:#bcd6ef; transition:opacity .5s; color:#08365f; font-size:13px; letter-spacing:.1em; }
  #loader.hide{ opacity:0; pointer-events:none; }
</style>
</head>

<div id="loader">…</div>
<div id="stage">
  <div id="app"></div>
  <div id="cross"></div>
  <div id="joy"><div id="joyKnob"></div></div>

  <button id="bSet"   class="topBtn">⚙</button>

  <button id="bAxe"    class="actBtn">🪓</button>
  <button id="bJump"   class="actBtn">⤴️</button>
  <button id="bCrouch" class="actBtn">🔽</button>
  <button id="bPlace"  class="actBtn">✏️</button>
  <button id="bRot"    class="actBtn hidden">🔁</button>

  <div id="hint"></div>

  <!-- Cartel sobre la mesa -->
  <div id="tableSign"><div class="signBody"><span id="signTxt"></span><div class="signBar"><i id="signFill"></i></div></div></div>
</div>

<!-- ===== Menú sci-fi unificado (fabricación / mochila / colocar) — FUERA de #stage para que quede derecho ===== -->
<div id="menu" class="scrim">
  <div class="sciPanel">
    <div class="sciTop">
      <div class="sciCrumb">REZONA // <b id="mCrumb">FABRICACIÓN</b></div>
      <div class="sciTitleRow"><h2 id="mTitle">FABRICACIÓN</h2><span class="sciRule"></span><div class="xClose" data-close="menu">✕</div></div>
    </div>
    <div class="sciBody">
      <!-- IZQUIERDA: clasificaciones + grid de ítems -->
      <div class="sciCol">
        <div class="sciTabs" id="mTabs"></div>
        <div class="sciGridWrap scrl"><div class="sciGrid" id="mGrid"></div><div class="sciEmpty" id="mEmpty"></div></div>
      </div>
      <!-- DERECHA: visor 3D + materiales + botón -->
      <div class="sciDetail">
        <div class="sciRight"><div class="sciPlat"></div><canvas id="pvCanvas"></canvas></div>
        <div class="sciMid">
          <div class="sciName" id="dName">—</div>
          <div class="sciType" id="dType"></div>

          <div class="sciChips" id="dMats"></div>
          <button id="dAction" class="sciBtn">Fabricar</button>
        </div>
      </div>
    </div>
    <div class="sciFoot"><span id="mFootL">◐ Tocá un objeto</span><span id="mFootR"></span></div>
  </div>
</div>

<!-- Ajustes -->
<div id="settings" class="scrim">
  <div class="card">
    <div class="xClose" data-close="settings">✕</div>
    <h2 data-i18n="settings">Ajustes</h2>
    <div class="lbl" data-i18n="language">Idioma</div>
    <div class="seg" id="langSeg">
      <button data-lang="es">Español</button><button data-lang="en">English</button><button data-lang="pt">Português</button>
    </div>
    <div class="lbl" data-i18n="rotate90">Girar 90° en vertical</div>
    <div class="seg" id="rotSeg"><button data-r="on">On</button><button data-r="off">Off</button></div>
  </div>
</div>

function consPiece(type,mat){const g=new THREE.Group();const W=4,H=WALLH,Tk=0.2;
  if(type==='wall') g.add(boxM(W,H,Tk,mat,0,H/2,0));
  else if(type==='floor') g.add(boxM(W,0.18,W,mat,0,0.09,0));
  else if(type==='roofflat'){ g.add(boxM(W,0.16,W,mat,0,-0.08,0));                    // techo RECTO (como suelo, va arriba)
    for(const x of[-W/2+0.35,0,W/2-0.35]) g.add(boxM(0.18,0.2,W-0.2,woodDark,x,-0.27,0)); } // vigas de sostén (grosor que lo diferencia del suelo)
  else if(type==='roof'){ const s=boxM(W+0.4,0.18,W+0.4,mat,0,H*0.5,0); s.rotation.x=-0.4; g.add(s); } // techo INCLINADO (sin palos)
  else if(type==='window'){ g.add(boxM(W,0.7,Tk,mat,0,0.35,0)); g.add(boxM(W,0.9,Tk,mat,0,H-0.45,0));   // antepecho + dintel (full width)
    const midH=H-0.9-0.7, midY=0.7+midH/2;                                                                 // pilares SÓLO en el medio (sin solaparse → sin titileo)
    g.add(boxM(0.9,midH,Tk,mat,-W/2+0.45,midY,0)); g.add(boxM(0.9,midH,Tk,mat,W/2-0.45,midY,0)); }
  else if(type==='door'){ g.add(boxM(W,0.9,Tk,mat,0,H-0.45,0));                         // dintel
    const jl=boxM(1.1,H-0.9,Tk,mat,-W/2+0.55,(H-0.9)/2,0); g.add(jl);                   // jamba izquierda
    const jr=boxM(1.1,H-0.9,Tk,mat,W/2-0.55,(H-0.9)/2,0);  g.add(jr);                   // jamba derecha
    // HOJA que cubre TODO el hueco (sin huecos a los lados) con bisagra en el borde izquierdo
    const dw=1.8,dh=H-0.9; const hinge=new THREE.Group(); hinge.position.set(-dw/2,0,0.05);
    const leaf=boxM(dw,dh,0.1,woodDark,dw/2,dh/2,0); hinge.add(leaf);                    // madera distinta (oscura) para diferenciar
    for(let i=1;i<4;i++) hinge.add(boxM(dw-0.1,0.05,0.12,mat,dw/2,dh*i/4,0));            // travesaños
    const knob=new THREE.Mesh(new THREE.SphereGeometry(0.06,10,8),blackMetalMat); knob.position.set(dw-0.18,dh/2,0.08); hinge.add(knob);
    g.add(hinge); g.userData.hinge=hinge; g.userData.jambs=[jl,jr]; }
  return g;
}

const GIFB='https://cdn.jsdelivr.net/gh/Juniorspro/General-Assets-Games@4d4c23e/';
function makeGif(file){ const o={tex:new THREE.CanvasTexture(document.createElement('canvas')),frames:[],delays:[],total:0,cx:null,ready:false,_img:null};
  o.tex.colorSpace=THREE.SRGBColorSpace;
  (async()=>{ try{
    const {parseGIF,decompressFrames}=await import('gifuct-js');
    const buf=await (await fetch(GIFB+file,{mode:'cors'})).arrayBuffer();
    const gif=parseGIF(buf), frames=decompressFrames(gif,true), W=gif.lsd.width,H=gif.lsd.height,MAXH=160,sc=Math.min(1,MAXH/H);
    const full=document.createElement('canvas'); full.width=W; full.height=H; const fc=full.getContext('2d');
    for(const fr of frames){ const tmp=document.createElement('canvas'); tmp.width=fr.dims.width; tmp.height=fr.dims.height;
      tmp.getContext('2d').putImageData(new ImageData(fr.patch,fr.dims.width,fr.dims.height),0,0); fc.drawImage(tmp,fr.dims.left,fr.dims.top);
      const c=document.createElement('canvas'); c.width=Math.round(W*sc); c.height=Math.round(H*sc); c.getContext('2d').drawImage(full,0,0,c.width,c.height);
      o.frames.push(c); o.delays.push(fr.delay||80); if(fr.disposalType===2)fc.clearRect(fr.dims.left,fr.dims.top,fr.dims.width,fr.dims.height); }
    o.total=o.delays.reduce((a,b)=>a+b,0)||o.delays.length*80;
    const cv=o.tex.image; cv.width=o.frames[0].width; cv.height=o.frames[0].height; o.cx=cv.getContext('2d'); o.ready=true;
  }catch(e){ const img=new Image(); img.crossOrigin='anonymous'; img.src=GIFB+file; img.style.cssText='position:fixed;left:0;bottom:0;width:4px;height:4px;opacity:.012;pointer-events:none;'; document.body.appendChild(img); o._img=img;
    const cv=o.tex.image; cv.width=128; cv.height=192; o.cx=cv.getContext('2d'); o.ready=true; } })();
  return o; }
const fireGifs=[makeGif('2spnJPK.gif'),makeGif('db5a4595bac1960e5b7cc0a35544140b.gif')];   // llama grande + llamas altas
function tickGifs(dt){ for(const o of fireGifs){ if(!o.ready||!o.cx)continue;
  if(o.frames.length){ let t=performance.now()%o.total,idx=0; for(let i=0;i<o.delays.length;i++){ if(t<o.delays[i]){idx=i;break;} t-=o.delays[i]; }
    const f=o.frames[idx],cv=o.tex.image; if(cv.width!==f.width){cv.width=f.width;cv.height=f.height;} o.cx.clearRect(0,0,cv.width,cv.height); o.cx.drawImage(f,0,0); o.tex.needsUpdate=true; }
  else if(o._img&&o._img.complete&&o._img.naturalWidth){ const s=Math.min(128/o._img.naturalWidth,192/o._img.naturalHeight); o.cx.clearRect(0,0,128,192); o.cx.drawImage(o._img,0,0,o._img.naturalWidth*s,o._img.naturalHeight*s); o.tex.needsUpdate=true; } } }

function glbModel(id,fb){ return ()=> glbCache[id]? glbCache[id].clone(true) : (fb?fb():new THREE.Group()); }

let forceLandscape=true, rot=false;
function layout(){
  rot=forceLandscape&&(innerHeight>innerWidth);
  document.body.classList.toggle('rot',rot);
  const vw=rot?innerHeight:innerWidth, vh=rot?innerWidth:innerHeight;
  camera.aspect=vw/vh; camera.updateProjectionMatrix();
  renderer.setSize(vw,vh,false);
}

const joyEl=$('joy'),knob=$('joyKnob'); let joyId=null; const joy={x:0,y:0};
function joyUpd(e){const r=joyEl.clientWidth/2;let dx=e.offsetX-r,dy=e.offsetY-r;const len=Math.hypot(dx,dy);if(len>r){dx*=r/len;dy*=r/len;}knob.style.transform=`translate(${dx}px,${dy}px)`;joy.x=dx/r;joy.y=dy/r;}
joyEl.addEventListener('pointerdown',e=>{joyId=e.pointerId;joyEl.setPointerCapture(e.pointerId);joyUpd(e);e.preventDefault();});
joyEl.addEventListener('pointermove',e=>{if(e.pointerId===joyId)joyUpd(e);});
function joyEnd(e){if(e.pointerId===joyId){joyId=null;joy.x=0;joy.y=0;knob.style.transform='translate(0,0)';}}
joyEl.addEventListener('pointerup',joyEnd);joyEl.addEventListener('pointercancel',joyEnd);

let lookId=null,lastX=0,lastY=0;const LOOK=0.0042;
function isUI(t){return t.closest('.scrim')||t.closest('.topBtn')||t.closest('.actBtn')||t===joyEl||t===knob||t.closest('#tableSign');}
addEventListener('pointerdown',e=>{if(isUI(e.target))return;if(lookId===null&&e.pointerId!==joyId){lookId=e.pointerId;lastX=e.clientX;lastY=e.clientY;}});
addEventListener('pointermove',e=>{if(e.pointerId!==lookId)return;let ddx=e.clientX-lastX,ddy=e.clientY-lastY;if(rot){const t=ddx;ddx=ddy;ddy=-t;}player.yaw-=ddx*LOOK;player.pitch=Math.max(-1.4,Math.min(1.4,player.pitch-ddy*LOOK));lastX=e.clientX;lastY=e.clientY;});
function lookEnd(e){if(e.pointerId===lookId)lookId=null;}
addEventListener('pointerup',lookEnd);addEventListener('pointercancel',lookEnd);

/* ===================== Colocación (ghost) ===================== */
let placing=null, placeYaw=0, ghost=null, building=false, buildT=0;
const placedTables=[]; const solids=[]; const doors=[]; const recaguas=[]; const floors=[];   // solids: AABB colisión; floors: superficies pisables
const CONSTR=new Set(['pmad','smad','tmad','imad','vmad','dmad','pcha','scha','tcha','vcha','dcha']);
const DOORS=new Set(['dmad','dcha']);
const ROOF_FLAT=new Set(['tmad','tcha']);                 // techos rectos: van ARRIBA, requieren pared debajo, son pisables
const FLOORW=new Set(['smad','scha','tmad','tcha']);       // superficies pisables (no bloquean, registran piso)
const NOSOLID=new Set(['smad','scha','tmad','tcha','imad']); // no generan muro de colisión
const FOURGRID=new Set(['smad','scha','tmad','tcha','imad']); // mosaico de 4m (el resto: paredes/ventanas/puertas → grilla 2m)
const PLACE_MIN=1.6, PLACE_MAX=5.5;
function ghostMat(){return new THREE.MeshStandardMaterial({color:0x2ad24a,transparent:true,opacity:0.55,emissive:0x0d5a1c,emissiveIntensity:0.5});}
function spawnGhost(id){ ghost=(MODELS[id]||buildTable)(); ghost.traverse(o=>{if(o.isMesh)o.material=ghostMat();}); scene.add(ghost); }
function startPlacing(id){
  placing=id; placeYaw=0; spawnGhost(id);
  $('bRot').classList.remove('hidden'); $('bPlace').classList.add('on'); refreshHints();
}
function stopPlacing(){ if(ghost){scene.remove(ghost);ghost.traverse(o=>{if(o.geometry)o.geometry.dispose();});ghost=null;} placing=null; building=false;
  $('bRot').classList.add('hidden'); $('bPlace').classList.remove('on'); refreshHints(); }
const _fwd=new THREE.Vector3(),_gp=new THREE.Vector3();
function updateGhost(){
  if(!ghost) return;
  _fwd.set(-Math.sin(player.yaw)*Math.cos(player.pitch),Math.sin(player.pitch),-Math.cos(player.yaw)*Math.cos(player.pitch));
  const camY=player.pos.y+player.eye; let dist=PLACE_MAX;
  if(_fwd.y<-0.05){ const t=camY/(-_fwd.y); dist=THREE.MathUtils.clamp(t,PLACE_MIN,PLACE_MAX); }
  _gp.set(player.pos.x-Math.sin(player.yaw)*dist, 0, player.pos.z-Math.cos(player.yaw)*dist);
  if(CONSTR.has(placing)){ const step=FOURGRID.has(placing)?4:2; _gp.x=Math.round(_gp.x/step)*step; _gp.z=Math.round(_gp.z/step)*step; }  // paredes: grilla 2m (alinean al girar + esquinas); pisos/techos: 4m (mosaico)
  _gp.x=THREE.MathUtils.clamp(_gp.x,-GROUND_LIMIT,GROUND_LIMIT); _gp.z=THREE.MathUtils.clamp(_gp.z,-GROUND_LIMIT,GROUND_LIMIT);
  let valid=Math.abs(_gp.x)<GROUND_LIMIT-1&&Math.abs(_gp.z)<GROUND_LIMIT-1;
  if(ROOF_FLAT.has(placing)){ _gp.y=WALLH;                                   // techo recto: va a la altura de las paredes
    let sup=false; for(const s of solids){ if(s.maxx>_gp.x-2&&s.minx<_gp.x+2&&s.maxz>_gp.z-2&&s.minz<_gp.z+2){sup=true;break;} }
    if(!sup) valid=false; }                                                  // se pone rojo si no hay pared debajo de la que sostenerse
  else { let fy=0; for(const f of floors){ if(_gp.x>f.minx-0.6&&_gp.x<f.maxx+0.6&&_gp.z>f.minz-0.6&&_gp.z<f.maxz+0.6&&f.top<2&&f.top>fy)fy=f.top; } _gp.y=fy; }  // paredes/muebles se apoyan SOBRE el suelo si hay uno
  if(!CONSTR.has(placing)) for(const p of placedTables){ if(p.position.distanceTo(_gp)<1.0){valid=false;break;} }
  ghost.position.copy(_gp); ghost.rotation.y=placeYaw; ghost.updateMatrixWorld();
  ghost.userData.valid=valid;
  const col=valid?0x2ad24a:0xff3b3b, em=valid?0x0d5a1c:0x5a0d0d;
  ghost.traverse(o=>{if(o.isMesh){o.material.color.setHex(col);o.material.emissive.setHex(em);}});
}
function tryBuild(){ if(!placing||building||!ghost||!ghost.userData.valid) return; building=true; buildT=0; emitDirt(ghost.position); }
function finishBuild(){
  const id=placing; const m=(MODELS[id]||buildTable)(); m.position.copy(ghost.position); m.rotation.y=placeYaw; m.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}});
  scene.add(m); placedTables.push(m); m.userData.kind=id; inv[id]=Math.max(0,(inv[id]||0)-1);
  m.updateMatrixWorld(true);
  if(DOORS.has(id)){
    // puerta: bisagra animada + colisión sólo en las jambas (el hueco queda transitable)
    if(m.userData.hinge) doors.push({hinge:m.userData.hinge,group:m});
    for(const j of (m.userData.jambs||[])){ const bb=new THREE.Box3().setFromObject(j);
      solids.push({minx:bb.min.x-0.18,maxx:bb.max.x+0.18,minz:bb.min.z-0.18,maxz:bb.max.z+0.18}); }
  } else if(!NOSOLID.has(id)){
    const bb=new THREE.Box3().setFromObject(m);
    solids.push({minx:bb.min.x-0.35,maxx:bb.max.x+0.35,minz:bb.min.z-0.35,maxz:bb.max.z+0.35});
  }
  if(FLOORW.has(id)){ const bb=new THREE.Box3().setFromObject(m); floors.push({minx:bb.min.x,maxx:bb.max.x,minz:bb.min.z,maxz:bb.max.z,top:bb.max.y}); }
  if(id==='recagua') recaguas.push(m);
  // limpiar ghost; si quedan unidades, seguir construyendo el mismo sin reseleccionar
  if(ghost){ scene.remove(ghost); ghost.traverse(o=>{if(o.geometry)o.geometry.dispose();}); ghost=null; }
  building=false; buildT=0;
  if((inv[id]||0)>0){ spawnGhost(id); }
  else { placing=null; $('bRot').classList.add('hidden'); $('bPlace').classList.remove('on'); refreshHints(); }
}
function resolveCollisions(){ const px=player.pos.x,pz=player.pos.z;
  for(const s of solids){ if(px>s.minx&&px<s.maxx&&pz>s.minz&&pz<s.maxz){
    const dl=px-s.minx,dr=s.maxx-px,db=pz-s.minz,dtp=s.maxz-pz,mn=Math.min(dl,dr,db,dtp);
    if(mn===dl)player.pos.x=s.minx; else if(mn===dr)player.pos.x=s.maxx; else if(mn===db)player.pos.z=s.minz; else player.pos.z=s.maxz; } }
}

const dirtGeo=new THREE.BoxGeometry(0.08,0.08,0.08); const dirtMat=new THREE.MeshStandardMaterial({color:0x6b4a2c,roughness:1});
const DIRT=80; const dirt=new THREE.InstancedMesh(dirtGeo,dirtMat,DIRT); dirt.frustumCulled=false; scene.add(dirt);
const dst=[]; for(let i=0;i<DIRT;i++)dst.push({life:0,p:new THREE.Vector3(),v:new THREE.Vector3()}); let dHead=0; const _do=new THREE.Object3D();
function emitDirt(at){ for(let i=0;i<28;i++){const s=dst[dHead];s.life=0.4+Math.random()*0.35;s.p.set(at.x+(Math.random()-.5)*1.2,0.05,at.z+(Math.random()-.5)*0.9);s.v.set((Math.random()-.5)*2,1.5+Math.random()*2.5,(Math.random()-.5)*2);dHead=(dHead+1)%DIRT;} }
function tickDirt(dt){ for(let i=0;i<DIRT;i++){const s=dst[i]; if(s.life>0){s.life-=dt;s.v.y-=9*dt;s.p.addScaledVector(s.v,dt);if(s.p.y<0.04){s.p.y=0.04;s.v.y*=-0.3;}_do.position.copy(s.p);_do.scale.setScalar(1);}else{_do.position.set(0,-999,0);_do.scale.setScalar(0.001);}_do.updateMatrix();dirt.setMatrixAt(i,_do.matrix);} dirt.instanceMatrix.needsUpdate=true; }

/* ===================== Cartel sobre mesa + crafteo en mesa ===================== */
let nearTable=null, nearRecagua=null, holdT=0, holding=false, signMode='table';
const signEl=$('tableSign'),signFill=$('signFill'),_proj=new THREE.Vector3();
function fillWater(){ const r=nearRecagua; if(!r) return; const lv=Math.min(1,(r.userData.level||0)+0.12); r.userData.level=lv;
  const w=r.userData.water; if(w){ w.visible=lv>0.01; w.scale.y=Math.max(0.001,lv); w.position.y=0.04+0.17*lv; } signFill.style.width=(lv*100)+'%'; }
signEl.addEventListener('pointerdown',e=>{ e.preventDefault(); if(signMode==='water'){ fillWater(); } else { holding=true; holdT=0; } });
signEl.addEventListener('pointerup',()=>{holding=false;holdT=0;if(signMode==='table')signFill.style.width='0%';});
signEl.addEventListener('pointercancel',()=>{holding=false;holdT=0;if(signMode==='table')signFill.style.width='0%';});
function updateSign(dt){
  nearTable=null; nearRecagua=null; let bt=9, br=9;
  for(const m of placedTables){ const d=m.position.distanceTo(player.pos);
    if(m.userData.kind==='table'){ if(d<3&&d<bt){bt=d;nearTable=m;} }
    else if(m.userData.kind==='recagua'){ if(d<2.6&&d<br){br=d;nearRecagua=m;} } }
  const target = nearTable || nearRecagua;
  if(!target||placing){ signEl.style.display='none'; holding=false; if(signMode==='table')signFill.style.width='0%'; return; }
  signMode = nearTable? 'table':'water';
  _proj.copy(target.position); _proj.y+=signMode==='table'?1.15:1.65; _proj.project(camera);
  if(_proj.z>1){ signEl.style.display='none'; return; }
  const vw=rot?innerHeight:innerWidth, vh=rot?innerWidth:innerHeight;
  const sx=(_proj.x*0.5+0.5)*vw, sy=(-_proj.y*0.5+0.5)*vh;
  signEl.style.display='block'; signEl.style.left=sx+'px'; signEl.style.top=sy+'px';
  if(signMode==='water'){
    const lv=target.userData.level||0; $('signTxt').textContent=lv>=1?T('waterFull'):T('addWater');
    signFill.style.width=(lv*100)+'%';
  } else {
    $('signTxt').textContent=T('useTable');
    if(holding){ holdT+=dt; signFill.style.width=Math.min(100,holdT/0.5*100)+'%'; if(holdT>=0.5){ holding=false; signFill.style.width='0%'; craftAtTable=true; openMenu('craft'); } }
  }
}

/* ===================== Toast / hints ===================== */
let toastT=0;
function toast(msg){ const h=$('hint'); h.textContent=msg; h.style.opacity='0.95'; toastT=2.2; }
function refreshHints(){ if(toastT>0)return; $('hint').textContent=placing?T('hintPlace'):T('hintNormal'); $('hint').style.opacity='0.5'; }

/* ===================== Loop ===================== */
const clock=new THREE.Clock(); const euler=new THREE.Euler(0,0,0,'YXZ');
function update(dt){
  let ix=joy.x,iz=joy.y;
  const mag=Math.min(1,Math.hypot(ix,iz)); if(mag>0.001){ix/=Math.max(mag,1);iz/=Math.max(mag,1);}
  forward.set(-Math.sin(player.yaw),0,-Math.cos(player.yaw)); right.set(Math.cos(player.yaw),0,-Math.sin(player.yaw));
  const sp=mag*SPEED_MAX*(player.crouch?0.5:1);
  const des=_v.set(0,0,0); des.addScaledVector(forward,-iz*sp); des.addScaledVector(right,ix*sp);
  player.vel.lerp(des,Math.min(1,ACCEL*dt)); player.pos.addScaledVector(player.vel,dt);
  player.pos.x=THREE.MathUtils.clamp(player.pos.x,-GROUND_LIMIT,GROUND_LIMIT); player.pos.z=THREE.MathUtils.clamp(player.pos.z,-GROUND_LIMIT,GROUND_LIMIT);
  resolveCollisions();   // colisión con muebles/construcción
  // piso pisable (suelos y techos rectos): subo el nivel del piso si estoy encima
  let groundY=0; const _px=player.pos.x,_pz=player.pos.z;
  for(const f of floors){ if(_px>f.minx&&_px<f.maxx&&_pz>f.minz&&_pz<f.maxz&&f.top>groundY&&player.pos.y>=f.top-0.6) groundY=f.top; }
  player.vy-=GRAV*dt; player.pos.y+=player.vy*dt;
  if(player.pos.y<=groundY){player.pos.y=groundY;player.vy=0;player.onGround=true;} else player.onGround=false;
  const targetEye=player.crouch?EYE_CROUCH:EYE; player.eye+=(targetEye-player.eye)*Math.min(1,10*dt);
  const speed=player.vel.length(); player.bobPhase+=dt*(speed*1.9+0.0001); const moveAmt=Math.min(1,speed/SPEED_MAX)*bobScale;
  const bobY=Math.sin(player.bobPhase*2)*0.05*moveAmt, bobX=Math.cos(player.bobPhase)*0.035*moveAmt;
  const strafe=right.dot(player.vel)/SPEED_MAX; player.strafeSm+=(strafe-player.strafeSm)*Math.min(1,8*dt);
  player.roll+=((-player.strafeSm*0.08+Math.sin(player.bobPhase)*0.018*moveAmt)-player.roll)*Math.min(1,10*dt);
  const tt=clock.elapsedTime, mf=(0.5+moveAmt)*camShake;
  const shx=(Math.sin(tt*2.3)+0.5*Math.sin(tt*5.7))*0.0016*mf, shy=(Math.cos(tt*1.9)+0.5*Math.sin(tt*4.3))*0.0016*mf, shr=Math.sin(tt*1.6)*0.004*mf, br=Math.sin(tt*1.15)*0.012*camShake;
  camera.position.set(player.pos.x+right.x*bobX, player.pos.y+player.eye+bobY+br, player.pos.z+right.z*bobX);
  euler.set(player.pitch+shy,player.yaw+shx,player.roll+shr); camera.quaternion.setFromEuler(euler);
  sunLight.position.set(player.pos.x+sun.position.x*0.4,sun.position.y,player.pos.z+sun.position.z*0.4); sunLight.target.position.copy(player.pos); sunLight.target.updateMatrixWorld();
  if(swing.active){ swing.t+=dt/0.42; const a=Math.sin(Math.min(swing.t,1)*Math.PI);
    if(THRUST.has(equipped)){ fpRig.position.z=fpBasePos.z-a*0.7; fpRig.rotation.x=fpBaseRot.x-a*0.18; }   // hinca al frente (estocada)
    else { fpRig.rotation.x=fpBaseRot.x-a*1.2; }
    if(swing.t>=1){ swing.active=false; fpRig.position.copy(fpBasePos); fpRig.rotation.copy(fpBaseRot); } }
  for(const d of doors){ const dp=d.group.position, dist=Math.hypot(player.pos.x-dp.x,player.pos.z-dp.z), tgt=dist<2.6?-Math.PI*0.55:0; d.hinge.rotation.y+=(tgt-d.hinge.rotation.y)*Math.min(1,6*dt); }
  tickGifs(dt);   // anima los gifs de fuego
  for(const m of placedTables){ if(m.userData.kind==='fogata'&&m.userData.fire){ m.userData.fire.intensity=1.15+Math.sin(clock.elapsedTime*11+m.position.x)*0.35+Math.random()*0.25; } }
  if(equipped==='botella'&&fpModel){ const rg=fpModel.getObjectByName('botellaRag'); if(rg){ const sp=Math.min(1,player.vel.length()/SPEED_MAX); rg.rotation.z=Math.sin(player.bobPhase*2)*0.22*(0.35+sp)+Math.sin(clock.elapsedTime*1.7)*0.06; } }   // el trapo se balancea al caminar
  if(placing&&!building) updateGhost();
  if(building){ buildT+=dt; const k=Math.min(1,buildT/0.5); if(ghost){ghost.scale.setScalar(0.2+0.8*k);} if(buildT>=0.5) finishBuild(); }
  tickDirt(dt);
  updateSign(dt);
  if(toastT>0){toastT-=dt;if(toastT<=0)refreshHints();}
}
function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); update(dt); renderer.render(scene,camera);
  if(pvActive&&pvModel&&pvRenderer){ pvModel.rotation.y+=dt*0.9; pvRenderer.render(pvScene,pvCam); } }

/* ===================== Iconos PNG (capturados del modelo real) ===================== */
function captureIcon(obj,rot3){
  try{
    const S=192,rt=new THREE.WebGLRenderTarget(S,S); const ts=new THREE.Scene();
    obj.rotation.set(rot3[0],rot3[1],rot3[2]); ts.add(obj);
    ts.add(new THREE.HemisphereLight(0xf2f6ff,0x40444c,1.5)); const d=new THREE.DirectionalLight(0xffffff,3.2); d.position.set(2,3,2.5); ts.add(d); const d2=new THREE.DirectionalLight(0xcfe0ff,1.1); d2.position.set(-2,1,-1); ts.add(d2);
    const box=new THREE.Box3().setFromObject(obj),ctr=box.getCenter(new THREE.Vector3()),sz=box.getSize(new THREE.Vector3()),rad=Math.max(sz.x,sz.y,sz.z)||1;
    const cam=new THREE.PerspectiveCamera(32,1,0.01,100); cam.position.set(ctr.x+rad*1.1,ctr.y+rad*0.8,ctr.z+rad*1.7); cam.lookAt(ctr);
    const pRT=renderer.getRenderTarget(),pC=renderer.getClearColor(new THREE.Color()),pA=renderer.getClearAlpha();
    renderer.setRenderTarget(rt); renderer.setClearColor(0x000000,0); renderer.clear(); renderer.render(ts,cam);
    const buf=new Uint8Array(S*S*4); renderer.readRenderTargetPixels(rt,0,0,S,S,buf);
    renderer.setRenderTarget(pRT); renderer.setClearColor(pC,pA);
    const cv=document.createElement('canvas');cv.width=cv.height=S;const x=cv.getContext('2d'),im=x.createImageData(S,S);
    for(let y=0;y<S;y++){const sy=S-1-y;for(let xx=0;xx<S;xx++){const di=(y*S+xx)*4,si=(sy*S+xx)*4;im.data[di]=buf[si];im.data[di+1]=buf[si+1];im.data[di+2]=buf[si+2];im.data[di+3]=buf[si+3];}}
    x.putImageData(im,0,0); const url=cv.toDataURL('image/png'); rt.dispose(); obj.traverse(o=>{if(o.geometry)o.geometry.dispose();}); return url;
  }catch(e){ return null; }
}

try{
