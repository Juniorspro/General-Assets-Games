<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e16" />
<title>Escena · Persecución</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<style>
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body{ height:100%; overflow:hidden; background:#05080e; font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; color:#eef3f8; }
  #app{ position:fixed; inset:0; }
  #app canvas{ display:block; width:100%!important; height:100%!important; }
  #fade{ position:fixed; inset:0; z-index:10; background:#000; opacity:1; pointer-events:none; transition:opacity .1s linear; }
  #cap{ position:fixed; left:0; right:0; bottom:7%; z-index:11; text-align:center; font-size:13px; letter-spacing:.32em; text-transform:uppercase;
        color:rgba(255,255,255,.82); text-shadow:0 2px 10px rgba(0,0,0,.7); opacity:0; transition:opacity .6s; pointer-events:none; }
  #cap.show{ opacity:1; }
  #bars{ position:fixed; inset:0; z-index:9; pointer-events:none; }
  #bars::before,#bars::after{ content:""; position:absolute; left:0; right:0; height:8%; background:#000; }
  #bars::before{ top:0; } #bars::after{ bottom:0; }
</style>
</head>
<body>
  <div id="app"></div>
  <div id="bars"></div>
  <div id="cap">Rezona</div>
  <div id="fade"></div>

<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from 'three';
import { Sky } from 'three/addons/objects/Sky.js';

const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.05;
app.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x9fb6c8,0.0016);
const camera=new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 6000);

/* ---- cielo + luces ---- */
const sky=new Sky(); sky.scale.setScalar(8000); const su=sky.material.uniforms;
su.turbidity.value=6; su.rayleigh.value=2.2; su.mieCoefficient.value=0.02; su.mieDirectionalG.value=0.85;
const sunDir=new THREE.Vector3().setFromSphericalCoords(1, THREE.MathUtils.degToRad(66), THREE.MathUtils.degToRad(150));
su.sunPosition.value.copy(sunDir); scene.add(sky);
const hemi=new THREE.HemisphereLight(0xcfe4ff,0x556070,0.8); scene.add(hemi);
const sun=new THREE.DirectionalLight(0xfff2e0,2.6); sun.position.copy(sunDir).multiplyScalar(60); scene.add(sun);
const pmrem=new THREE.PMREMGenerator(renderer);
try{ const es=new THREE.Scene(); const s2=new Sky(); s2.scale.setScalar(100); const u2=s2.material.uniforms;
  u2.turbidity.value=6;u2.rayleigh.value=2.2;u2.mieCoefficient.value=0.02;u2.mieDirectionalG.value=0.85;u2.sunPosition.value.copy(sunDir); es.add(s2);
  scene.environment=pmrem.fromScene(es,0.05).texture; }catch(e){ console.warn(e); }

/* ---- GRID de pruebas (debajo) ---- */
const grid=new THREE.GridHelper(4000,800,0x2a3340,0x18202a); grid.position.y=0.0; scene.add(grid);
const ground=new THREE.Mesh(new THREE.PlaneGeometry(4000,4000),new THREE.MeshStandardMaterial({color:0x10161e,roughness:1,metalness:0}));
ground.rotation.x=-Math.PI/2; ground.position.y=-0.02; scene.add(ground);

/* ---- CARRETERA PBR (textura del bosque) sobre el grid, bien LARGA ---- */
const ROADLEN=4000, ROADW=15;
const roadMat=new THREE.MeshStandardMaterial({color:0xffffff,roughness:1,metalness:0});
const road=new THREE.Mesh(new THREE.PlaneGeometry(ROADW,ROADLEN), roadMat);
road.rotation.x=-Math.PI/2; road.position.set(0,0.02,0); scene.add(road);
const lineMat=new THREE.MeshBasicMaterial({color:0xf0e6c0});
for(let i=-ROADLEN/2;i<ROADLEN/2;i+=10){ const dash=new THREE.Mesh(new THREE.PlaneGeometry(0.35,4),lineMat); dash.rotation.x=-Math.PI/2; dash.position.set(0,0.035,i); scene.add(dash); }
const RTEX='https://cdn.jsdelivr.net/gh/Juniorspro/General-Assets-Games@bf015fa/assets/textures/v2/';
const tl=new THREE.TextureLoader(); tl.crossOrigin='anonymous';
function rtex(f,srgb){ return new Promise(res=>tl.load(RTEX+f,t=>{ t.colorSpace=srgb?THREE.SRGBColorSpace:THREE.NoColorSpace; t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(2,ROADLEN/8); t.anisotropy=8; res(t); }, undefined, ()=>res(null))); }
Promise.all([rtex('road_col.jpg',true),rtex('road_nrm.jpg',false),rtex('road_rgh.jpg',false)]).then(([c,n,r])=>{
  if(c)roadMat.map=c; if(n){roadMat.normalMap=n;roadMat.normalScale.set(1.2,1.2);} if(r)roadMat.roughnessMap=r; roadMat.needsUpdate=true; });

/* ---- AUTO procedural ---- */
function makeWheel(){ const g=new THREE.Mesh(new THREE.CylinderGeometry(0.36,0.36,0.28,18), new THREE.MeshStandardMaterial({color:0x101013,roughness:0.8,metalness:0.1})); g.rotation.z=Math.PI/2;
  const rim=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.18,0.3,10), new THREE.MeshStandardMaterial({color:0xcfd4da,roughness:0.4,metalness:0.8})); rim.rotation.z=Math.PI/2; g.add(rim); return g; }
function makeCar(bodyColor, police){
  const car=new THREE.Group();
  const paint=new THREE.MeshStandardMaterial({color:bodyColor,roughness:0.28,metalness:0.55,envMapIntensity:1.1});
  const glass=new THREE.MeshStandardMaterial({color:0x10141c,roughness:0.08,metalness:0.2,envMapIntensity:1.4});
  const body=new THREE.Mesh(new THREE.BoxGeometry(2.0,0.7,4.4),paint); body.position.y=0.62; car.add(body);
  const bevel=new THREE.Mesh(new THREE.BoxGeometry(1.96,0.34,2.0),paint); bevel.position.set(0,1.05,-0.1); car.add(bevel);
  const cabin=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.5,1.9),glass); cabin.position.set(0,1.12,-0.1); car.add(cabin);
  const nose=new THREE.Mesh(new THREE.BoxGeometry(1.9,0.4,0.6),paint); nose.position.set(0,0.6,2.2); car.add(nose);
  const hl=new THREE.MeshStandardMaterial({color:0xfff4d0,emissive:0xfff0c0,emissiveIntensity:1.4,roughness:0.3});
  for(const sx of [-0.7,0.7]){ const f=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.22,0.1),hl); f.position.set(sx,0.62,2.5); car.add(f); }
  const tlm=new THREE.MeshStandardMaterial({color:0xff3020,emissive:0xff2010,emissiveIntensity:1.0});
  for(const sx of [-0.7,0.7]){ const f=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.2,0.1),tlm); f.position.set(sx,0.62,-2.2); car.add(f); }
  const wheels=[]; const wp=[[-1.0,0.36,1.4],[1.0,0.36,1.4],[-1.0,0.36,-1.4],[1.0,0.36,-1.4]];
  for(const p of wp){ const w=makeWheel(); w.position.set(p[0],p[1],p[2]); car.add(w); wheels.push(w); }
  car.userData.wheels=wheels;
  if(police){ const bar=new THREE.Group(); bar.position.set(0,1.45,-0.1);
    const red=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.18,0.4),new THREE.MeshStandardMaterial({color:0xff1020,emissive:0xff0000,emissiveIntensity:2})); red.position.x=-0.35; bar.add(red);
    const blu=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.18,0.4),new THREE.MeshStandardMaterial({color:0x2040ff,emissive:0x1030ff,emissiveIntensity:2})); blu.position.x=0.35; bar.add(blu);
    car.add(bar); car.userData.lights={red,blu};
    const rL=new THREE.PointLight(0xff2020,0,14,2); rL.position.set(-0.35,1.6,0); car.add(rL);
    const bL=new THREE.PointLight(0x2040ff,0,14,2); bL.position.set(0.35,1.6,0); car.add(bL); car.userData.pl={rL,bL}; }
  car.traverse(o=>{ if(o.isMesh)o.castShadow=true; });
  return car;
}
const fugitive=makeCar(0xc0392b,false); scene.add(fugitive);
const cop1=makeCar(0xf4f6f8,true); scene.add(cop1);
const cop2=makeCar(0x2a3550,true); scene.add(cop2);

/* ---- VOLANTE (interior) montado en la cámara: dos cilindros agarrándolo ---- */
const wheelRig=new THREE.Group();
const wheelMat=new THREE.MeshStandardMaterial({color:0x16181d,roughness:0.5,metalness:0.3});
const sw=new THREE.Mesh(new THREE.TorusGeometry(0.26,0.045,12,32),wheelMat); wheelRig.add(sw);
const hub=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.08,0.05,16),wheelMat); hub.rotation.x=Math.PI/2; wheelRig.add(hub);
for(const a of [-1,1]){ const sp=new THREE.Mesh(new THREE.BoxGeometry(0.24,0.03,0.03),wheelMat); sp.position.x=a*0.13; wheelRig.add(sp); }
const armMat=new THREE.MeshStandardMaterial({color:0x6b4a32,roughness:0.7,metalness:0});
const armL=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.06,0.5,12),armMat); armL.position.set(-0.22,-0.18,0.1); armL.rotation.z=0.7; wheelRig.add(armL);
const armR=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.06,0.5,12),armMat); armR.position.set(0.22,-0.18,0.1); armR.rotation.z=-0.7; wheelRig.add(armR);
wheelRig.position.set(0,-0.32,-0.62); wheelRig.visible=false; camera.add(wheelRig); scene.add(camera);

/* ---- estado de la persecución ---- */
const SPEED=42; let carZ=-ROADLEN/2+60;
const _tmp=new THREE.Vector3();
function placeCars(t,dt){
  carZ+= SPEED*dt;
  const weave=Math.sin(t*1.1)*1.4;
  fugitive.position.set(weave,0,carZ); fugitive.rotation.y=Math.PI + Math.cos(t*1.1)*0.12;
  cop1.position.set(weave*0.6-1.6,0,carZ-9+Math.sin(t*1.7)*1.0); cop1.rotation.y=Math.PI+Math.cos(t*1.7)*0.1;
  cop2.position.set(weave*0.6+1.8,0,carZ-14+Math.sin(t*1.4+1)*1.0); cop2.rotation.y=Math.PI+Math.cos(t*1.4)*0.1;
  for(const c of [fugitive,cop1,cop2]) for(const w of c.userData.wheels) w.rotation.x -= SPEED*dt*2.6;
  const blink=(Math.sin(t*16)>0);
  for(const c of [cop1,cop2]){ const L=c.userData.lights, P=c.userData.pl; if(L){ L.red.material.emissiveIntensity=blink?3:0.2; L.blu.material.emissiveIntensity=blink?0.2:3; } if(P){ P.rL.intensity=blink?8:0; P.bL.intensity=blink?0:8; } }
}

/* ---- coreografía de cámara (procedural, en bucle) ---- */
const fadeEl=document.getElementById('fade'), capEl=document.getElementById('cap');
function setFov(f){ if(Math.abs(camera.fov-f)>0.01){ camera.fov=f; camera.updateProjectionMatrix(); } }
function lookFrom(px,py,pz, tx,ty,tz){ camera.position.set(px,py,pz); _tmp.set(tx,ty,tz); camera.lookAt(_tmp); }
const CYCLE=17.0;
function director(ct){
  const fx=fugitive.position.x, fZ=carZ;
  if(ct<4.3){                       // 1) lateral siguiendo la persecución (FOV normal)
    setFov(52); const k=ct/4.3; lookFrom(fx-9, 2.6, fZ-6 + k*4, fx, 1.0, fZ-4);
  } else if(ct<7.4){                // 2) FOV EXTREMO por delante del perseguido (viene hacia la cámara)
    setFov(112); lookFrom(fx, 0.7, fZ+7.0, fx, 0.9, fZ);
  } else if(ct<11.2){               // 3) detrás de la policía, 3ra persona, FOV normal
    setFov(56); lookFrom(cop2.position.x, 3.0, cop2.position.z-7.5, fx, 1.0, fZ);
  } else if(ct<15.2){               // 4) DENTRO del fugitivo: volante + mira a los lados, FOV grande
    setFov(86); wheelRig.visible=true;
    const headYaw=Math.sin(ct*1.6)*0.5;
    const cx=fugitive.position.x, cz=fZ;
    camera.position.set(cx, 1.18, cz-0.5);
    _tmp.set(cx+Math.sin(headYaw)*6, 1.05, cz+Math.cos(headYaw)*6); camera.lookAt(_tmp);
    sw.rotation.z = -Math.sin(ct*1.1)*0.5;
  } else { setFov(70); }
  if(!(ct>=11.2&&ct<15.2)) wheelRig.visible=false;
  let a=0; if(ct<1.1) a=1-ct/1.1; else if(ct>15.4) a=(ct-15.4)/1.2; fadeEl.style.opacity=Math.max(0,Math.min(1,a)).toFixed(3);
  if(ct>13.6&&ct<15.4) capEl.classList.add('show'); else capEl.classList.remove('show');
}

/* ---- loop ---- */
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
renderer.setSize(innerWidth,innerHeight);
const clock=new THREE.Clock(); let ct=0, t=0;
function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); t+=dt; ct+=dt;
  if(ct>=CYCLE){ ct=0; carZ=-ROADLEN/2+60; }
  placeCars(t,dt); director(ct);
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
