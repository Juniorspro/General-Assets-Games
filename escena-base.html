<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#aebfcf" />
<title>Escena · Limpia</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
<style>
  :root{ --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px); }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ height:100%; overflow:hidden; background:#0a0e16; font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; color:#eef3f8; overscroll-behavior:none; }
  #stage{ position:fixed; inset:0; }
  body.rot #stage{ width:100vh; height:100vw; top:50%; left:50%; transform:translate(-50%,-50%) rotate(90deg); transform-origin:center; }
  #app{ position:absolute; inset:0; }
  #app canvas{ display:block; width:100%!important; height:100%!important; touch-action:none; }
  #cross{ position:fixed; left:50%; top:50%; width:6px; height:6px; margin:-3px; z-index:6; border-radius:50%; background:rgba(255,255,255,.6); box-shadow:0 0 4px rgba(0,0,0,.6); pointer-events:none; }
  #joy{ position:fixed; left:26px; bottom:calc(28px + var(--safe-b)); z-index:20; width:128px; height:128px; border-radius:50%;
        background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.18); backdrop-filter:blur(6px); touch-action:none; }
  #joyKnob{ position:absolute; left:50%; top:50%; width:52px; height:52px; margin:-26px 0 0 -26px; border-radius:50%;
            background:radial-gradient(circle at 38% 34%,#dff0ff,#5aa0ff); box-shadow:0 4px 16px rgba(0,0,0,.45); }
  .actBtn{ position:fixed; z-index:20; width:64px; height:64px; border-radius:50%; background:rgba(255,255,255,.06);
           border:1.5px solid rgba(255,255,255,.2); color:#eef3f8; font-size:22px; backdrop-filter:blur(6px); cursor:pointer;
           display:flex; align-items:center; justify-content:center; transition:transform .1s,background .15s; }
  .actBtn:active{ transform:scale(.92); }
  .actBtn.on{ background:rgba(90,160,255,.3); border-color:#8fe3ff; }
  #bJump  { right:26px; bottom:calc(34px + var(--safe-b)); }
  #bCrouch{ right:100px; bottom:calc(58px + var(--safe-b)); width:56px; height:56px; font-size:19px; }
  #bChop  { right:26px; bottom:calc(108px + var(--safe-b)); }
  #bHammer{ right:100px; bottom:calc(132px + var(--safe-b)); width:56px; height:56px; font-size:19px; }
  #animLabel{ position:fixed; left:50%; top:calc(14px + var(--safe-t)); transform:translateX(-50%); z-index:10;
              background:rgba(14,22,30,.72); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.16); border-radius:999px;
              padding:8px 18px; color:#ffd27a; font-weight:700; font-size:15px; letter-spacing:.02em; white-space:nowrap;
              box-shadow:0 6px 20px rgba(0,0,0,.45); pointer-events:none; }
  #npcPanel{ position:fixed; left:50%; bottom:calc(16px + var(--safe-b)); transform:translateX(-50%); z-index:25; display:none; flex-direction:column; align-items:center; gap:6px;
             background:rgba(14,22,30,.82); border:1px solid rgba(255,255,255,.16); border-radius:14px; padding:8px 12px; backdrop-filter:blur(8px); box-shadow:0 8px 24px rgba(0,0,0,.5); }
  #npName{ color:#ffd27a; font-weight:700; font-size:13px; letter-spacing:.02em; }
  #npcPanel .npRow{ display:flex; gap:6px; }
  #npcPanel button{ background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); color:#eef3f8; border-radius:10px; padding:9px 11px; font-size:12px; font-weight:600; cursor:pointer; }
  #npcPanel button:active{ background:rgba(90,160,255,.4); transform:scale(.94); }
  #loader{ position:fixed; inset:0; z-index:60; display:flex; align-items:center; justify-content:center;
           background:#0a0e16; transition:opacity .5s; color:#9fb6ff; font-size:13px; letter-spacing:.1em; }
  #loader.hide{ opacity:0; pointer-events:none; }
</style>
</head>
<body>
<div id="loader">…</div>
<div id="stage">
  <div id="app"></div>
  <div id="cross"></div>
  <div id="joy"><div id="joyKnob"></div></div>
  <button id="bJump"   class="actBtn">⤴️</button>
  <button id="bCrouch" class="actBtn">🔽</button>
  <button id="bChop"   class="actBtn">🪓</button>
  <button id="bHammer" class="actBtn">🔪</button>
  <div id="animLabel">cargando…</div>
  <div id="npcPanel">
    <div id="npName">—</div>
    <div class="npRow">
      <button data-a="idle">Idle</button>
      <button data-a="walk">Caminar</button>
      <button data-a="run">Correr</button>
      <button data-a="attack">Atacar</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
    "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { clone as skClone } from 'three/addons/utils/SkeletonUtils.js';
import * as CANNON from 'cannon-es';

/* ===================== Render / escena ===================== */
const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.0;
app.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0e16);
scene.fog=new THREE.FogExp2(0x0a0e16,0.018);   // niebla nocturna
const pmrem=new THREE.PMREMGenerator(renderer); scene.environment=pmrem.fromScene(new RoomEnvironment(),0.02).texture;
const camera=new THREE.PerspectiveCamera(64,1,0.04,2000);

// suelo nocturno (tierra)
const ground=new THREE.Mesh(new THREE.PlaneGeometry(600,600),new THREE.MeshStandardMaterial({color:0x232a1e,roughness:1,metalness:0}));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);
const LIMIT=120;

// ===== Iluminación nocturna (buena visibilidad) =====
const moon=new THREE.DirectionalLight(0x9fb6ff,0.85); moon.position.set(-40,70,-30); moon.castShadow=true;
moon.shadow.mapSize.set(2048,2048); moon.shadow.camera.near=1; moon.shadow.camera.far=220;
moon.shadow.camera.left=-60; moon.shadow.camera.right=60; moon.shadow.camera.top=60; moon.shadow.camera.bottom=-60; moon.shadow.bias=-0.0004; moon.shadow.normalBias=0.04;
scene.add(moon); scene.add(moon.target);
scene.add(new THREE.HemisphereLight(0x3a557f,0x0d1108,0.6));
scene.add(new THREE.AmbientLight(0x46506a,0.4));

// ===== Físicas (cannon-es) para el RAGDOLL =====
const world=new CANNON.World({gravity:new CANNON.Vec3(0,-9.82,0)});
world.broadphase=new CANNON.SAPBroadphase(world); world.allowSleep=true; world.defaultContactMaterial.friction=0.4;
const groundBody=new CANNON.Body({mass:0,shape:new CANNON.Plane()}); groundBody.quaternion.setFromEuler(-Math.PI/2,0,0); world.addBody(groundBody);
let ragActive=0;

/* ===================== Jugador (1ª persona) ===================== */
const EYE=1.7, EYE_CROUCH=1.05, GRAV=22, JUMP_V=7.4, SPEED_MAX=6.4, ACCEL=11;
const player={pos:new THREE.Vector3(0,0,6),vel:new THREE.Vector3(),yaw:0,pitch:0,roll:0,bobPhase:0,strafeSm:0,eye:EYE,vy:0,onGround:true,crouch:false};
const forward=new THREE.Vector3(),right=new THREE.Vector3(),_v=new THREE.Vector3();
scene.add(camera);

/* ===================== Rotación 90° en vertical ===================== */
let forceLandscape=true, rot=false;
function layout(){ rot=forceLandscape&&(innerHeight>innerWidth); document.body.classList.toggle('rot',rot);
  const vw=rot?innerHeight:innerWidth, vh=rot?innerWidth:innerHeight; camera.aspect=vw/vh; camera.updateProjectionMatrix(); renderer.setSize(vw,vh,false); }
addEventListener('resize',layout);

/* ===================== Controles ===================== */
const joyEl=document.getElementById('joy'),knob=document.getElementById('joyKnob'); let joyId=null; const joy={x:0,y:0};
function joyUpd(e){const r=joyEl.clientWidth/2;let dx=e.offsetX-r,dy=e.offsetY-r;const len=Math.hypot(dx,dy);if(len>r){dx*=r/len;dy*=r/len;}knob.style.transform=`translate(${dx}px,${dy}px)`;joy.x=dx/r;joy.y=dy/r;}
joyEl.addEventListener('pointerdown',e=>{joyId=e.pointerId;joyEl.setPointerCapture(e.pointerId);joyUpd(e);e.preventDefault();});
joyEl.addEventListener('pointermove',e=>{if(e.pointerId===joyId)joyUpd(e);});
function joyEnd(e){if(e.pointerId===joyId){joyId=null;joy.x=0;joy.y=0;knob.style.transform='translate(0,0)';}}
joyEl.addEventListener('pointerup',joyEnd);joyEl.addEventListener('pointercancel',joyEnd);

let lookId=null,lastX=0,lastY=0;const LOOK=0.0042;
function isUI(t){return t.closest('.actBtn')||t.closest('#npcPanel')||t===joyEl||t===knob;}
addEventListener('pointerdown',e=>{if(isUI(e.target))return;if(lookId===null&&e.pointerId!==joyId){lookId=e.pointerId;lastX=e.clientX;lastY=e.clientY;}});
addEventListener('pointermove',e=>{if(e.pointerId!==lookId)return;let ddx=e.clientX-lastX,ddy=e.clientY-lastY;if(rot){const t=ddx;ddx=ddy;ddy=-t;}player.yaw-=ddx*LOOK;player.pitch=Math.max(-1.4,Math.min(1.4,player.pitch-ddy*LOOK));lastX=e.clientX;lastY=e.clientY;});
function lookEnd(e){if(e.pointerId===lookId)lookId=null;}
addEventListener('pointerup',lookEnd);addEventListener('pointercancel',lookEnd);

function tapBtn(id,fn){ const el=document.getElementById(id); el.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();fn();}); }
tapBtn('bJump',()=>{ if(player.onGround){player.vy=JUMP_V;player.onGround=false;} });
tapBtn('bCrouch',()=>{ player.crouch=!player.crouch; document.getElementById('bCrouch').classList.toggle('on',player.crouch); });

/* ===================== PLAYER en 1ª persona CON CUERPO visible (GLB animado) ===================== */
// Player moderno (Higgsfield image-to-3D 30k + textura). Como el auto-rig de Meshy difiere por clip,
// cada estado es su PROPIO GLB y hacemos swap del cuerpo según el movimiento. La cámara va a la altura
// de los ojos y se OCULTA la cabeza (escala del hueso Head ~0) para no tapar la vista: así ves tus
// brazos, torso y piernas al mirar hacia abajo.
const EBASE='https://cdn.jsdelivr.net/gh/Juniorspro/General-Assets-Games@ab92101/';
let hitShake=0;
const eLabelEl=document.getElementById('animLabel');
const _gltf=new GLTFLoader();
// ---- PLAYER: SIN cuerpo. Sólo el hacha hawk en 1ª persona (viewmodel) para matar NPCs ----
let vm=null, swingT=0; const SWING_DUR=0.38;
const VM_POS=new THREE.Vector3(0.33,-0.5,-0.82), VM_ROT=new THREE.Euler(0.12,Math.PI/2,0.18);   // pose EXACTA del bosque
// ---- HACHA DEL BOSQUE (buildFPAxe, idéntica a bosque-vhs): mango de madera + hoja de acero curva ----
function buildFPAxe(){ const g=new THREE.Group();
  const wood=new THREE.MeshStandardMaterial({color:0x5e3f22,metalness:0,roughness:0.62,envMapIntensity:0.5});
  const steel=new THREE.MeshStandardMaterial({color:0x8b929b,metalness:1,roughness:0.34,envMapIntensity:1.25});
  const edgeMat=new THREE.MeshStandardMaterial({color:0xe8edf3,metalness:1,roughness:0.08,envMapIntensity:1.7});
  const Hlen=1.18;
  const handle=new THREE.Mesh(new THREE.CylinderGeometry(0.034,0.05,Hlen,18),wood); handle.position.y=Hlen*0.5; g.add(handle);
  const pommel=new THREE.Mesh(new THREE.SphereGeometry(0.055,16,12),wood); pommel.scale.y=0.72; g.add(pommel);
  const headG=new THREE.Group(); headG.position.y=Hlen-0.02; g.add(headG);
  const collar=new THREE.Mesh(new THREE.CylinderGeometry(0.066,0.072,0.2,16),steel); headG.add(collar);
  const s=new THREE.Shape();
  s.moveTo(-0.17,-0.055); s.lineTo(-0.02,-0.075); s.lineTo(0.30,-0.205); s.quadraticCurveTo(0.46,0,0.30,0.205);
  s.lineTo(-0.02,0.075); s.lineTo(-0.17,0.055); s.quadraticCurveTo(-0.205,0,-0.17,-0.055);
  const bg=new THREE.ExtrudeGeometry(s,{depth:0.075,bevelEnabled:true,bevelThickness:0.018,bevelSize:0.02,bevelSegments:2,curveSegments:22});
  bg.center(); bg.clearGroups(); const pp=bg.attributes.position;
  for(let i=0;i<pp.count;i+=3){ const cx=(pp.getX(i)+pp.getX(i+1)+pp.getX(i+2))/3; bg.addGroup(i,3, cx>0.28?1:0); }
  const blade=new THREE.Mesh(bg,[steel,edgeMat]); headG.add(blade);
  return g; }
{ const o=buildFPAxe(); o.scale.setScalar(0.46);
  o.traverse(x=>{ if(x.isMesh){ x.frustumCulled=false; x.castShadow=false; x.renderOrder=999; } });
  vm=new THREE.Group(); vm.add(o); vm.position.copy(VM_POS); vm.rotation.copy(VM_ROT); camera.add(vm);
  if(eLabelEl) eLabelEl.textContent=''; }
let attackQueued=false;
function swing(){ if(swingT<=0){ swingT=SWING_DUR; attackQueued=true; } }   // golpe del hacha (+ intento de matar)
function actBtn(id,fn){ const el=document.getElementById(id); if(el) el.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();fn();}); }
actBtn('bChop',swing); actBtn('bHammer',swing);
function tickPlayer(dt){ if(!vm)return;
  const t=performance.now()*0.001, bp=player.bobPhase, moving=player.vel.length()>0.4;
  let px=VM_POS.x+Math.sin(t*1.4)*0.004+(moving?Math.cos(bp)*0.018:0);
  let py=VM_POS.y+Math.sin(t*2.0)*0.004+(moving?-Math.abs(Math.sin(bp))*0.018:0);
  let rx=VM_ROT.x, rz=VM_ROT.z;
  if(swingT>0){ swingT=Math.max(0,swingT-dt); const a=Math.sin((1-swingT/SWING_DUR)*Math.PI); rx=VM_ROT.x-a*1.35; rz=VM_ROT.z+a*0.35; py-=a*0.06; }   // hachazo (como bosque)
  vm.position.set(px,py,VM_POS.z); vm.rotation.set(rx,VM_ROT.y,rz); }

/* ===================== NPCs: 5 tipos (viewer + perseguidores), antorchas, muertes ===================== */
const NPC_TYPES=[
  {name:'Primitivo · garrote', f:{idle:'char_idle.glb',walk:'char_walk.glb',run:'char_run.glb',attack:'char_attack.glb'}, h:1.78, weapon:'club'},
  {name:'Cazador · lanza',     f:{idle:'npc2_idle.glb',walk:'npc2_walk.glb',run:'npc2_run.glb',attack:'npc2_attack.glb'}, h:1.82, weapon:'spear'},
  {name:'Encapuchado · hacha', f:{idle:'npc3_idle.glb',walk:'npc3_walk.glb',run:'npc3_run.glb',attack:'npc3_attack.glb'}, h:1.82, weapon:'stoneaxe'},
  {name:'Mujer · garrote',     f:{idle:'npc4_idle.glb',walk:'npc4_walk.glb',run:'npc4_run.glb',attack:'npc4_attack.glb'}, h:1.68, weapon:'club'},
  {name:'Antorcha',            f:{idle:'npc5_idle.glb',walk:'npc5_walk.glb',run:'npc5_run.glb',attack:'npc5_attack.glb'}, h:1.7, weapon:'torch', torch:true},
];
const ANIMS=['idle','walk','run','attack'];
const tpl=NPC_TYPES.map(()=>({}));
const npcLoader=new GLTFLoader();
let nLoaded=0; const nTotal=NPC_TYPES.length*ANIMS.length; let assetsReady=false;
function setSideFront(scn){ scn.traverse(o=>{ if(o.isMesh){ const mm=Array.isArray(o.material)?o.material:[o.material]; mm.forEach(m=>{ if(m) m.side=THREE.FrontSide; }); } }); }
NPC_TYPES.forEach((T,ti)=> ANIMS.forEach(an=>{   // TODAS en paralelo; medimos la escala en el ORIGINAL (fiable)
  npcLoader.load(EBASE+T.f[an], gl=>{ const scn=gl.scene; setSideFront(scn);
    const b=new THREE.Box3().setFromObject(scn), sz=b.getSize(new THREE.Vector3()), s=T.h/(sz.y||1), c=b.getCenter(new THREE.Vector3());
    tpl[ti][an]={scene:scn, clip:gl.animations[0], s, off:new THREE.Vector3(-c.x*s,-b.min.y*s,-c.z*s)};
    if(++nLoaded>=nTotal) onReady(); },
    undefined, e=>{ console.warn(T.f[an],e); if(++nLoaded>=nTotal) onReady(); }); }));

const npcs=[]; const _tmpV=new THREE.Vector3(), _ws=new THREE.Vector3();
// armas procedurales en metros reales; orientación aproximada en la mano (ajustable)
const WGRIP=new THREE.Euler(-Math.PI/2,0,0.35);
function buildWeapon(kind){ const g=new THREE.Group();
  const wood=new THREE.MeshStandardMaterial({color:0x6b4a2a,roughness:0.85}), stone=new THREE.MeshStandardMaterial({color:0x6e7378,roughness:0.95});
  if(kind==='club'){ const h=new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.05,0.66,10),wood); h.position.y=0.33; g.add(h);
    const k=new THREE.Mesh(new THREE.SphereGeometry(0.085,12,10),wood); k.scale.y=1.4; k.position.y=0.7; g.add(k); }
  else if(kind==='spear'){ const h=new THREE.Mesh(new THREE.CylinderGeometry(0.022,0.026,1.7,10),wood); h.position.y=0.85; g.add(h);
    const tip=new THREE.Mesh(new THREE.ConeGeometry(0.05,0.24,8),stone); tip.position.y=1.78; g.add(tip); }
  else if(kind==='stoneaxe'){ const h=new THREE.Mesh(new THREE.CylinderGeometry(0.026,0.036,0.7,10),wood); h.position.y=0.35; g.add(h);
    const head=new THREE.Mesh(new THREE.BoxGeometry(0.24,0.16,0.07),stone); head.position.set(0.07,0.64,0); head.rotation.z=0.18; g.add(head); }
  else if(kind==='torch'){ const h=new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.034,0.62,10),wood); h.position.y=0.31; g.add(h);
    const wrap=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.05,0.12,10),new THREE.MeshStandardMaterial({color:0x2a2118,roughness:1})); wrap.position.y=0.63; g.add(wrap); }
  return g; }
function flameTex(){ const c=document.createElement('canvas');c.width=c.height=64;const x=c.getContext('2d');
  const gr=x.createRadialGradient(32,38,2,32,34,30); gr.addColorStop(0,'rgba(255,248,220,1)');gr.addColorStop(.45,'rgba(255,150,40,.9)');gr.addColorStop(1,'rgba(255,80,0,0)');
  x.fillStyle=gr;x.fillRect(0,0,64,64); const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t; }
function makeFlame(){ const g=new THREE.Group(); const light=new THREE.PointLight(0xff7d2a,6,8,2); light.position.y=0.05; g.add(light);
  const spr=new THREE.Sprite(new THREE.SpriteMaterial({map:flameTex(),color:0xffb24d,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false}));
  spr.scale.set(0.34,0.5,1); g.add(spr); g.userData={light,spr}; return g; }
function attachWeapon(body,kind,flames){ const hand=body.getObjectByName('RightHand'); if(!hand)return;
  hand.updateWorldMatrix(true,false); const hs=hand.getWorldScale(_ws).x||1;
  const holder=new THREE.Group(); holder.add(buildWeapon(kind));
  holder.scale.setScalar(1/hs); holder.rotation.copy(WGRIP);                 // arma en metros reales pese a la escala del hueso
  holder.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.frustumCulled=false; } });
  if(kind==='torch'){ const fl=makeFlame(); fl.position.set(0,0.66,0); holder.add(fl); if(flames)flames.push(fl.userData); }
  hand.add(holder); }
function makeNPC(ti,x,z,mode){ const T=NPC_TYPES[ti];
  const inst={ti,T,group:new THREE.Group(),bodies:{},mixers:{},actions:{},state:null,mode,dead:false,vy:0,flames:[]};
  ANIMS.forEach(an=>{ const t=tpl[ti][an]; if(!t)return;
    const scn=skClone(t.scene); scn.scale.setScalar(t.s); scn.position.copy(t.off); scn.visible=false;   // escala/offset del original
    scn.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.frustumCulled=false; } });
    if(T.weapon) attachWeapon(scn,T.weapon,inst.flames);                                                  // arma/antorcha en la mano
    inst.group.add(scn);
    const mx=new THREE.AnimationMixer(scn); const ac=t.clip?mx.clipAction(t.clip):null;
    if(ac){ ac.setLoop(THREE.LoopRepeat); if(an==='attack')ac.timeScale=1.5; }                            // ataque más rápido
    inst.bodies[an]=scn; inst.mixers[an]=mx; inst.actions[an]=ac; });
  inst.group.position.set(x,0,z); scene.add(inst.group);
  setState(inst,'idle'); npcs.push(inst); return inst; }
function setState(inst,an){ if(inst.dead||inst.state===an)return; const b=inst.bodies[an]; if(!b)return;
  for(const k in inst.bodies) inst.bodies[k].visible=false; b.visible=true;
  const ac=inst.actions[an]; if(ac) ac.reset().play(); inst.state=an; }

const VIEW_Z=-12, VIEW_DX=4.2;
function onReady(){ assetsReady=true; if(eLabelEl)eLabelEl.textContent='';
  for(let i=0;i<NPC_TYPES.length;i++){ const x=(i-(NPC_TYPES.length-1)/2)*VIEW_DX; const inst=makeNPC(i,x,VIEW_Z,'viewer'); inst.group.rotation.y=Math.PI; }   // viewer en fila
  for(let k=0;k<3;k++){ const ti=(Math.random()*NPC_TYPES.length)|0, a=Math.random()*6.28, r=26+Math.random()*8;   // 3 perseguidores
    makeNPC(ti, player.pos.x+Math.cos(a)*r, player.pos.z+Math.sin(a)*r, 'chase'); } }

// panel: animación seleccionable al acercarse
const panel=document.getElementById('npcPanel'), pName=document.getElementById('npName'); let nearInst=null;
if(panel) panel.querySelectorAll('button').forEach(btn=> btn.addEventListener('pointerdown',e=>{ e.preventDefault();e.stopPropagation(); if(nearInst)setState(nearInst,btn.dataset.a); }));

// matar con el hacha (rayo al centro) → ragdoll-lite
const _ray=new THREE.Raycaster();
function tryKill(){ _ray.setFromCamera({x:0,y:0},camera); _ray.far=3.2;
  let best=null,bd=1e9; for(const n of npcs){ if(n.dead)continue; const h=_ray.intersectObject(n.group,true); if(h.length&&h[0].distance<bd){bd=h[0].distance;best=n;} }
  if(best&&bd<3.2) killNPC(best); }
function killNPC(inst){ if(inst.dead)return; inst.dead=true; for(const k in inst.mixers) inst.mixers[k].stopAllAction();
  const dx=inst.group.position.x-player.pos.x, dz=inst.group.position.z-player.pos.z, d=Math.hypot(dx,dz)||1;
  const imp=new THREE.Vector3(dx/d*3.2, 2.2, dz/d*3.2);   // empuje del hachazo
  hitShake=0.6; try{ startRagdoll(inst,imp); }catch(e){ console.warn('ragdoll',e); inst.simpleFall=true; } }

/* ---------- RAGDOLL con cannon-es: un cuerpo por hueso + constraints, gravedad y colisión ---------- */
const RAG=[ ['Hips','Spine',0.12],['Spine','Head',0.13],['Head',null,0.11],
  ['LeftArm','LeftForeArm',0.05],['LeftForeArm','LeftHand',0.045],['RightArm','RightForeArm',0.05],['RightForeArm','RightHand',0.045],
  ['LeftUpLeg','LeftLeg',0.07],['LeftLeg','LeftFoot',0.06],['RightUpLeg','RightLeg',0.07],['RightLeg','RightFoot',0.06] ];
const RPAIRS=[['Hips','Spine'],['Spine','Head'],['Spine','LeftArm'],['Spine','RightArm'],['LeftArm','LeftForeArm'],['RightArm','RightForeArm'],['Hips','LeftUpLeg'],['Hips','RightUpLeg'],['LeftUpLeg','LeftLeg'],['RightUpLeg','RightLeg']];
const _yUp=new THREE.Vector3(0,1,0), _q1=new THREE.Quaternion();
function w2bl(pb,wv){ return wv.clone().sub(new THREE.Vector3(pb.position.x,pb.position.y,pb.position.z)).applyQuaternion(new THREE.Quaternion(pb.quaternion.x,pb.quaternion.y,pb.quaternion.z,pb.quaternion.w).invert()); }
function startRagdoll(inst,imp){ const body=inst.bodies[inst.state]; if(!body)return; body.updateWorldMatrix(true,true);
  inst.rag={recs:[],byBone:{},cons:[]};
  for(const [bn,cn,r] of RAG){ const bone=body.getObjectByName(bn); if(!bone)continue;
    const p0=bone.getWorldPosition(new THREE.Vector3());
    const child=cn?body.getObjectByName(cn):null;
    const p1=child?child.getWorldPosition(new THREE.Vector3()):p0.clone().add(new THREE.Vector3(0,0.14,0));
    const center=p0.clone().add(p1).multiplyScalar(0.5); let dir=p1.clone().sub(p0); let len=dir.length();
    if(len<0.04){len=0.12;dir.set(0,1,0);} else dir.divideScalar(len);
    const qSeg=new THREE.Quaternion().setFromUnitVectors(_yUp,dir);
    const pb=new CANNON.Body({mass:1.2, linearDamping:0.04, angularDamping:0.25,
      position:new CANNON.Vec3(center.x,center.y,center.z)});
    pb.quaternion.set(qSeg.x,qSeg.y,qSeg.z,qSeg.w);
    pb.addShape(new CANNON.Box(new CANNON.Vec3(r,Math.max(0.05,len/2),r)));
    pb.velocity.set(imp.x+(Math.random()-.5),imp.y,imp.z+(Math.random()-.5));
    pb.angularVelocity.set((Math.random()-.5)*5,(Math.random()-.5)*4,(Math.random()-.5)*5);
    world.addBody(pb);
    const bq0=bone.getWorldQuaternion(new THREE.Quaternion());
    const M=bq0.clone().multiply(qSeg.clone().invert());                 // boneWorld = M * bodyQuat
    const rLocal=p0.clone().sub(center).applyQuaternion(qSeg.clone().invert());
    const rec={bn,bone,pb,M,rLocal,isRoot:bn==='Hips'}; inst.rag.recs.push(rec); inst.rag.byBone[bn]=rec; }
  for(const [a,b] of RPAIRS){ const A=inst.rag.byBone[a],B=inst.rag.byBone[b]; if(!A||!B)continue;
    const jw=B.bone.getWorldPosition(new THREE.Vector3());
    const c=new CANNON.PointToPointConstraint(A.pb,new CANNON.Vec3().copy(w2bl(A.pb,jw)),B.pb,new CANNON.Vec3().copy(w2bl(B.pb,jw)));
    c.collideConnected=false; world.addConstraint(c); inst.rag.cons.push(c); }
  ragActive++; }
function stepRagdoll(inst){ const rag=inst.rag; if(!rag)return;
  for(const rec of rag.recs){ const pb=rec.pb;
    const qB=new THREE.Quaternion(pb.quaternion.x,pb.quaternion.y,pb.quaternion.z,pb.quaternion.w);
    const qW=rec.M.clone().multiply(qB);                                  // hueso world = M*body
    const pW=rec.bone.parent.getWorldQuaternion(_q1).invert();
    rec.bone.quaternion.copy(pW.multiply(qW));
    if(rec.isRoot){ const c=new THREE.Vector3(pb.position.x,pb.position.y,pb.position.z);
      const jw=c.add(rec.rLocal.clone().applyQuaternion(qB)); rec.bone.parent.worldToLocal(jw); rec.bone.position.copy(jw); } } }

function tickNPCs(dt){ if(!assetsReady)return;
  if(attackQueued){ attackQueued=false; tryKill(); }
  let nv=null,nd=25; for(const n of npcs){ if(n.mode!=='viewer'||n.dead)continue; const dx=n.group.position.x-player.pos.x,dz=n.group.position.z-player.pos.z,dd=dx*dx+dz*dz; if(dd<nd){nd=dd;nv=n;} }
  if(nv!==nearInst){ nearInst=nv; if(panel){ panel.style.display=nv?'flex':'none'; if(nv&&pName)pName.textContent=nv.T.name; } }
  for(const inst of npcs){
    if(inst.dead){ if(inst.rag) stepRagdoll(inst);                     // ragdoll cannon-es maneja la caída
      else if(inst.simpleFall){ const g=inst.group; inst.vy=(inst.vy||0)-18*dt; g.position.y=Math.max(0,g.position.y+inst.vy*dt); g.rotation.x=Math.min(Math.PI/2,(g.rotation.x||0)+2*dt); }
      continue; }
    if(inst.mixers[inst.state]) inst.mixers[inst.state].update(dt);
    for(const f of inst.flames){ const k=0.65+Math.random()*0.55; f.light.intensity=6*k; f.spr.material.opacity=0.6+0.4*Math.random(); }   // titilar antorcha
    if(inst.mode==='viewer'){ const dx=player.pos.x-inst.group.position.x, dz=player.pos.z-inst.group.position.z; inst.group.rotation.y=Math.atan2(dx,dz); }
    else { const dx=player.pos.x-inst.group.position.x, dz=player.pos.z-inst.group.position.z, d=Math.hypot(dx,dz)||1;
      inst.group.rotation.y=Math.atan2(dx,dz); inst.atkCD=Math.max(0,inst.atkCD-dt);
      if(d<3.0){ setState(inst,'attack'); if(inst.atkCD<=0){ inst.atkCD=1.3; hitShake=Math.max(hitShake,0.7); } }   // mantienen ~3 m (no se pegan a la cara)
      else { const run=d>8, sp=(run?2.5:1.3)*dt; inst.group.position.x+=dx/d*sp; inst.group.position.z+=dz/d*sp; setState(inst,run?'run':'walk'); } }
  } }

/* ===================== Loop ===================== */
const clock=new THREE.Clock(); const euler=new THREE.Euler(0,0,0,'YXZ');
function update(dt){
  let ix=joy.x,iz=joy.y; const mag=Math.min(1,Math.hypot(ix,iz)); if(mag>0.001){ix/=Math.max(mag,1);iz/=Math.max(mag,1);}
  forward.set(-Math.sin(player.yaw),0,-Math.cos(player.yaw)); right.set(Math.cos(player.yaw),0,-Math.sin(player.yaw));
  const sp=mag*SPEED_MAX*(player.crouch?0.5:1);
  const des=_v.set(0,0,0); des.addScaledVector(forward,-iz*sp); des.addScaledVector(right,ix*sp);
  player.vel.lerp(des,Math.min(1,ACCEL*dt)); player.pos.addScaledVector(player.vel,dt);
  player.pos.x=THREE.MathUtils.clamp(player.pos.x,-LIMIT,LIMIT); player.pos.z=THREE.MathUtils.clamp(player.pos.z,-LIMIT,LIMIT);
  for(const n of npcs){ if(n.dead)continue; const dx=player.pos.x-n.group.position.x, dz=player.pos.z-n.group.position.z, d=Math.hypot(dx,dz);   // colisión: no entrar dentro del NPC
    if(d<0.95&&d>1e-4){ const p=(0.95-d)/d; player.pos.x+=dx*p; player.pos.z+=dz*p; } }
  player.vy-=GRAV*dt; player.pos.y+=player.vy*dt; if(player.pos.y<=0){player.pos.y=0;player.vy=0;player.onGround=true;}
  const targetEye=player.crouch?EYE_CROUCH:EYE; player.eye+=(targetEye-player.eye)*Math.min(1,10*dt);
  const speed=player.vel.length(); player.bobPhase+=dt*(speed*1.9+0.0001); const moveAmt=Math.min(1,speed/SPEED_MAX);
  const bobY=Math.sin(player.bobPhase*2)*0.05*moveAmt, bobX=Math.cos(player.bobPhase)*0.035*moveAmt;
  const strafe=right.dot(player.vel)/SPEED_MAX; player.strafeSm+=(strafe-player.strafeSm)*Math.min(1,8*dt);
  player.roll+=((-player.strafeSm*0.08+Math.sin(player.bobPhase)*0.018*moveAmt)-player.roll)*Math.min(1,10*dt);
  camera.position.set(player.pos.x+right.x*bobX, player.pos.y+player.eye+bobY, player.pos.z+right.z*bobX);
  euler.set(player.pitch,player.yaw,player.roll); camera.quaternion.setFromEuler(euler);
  if(hitShake>0.0001){ camera.rotateZ((Math.random()-0.5)*0.07*hitShake); camera.rotateX((Math.random()-0.5)*0.05*hitShake); } hitShake*=0.88;
  moon.position.set(player.pos.x-40,70,player.pos.z-30); moon.target.position.copy(player.pos); moon.target.updateMatrixWorld();
  if(ragActive) world.step(1/60, dt, 4);   // físicas del ragdoll
  tickPlayer(dt);        // hacha en 1ª persona
  tickNPCs(dt);          // viewer + perseguidores + muertes
}
function animate(){ requestAnimationFrame(animate); const dt=Math.min(clock.getDelta(),0.05); update(dt); renderer.render(scene,camera); }

/* ===================== Init ===================== */
try{ layout(); renderer.render(scene,camera); setTimeout(()=>document.getElementById('loader').classList.add('hide'),200); }
catch(err){ console.error('Init',err); document.getElementById('loader').classList.add('hide'); }
animate();
</script>
