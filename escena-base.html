<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#87bdf0" />
<title>Escena base · Grid + cielo + sol</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#87bdf0; font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; }
  #app { position:fixed; inset:0; }
  #app canvas { display:block; width:100%!important; height:100%!important; touch-action:none; }
  #tag { position:fixed; left:12px; bottom:calc(12px + env(safe-area-inset-bottom,0px)); z-index:5;
         font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#08365f; opacity:.55; pointer-events:none; }
</style>
</head>
<body>
<div id="app"></div>
<div id="tag">Escena base · arrastrá para orbitar</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.outputColorSpace=THREE.SRGBColorSpace;
app.appendChild(renderer.domElement);

// ===== Escena + cielo azul =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87bdf0);            // cielo azul
scene.fog=new THREE.Fog(0x9cc8ee,40,160);              // bruma suave a lo lejos

const camera=new THREE.PerspectiveCamera(60,1,0.1,1000);
camera.position.set(8,6,12);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true; controls.dampingFactor=0.08;
controls.target.set(0,1,0); controls.maxPolarAngle=Math.PI*0.495;   // no pasar por debajo del suelo
controls.minDistance=3; controls.maxDistance=60;

// ===== Grid del suelo =====
const grid=new THREE.GridHelper(120,120,0x3a6ea5,0x8fb6db);
grid.material.transparent=true; grid.material.opacity=0.65;
scene.add(grid);

// ===== Sol (esfera luminosa) + luz =====
const sun=new THREE.Mesh(
  new THREE.SphereGeometry(2.2,32,24),
  new THREE.MeshBasicMaterial({color:0xfff1b0})
);
sun.position.set(-18,22,-26);
scene.add(sun);
// halo del solcito
const halo=new THREE.Sprite(new THREE.SpriteMaterial({
  map:(()=>{const S=128,c=document.createElement('canvas');c.width=c.height=S;const g=c.getContext('2d');
    const gr=g.createRadialGradient(S/2,S/2,0,S/2,S/2,S/2);gr.addColorStop(0,'rgba(255,244,190,.9)');gr.addColorStop(.4,'rgba(255,210,120,.4)');gr.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=gr;g.fillRect(0,0,S,S);const t=new THREE.CanvasTexture(c);t.colorSpace=THREE.SRGBColorSpace;return t;})(),
  transparent:true, depthWrite:false, blending:THREE.AdditiveBlending
}));
halo.scale.setScalar(16); sun.add(halo);

const sunLight=new THREE.DirectionalLight(0xfff2d0,2.4);
sunLight.position.copy(sun.position);
scene.add(sunLight);
scene.add(new THREE.HemisphereLight(0xbfe0ff,0x4a6b3a,0.7));

// ===== Loop =====
function resize(){const w=innerWidth,h=innerHeight;camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h,false);}
addEventListener('resize',resize); resize();
function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
animate();
</script>
</body>
</html>
